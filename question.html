月22日訂定「本府各機關學校與工友（含技工、駕駛）協商延後退休年齡審核作業說明」。本府各機關因業務需要，得與年滿65歲有意願繼續任職之工友協商延後退休年齡。", "detail_answer": "市府各機關工友遇缺之替代方案\n基於本市一體性及財政負擔考量並參照行政院人事行政總處101年10月12日總處組字第10100184492號函及行政院91年7月1日院授人企字第0910025483號函示「各機關學校之工友，不論超額與否，均予全面凍結不補」之員額精簡政策，有關本市所屬各機關，不另核定工友員額，各機關逕依在職工友數為基礎編列預算員額，出缺一律不補，並配合年度預算編列核實減列。\n查本府養護工程處6名技工及環境管理處7名技工分別於106年7月28日(文號1060165174)及109年12月25日(文號1090288815)簽准技術工友以新僱方式辦理在案(於本府工友總員額不變之原則下，專案簽准自行辦理僱用，且人員專職專用，不得移撥他機關)。\n次查本市教育局自100年始補助學校缺額工友委辦費，112年起調整每缺額每月為2萬3,000元整迄今，委辦費專款專用於替代工友人力執行事務性(如校園環境、清潔維護、植栽修剪及設備維修等)及臨時性交辦事項，非用於新僱工友或請增臨時人員。\n爰此，有關本府各機關工友遇缺之替代方案，係準用「中央各機關學校工友員額管理作業要點」第6點規定略以，各機關學校應本於兼顧多元人力進用及機關預算編列情形，積極檢討將其事務性工作，改採現代化事務機具、業務資訊化、簡化流程、運用志工等人力、全面推行職員自我服務及擴大外包等措施辦理。\n市府各機關年滿65歲有意願繼續任職之工友協商延後退休年齡作法\n(一)為應113年7月31日修正公布之勞動基準法第54條修正意旨及機關業務推動需要，本府於114年1月22日訂定「本府各機關學校與工友(含技工、駕駛)協商延後退休年齡審核作業說明」，各機關學校如因業務推動需要，得與年滿65歲有意願繼續任職之工友(含技工、駕駛)協商延後退休年齡。\n(二)協商延後退休年齡審核作業流程：\n1.協商工友延後退休案件\n2.用人機關組成審核小組\n3.審核小組就審核事項進行審核\n(1)同意：用人機關與工友協商延後退休年齡\n協商合意：協商延後退休年齡通知書\n未協商合意：依原命令退休規定辦理\n(2)不同意：依原命令退休規定辦理\n4.退休日期前1個半月將協商結果報本府備查\n(三)本府114年協商延後退休年齡情形如下："}, {"id": 85, "category": "秘書處業務", "question": "市府各機關工友是否有健康檢查費用補助？", "short_answer": "工友有健康檢查費用補助，每2年依年齡補助為4,500、7,000元。", "detail_answer": "一、參照本府人事處114年1月22日「桃園市政府及所屬機關學校員工健康檢查補助標準表」，本處114年2月17日修正工友健康檢查補助標準，並溯自114年1月1日生效：\n50歲以上者，每2年新台幣(下同)7,000元(或每年3,500元)。\n40歲以上未滿50歲者，每2年4,500元。\n未滿40歲且從事重複性、輪班、夜間、長時間工作等有危害安全及衛生顧慮工作人員，每2年4,500元。(原為每3年3,500元)\n二、備註\n駐警適用駐警適用「桃園市政府及所屬機關學校員工健康檢查補助標準表」，補助內容同上。\n工友及駐警人數及平均年齡如下："}, {"id": 86, "category": "秘書處業務", "question": "秘書處約用人員薪資是否偏低？請爭取提高薪資。", "short_answer": "本府秘書處約用人員係辦理事務性一般行政工作，薪資適用「桃園市政府約用人員薪資分級表」，新進人員薪資自114年1月起調高為基本工資1.1倍（起薪31,450元），每年視工作績效及考核結果調薪，最高可達35,050元。", "detail_answer": "本府秘書處約用人員係辦理事務性一般行政工作，薪資適用「桃園市政府約用人員薪資分級表」，依據本府114年1月22日修正「本府及所屬各機關學校約用人員進用及管理要點」之「桃園市政府約用人員薪資分級表」，調整每月薪資應高於最低工資（28,590元）1.1倍（31,450元），並自114年1月1日生效。\n桃園市政府約用人員薪資分級表：\n三、本處依前揭薪資分級表，簽准本處約用人員每月薪資調整為高於最低工資1.1倍（31,450元），並自114年1月1日生效，每年視工作績效及考核結果調薪，最高可達35,050元。"}, {"id": 87, "category": "秘書處業務", "question": "2025台灣燈會專案", "short_answer": "一、締盟城市等外賓暨表演團體接待\n(一)2025台灣燈會在桃園期間，辦理締盟城市等外賓暨表演團體歡迎晚宴交流、出席燈會開幕式、參觀燈會及參訪市政建設等接待事宜，燈會期間總計接待外賓5國16城市計65人，表演團體3團計56人。除開幕式外，亦安排其他締盟城市等訪團參觀燈會及生質能中心、桃園市立兒童美術館等市政建設，讓外賓了解桃園市政發展。\n(二)本次邀請締盟城市表演團體：千葉縣和太鼓凪、宮崎縣南部式及菲律賓安吉利斯城市大學舞蹈團等3團計56人蒞桃演出，除安排參與2月12日下午踩街遊行外、亦安排12及13日於主舞台演出。\n(三)本案結算金額_________元。\n二、國內縣市首長貴賓及議員參訪團等接待\n辦理國內縣市首長及議員貴賓接待，總計接待包含苗栗縣、台東縣、嘉義市、新竹縣及雲林縣政府、鄭淑方議員參訪團2團等，共計7團；另本處亦安排本市陸配團體參觀燈會活動1團次。\n三、指揮中心設置營運\n(一)本處於燈會期間在國泰大樓、青埔市民活動中心等設置指揮中心等營運措施，包含：中央及本府指揮中心、媒體中心、交控中心、安全維護中心及貴賓室等，現均完成場地復原。\n(二)本案於3月6日召開驗收會議。\n(三)經費說明：結算金額＿＿＿___元。\n四、後勤物資管理發放\n主管各活動局處後勤物資管理發放，於燈會期間總計供應1萬3,588個便當(結算金額135萬8,800元，含燈會A18及A19展區之工作人員及志工，不含議員貴賓團)，及礦泉水1,737箱等；另亦協助印製2025台灣燈會在桃園工作手冊計200冊(結算金額8萬10元)。\n五、燈會貴賓紀念品規劃與執行\n(一)經費說明：結算金額135萬元。\n(二)數量：1,000份。\n(三)設計理念：配合此次燈會主題「光的遊戲場」，視覺設計及內容物以親子及童趣題材為主軸，挑選桃園觀光工廠與優良廠商的產品，並融入燈會吉祥物於設計中。", "detail_answer": "(同簡答)"}, {"id": 88, "category": "秘書處業務", "question": "「2025台灣燈會在桃園」秘書處經費使用狀況", "short_answer": "本處燈會核列代辦金額：1,344萬3,795元\n本處燈會決算代辦金額：待補", "detail_answer": ""}, {"id": 89, "category": "秘書處業務", "question": "請說明就本次「2025台灣燈會在桃園」表演團體遇雨表演之規劃。", "short_answer": "一、本次燈會本市共邀請6團國外表演團體(含文化局邀請部分)，本處邀請之表演團體係來自本市締盟城市，分別為日本宮崎縣南部式、日本千葉縣和太鼓凪以及菲律賓安吉利斯市大學舞蹈團，計3團56人。\n二、本次蒞桃演出分為開幕踩街及主舞台表演，下午文化局安排之踩街活動無論彩排或正式演出，皆在雨中進行，無相關備案。\n三、開幕式後之主舞台表演，考量主舞台遇雨濕滑，將危及舞者安全，故本處當日已與中央舞台總監協調，讓本處邀請之表演團體至有遮篷之觀禮台演出並順利完成表演。", "detail_answer": "(同簡答)"}, {"id": 90, "category": "秘書處業務", "question": "請說明「2025台灣燈會在桃園」表演團體表演規劃所遭遇之困難。", "short_answer": "本次表演團體表演規劃，於踩街、主舞台表演及硬體設備等方面均讓本處同仁疲於奔命，也讓表演團體感覺不受尊重。", "detail_answer": "踩街\n(一)按表定時間提早半小時於上午9時報到，報到區空無一人，僅有工讀生1名，流廁上鎖、帳篷區亦無水無雨衣。\n(二)彩排因故延後，卻未接獲任何通知，影響其後主舞台彩排，本處同仁及表演團體，無所適從，安吉利斯舞蹈團因而無暇彩排。\n(三)下午大雨滂沱，強行踩街，表演團體樂器無法淋雨，權宜拉長團體介紹及人聲清唱，現場場控人員對本處帶團同仁出言喝斥，僭越分際。\n(四)踩街後，因中央稱主舞台後台空間有限，事先協調，請本處海外表演團體返踩街休息區待命近4小時，俟中央表團演畢撤出後，使用其帳篷。惟天色漸暗，帳篷區不斷滲水，照明全無，團體有感不受重視。\n二、主舞台表演\n(一)開幕式當日雨勢漸強，表演團體冒雨於主舞台彩排，考量舞者安全，本處現場向中央及地方舞監協調，遂定調改於觀禮台演出，期間現場無任何觀光署及相關局處人員。\n(二)菲律賓表演團體2月12日原定晚間9時演出，主辦方臨時安插外交部長官上台擺拍，卻未先知會已準備演出之表演團體，極不尊重。\n三、硬體設備\n(一)按主辦方原規劃，本處3團表演團計56人，卻僅配置3頂3米帳、數張桌子及6張椅子，配置顯違常理。\n(二)依分工，本處主責海外表團邀約與接待，卻需分神協處雨天主舞台表演位置及張羅桌椅空間，工作分配形同虛設。"}, {"id": 91, "category": "秘書處業務", "question": "本次燈會與世客博接待人數比較", "short_answer": "", "detail_answer": ""}, {"id": 92, "category": "秘書處業務", "question": "秘書處做為市府城市外交之媒合平台，如何了解市府各機關進行城市外交交流活動等相關訊息？", "short_answer": "本處做為市府外交之媒合平台，倘有國外城市擬與本市相關局處交流，透過本處媒合，抑或市府各機關欲與締盟城市等交流，擬請本處協助對接，本處即可於事前了解其交流狀況。惟基於尊重各機關業務專業，目前做法係市府各機關就其專業領域與外國城市進行交流，並於每季由各機關提供國際交流情形，供本處彙整掌握。", "detail_answer": "(同簡答)"}];

// ── State ──
let recognition = null;
let isListening = false;
let userWantsListening = false; // true = user pressed 開始收音, survives auto-stops
let finalTranscript = '';
let interimTranscript = '';
let recentSegments = []; // stores last N finalized speech segments for focused search
let searchTimer = null;
let expandedCards = new Set();
let activeTab = {}; // cardId -> 'short' | 'detail'

// ── Init Speech Recognition ──
function initSpeech() {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRec) {
    document.getElementById('warnBanner').style.display = 'block';
    document.getElementById('micBtn').style.display = 'none';
    return;
  }
  recognition = new SpeechRec();
  recognition.lang = 'zh-TW';
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isListening = true;
    setStatus('listening');
  };

  // Auto-restart: browsers (especially Safari/iOS) stop recognition after silence
  // or ~60s. We restart automatically as long as the user hasn't pressed Stop.
  recognition.onend = () => {
    isListening = false;
    if (userWantsListening) {
      // Brief pause before restart to avoid rapid loops on some browsers
      setTimeout(() => {
        if (userWantsListening) {
          try { recognition.start(); } catch(e) {}
        }
      }, 250);
    } else {
      setStatus('idle');
      updateMicBtn(false);
    }
  };

  recognition.onerror = (e) => {
    // 'no-speech' is normal during silence — just let onend handle restart
    if (e.error === 'no-speech') return;
    // 'aborted' happens when we call stop() ourselves — ignore
    if (e.error === 'aborted') return;
    // Real error: stop trying
    userWantsListening = false;
    isListening = false;
    setStatus('idle');
    updateMicBtn(false);
  };

  recognition.onresult = (e) => {
    let interim = '';
    let final = finalTranscript;
    const newFinals = [];

    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) {
        final += t;
        newFinals.push(t.trim());
      } else {
        interim = t;
      }
    }

    // Accumulate finalized segments for rolling-window search
    if (newFinals.length > 0) {
      recentSegments.push(...newFinals.filter(s => s.length > 0));
      // Keep only last 12 segments (~60-90s of speech at typical pace)
      if (recentSegments.length > 12) recentSegments = recentSegments.slice(-12);
    }

    finalTranscript = final;
    interimTranscript = interim;

    // Display: show full accumulated text so user can see everything captured
    const display = finalTranscript + interimTranscript;
    updateTranscript(display);

    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      // Search strategy: use recent 3 segments + current interim
      // This keeps matching sensitive to the LATEST part of the question,
      // avoiding dilution from long earlier preamble.
      const recentQuery = recentSegments.slice(-3).join('') + interimTranscript;
      const query = recentQuery.trim().length > 3 ? recentQuery.trim() : display.trim();
      if (query.length > 3) autoSearch(query);
    }, 1000);
  };
}

function startListening() {
  if (!recognition) return;
  userWantsListening = true;
  try {
    recognition.start();
    updateMicBtn(true);
  } catch(e) {}
}

function stopListening() {
  if (!recognition) return;
  userWantsListening = false;
  recognition.stop();
  updateMicBtn(false);
}

function toggleMic() {
  if (isListening) {
    stopListening();
  } else {
    startListening();
  }
}

// ── UI Helpers ──
function setStatus(state) {
  const pill = document.getElementById('statusPill');
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  pill.className = 'status-pill';
  dot.className = 'dot';
  if (state === 'listening') {
    pill.classList.add('listening');
    dot.classList.add('pulse');
    text.textContent = '收音中';
  } else if (state === 'active') {
    pill.classList.add('active');
    text.textContent = '已找到答案';
  } else {
    text.textContent = '待機中';
  }
}

function updateMicBtn(listening) {
  const btn = document.getElementById('micBtn');
  const icon = document.getElementById('micIcon');
  const label = document.getElementById('micLabel');
  if (listening) {
    btn.className = 'btn-mic stop';
    icon.textContent = '⏹';
    label.textContent = '停止收音';
  } else {
    btn.className = 'btn-mic start';
    icon.textContent = '🎙';
    label.textContent = '開始收音';
  }
}

function updateTranscript(text) {
  const el = document.getElementById('transcript');
  if (text.trim()) {
    el.textContent = text;
    el.classList.remove('placeholder');
  } else {
    el.textContent = '等待收音…';
    el.classList.add('placeholder');
  }
}

function resetAll() {
  userWantsListening = false;
  if (isListening) stopListening();
  finalTranscript = '';
  interimTranscript = '';
  recentSegments = [];
  confirmedMatches = [];
  updateTranscript('');
  document.getElementById('searchInput').value = '';
  showEmpty();
  setStatus('idle');
  expandedCards.clear();
  activeTab = {};
  fbClearSession();
}

function showEmpty() {
  document.getElementById('resultsArea').innerHTML = `
    <div class="no-result">
      <div class="no-result-icon">📋</div>
      <div class="no-result-text">開始收音或輸入關鍵字</div>
    </div>`;
  document.getElementById('refLabel').style.display = 'none';
  resetAIHint();
}

function resetAIHint() {
  const card = document.getElementById('aiHintCard');
  card.classList.remove('has-content');
  document.getElementById('aiHintTopic').textContent = '';
  document.getElementById('aiHintBody').innerHTML = '<div class="ai-hint-empty">等待收音辨識或輸入關鍵字…</div>';
}

// ── Confirmed Match Queue ──
let confirmedMatches = [];

function tryConfirmMatch(topResult) {
  if (!topResult || topResult.score < 3) return;
  // Already in queue? Skip (no duplicates)
  if (confirmedMatches.find(m => m.qa.id === topResult.qa.id)) return;
  confirmedMatches.push({ qa: topResult.qa, score: topResult.score });
  renderConfirmedQueue();
  fbPushMatches();
}

function renderConfirmedQueue() {
  const card = document.getElementById('aiHintCard');
  const topicEl = document.getElementById('aiHintTopic');
  const bodyEl = document.getElementById('aiHintBody');
  if (confirmedMatches.length === 0) return;
  card.classList.add('has-content');
  topicEl.textContent = confirmedMatches.length > 1 ? `已偵測 ${confirmedMatches.length} 題` : '';
  bodyEl.innerHTML = '<div class="confirmed-queue">' +
    confirmedMatches.map((match, idx) => {
      const isLatest = idx === confirmedMatches.length - 1;
      const points = extractKeyPoints(match.qa.short_answer || match.qa.detail_answer);
      return `
        <div class="cq-card${isLatest ? ' is-latest' : ''}">
          <div class="cq-header">
            <div class="cq-num">第 ${idx + 1} 題</div>
            <div class="cq-question">${escHtml(match.qa.question)}</div>
          </div>
          <div class="cq-body">
            ${points.map((pt, i) => `
              <div class="ai-point">
                <div class="ai-point-num">${i + 1}</div>
                <div class="ai-point-text">${escHtml(pt)}</div>
              </div>
            `).join('')}
          </div>
        </div>`;
    }).join('') + '</div>';
}

// Extract 2-3 key points from short_answer text
function extractKeyPoints(text) {
  if (!text) return [];
  // Try split by Chinese numbered list: 一、二、三、四、五、
  const numbered = text.split(/(?=[一二三四五六七八九十]、)/);
  const filtered = numbered.map(s => s.replace(/^[一二三四五六七八九十]、/, '').trim()).filter(s => s.length > 5);
  if (filtered.length >= 2) return filtered.slice(0, 3);

  // Fallback: split by newline or 。
  const lines = text.split(/\n|(?<=。)/).map(s => s.trim()).filter(s => s.length > 8);
  if (lines.length >= 2) return lines.slice(0, 3);

  // Last resort: return the first sentence trimmed
  const first = text.trim().slice(0, 80);
  return [first];
}

function updateAIHint(topResult) {
  // If confirmed queue already has items, keep showing queue (don't overwrite with live preview)
  if (confirmedMatches.length > 0) {
    renderConfirmedQueue();
    return;
  }

  // No confirmed matches yet — show live preview of current best match
  const card = document.getElementById('aiHintCard');
  const topicEl = document.getElementById('aiHintTopic');
  const bodyEl = document.getElementById('aiHintBody');

  if (!topResult) {
    resetAIHint();
    return;
  }

  card.classList.add('has-content');
  topicEl.textContent = topResult.qa.question;

  const points = extractKeyPoints(topResult.qa.short_answer || topResult.qa.detail_answer);

  if (points.length === 0) {
    bodyEl.innerHTML = '<div class="ai-hint-empty">（無法取得答題要點）</div>';
    return;
  }

  bodyEl.innerHTML = points.map((pt, i) => `
    <div class="ai-point">
      <div class="ai-point-num">${i + 1}</div>
      <div class="ai-point-text">${escHtml(pt)}</div>
    </div>
  `).join('');
}

// ── Search & Scoring ──
function tokenize(text) {
  // Split into 2-char and 3-char bigrams for Chinese
  const t = text.replace(/[?？。，、！!,.\s]+/g, '');
  const tokens = new Set();
  for (let i = 0; i < t.length - 1; i++) tokens.add(t.slice(i, i+2));
  for (let i = 0; i < t.length - 2; i++) tokens.add(t.slice(i, i+3));
  // Also add individual chars for short queries
  for (let c of t) tokens.add(c);
  return tokens;
}

function scoreQA(qa, queryTokens) {
  const qTokens = tokenize(qa.question);
  const aTokens = tokenize(qa.short_answer + ' ' + qa.detail_answer);
  
  let score = 0;
  let qHits = 0;
  for (let t of queryTokens) {
    if (qTokens.has(t)) { score += (t.length >= 3 ? 4 : t.length >= 2 ? 2 : 0.5); qHits++; }
    else if (aTokens.has(t)) { score += (t.length >= 3 ? 1.5 : t.length >= 2 ? 0.8 : 0.2); }
  }
  
  // Boost if question match ratio is high
  if (queryTokens.size > 0) {
    const ratio = qHits / queryTokens.size;
    score *= (1 + ratio * 0.5);
  }
  
  return score;
}

function search(query) {
  if (!query.trim()) return [];
  const qTokens = tokenize(query);
  if (qTokens.size === 0) return [];
  
  const scored = QA_DATA.map(qa => ({ qa, score: scoreQA(qa, qTokens) }))
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 5);
  
  return scored;
}

function autoSearch(query) {
  const results = search(query);
  if (results.length > 0) {
    setStatus('active');
    renderResults(results, true);
  }
}

function doSearch() {
  const q = document.getElementById('searchInput').value;
  if (!q.trim()) return;
  const results = search(q);
  if (results.length > 0) {
    setStatus('active');
    renderResults(results, false);
  } else {
    document.getElementById('resultsArea').innerHTML = `
      <div class="no-result">
        <div class="no-result-icon">🔍</div>
        <div class="no-result-text">找不到相關題目，請換個關鍵字</div>
      </div>`;
  }
}

function onSearchInput(val) {
  clearTimeout(searchTimer);
  if (val.length >= 3) {
    searchTimer = setTimeout(() => doSearch(), 600);
  }
}

// ── Render ──
function renderResults(results, autoExpand) {
  const container = document.getElementById('resultsArea');
  const count = results.length;

  // Update AI hint with the top match; try to confirm high-confidence matches into queue
  updateAIHint(results[0] || null);
  tryConfirmMatch(results[0] || null);

  // Show section label
  document.getElementById('refLabel').style.display = count > 0 ? 'block' : 'none';

  let html = `<div class="results-header">共 ${count} 筆相關題目 — 點擊查看完整內容</div>`;

  results.forEach((item, idx) => {
    const { qa, score } = item;
    const cardId = qa.id;
    // All cards collapsed by default; only restore previously-expanded state
    const isExpanded = expandedCards.has(cardId);
    const tab = activeTab[cardId] || 'short';
    const maxScore = results[0].score;
    const relScore = score / maxScore;
    const dots = 5;
    const filled = Math.max(1, Math.round(relScore * dots));

    const dotsHtml = Array.from({length: dots}, (_, i) =>
      `<span class="score-dot${i < filled ? ' filled' : ''}"></span>`
    ).join('');

    const hasShort = qa.short_answer && qa.short_answer.trim();
    const hasDetail = qa.detail_answer && qa.detail_answer.trim();
    const answerText = tab === 'short' ? (hasShort ? qa.short_answer : qa.detail_answer) : (hasDetail ? qa.detail_answer : qa.short_answer);

    html += `
    <div class="qa-card${idx === 0 ? ' highlighted' : ''}" id="card-${cardId}">
      <div class="qa-card-header" onclick="toggleCard(${cardId})">
        <div class="qa-tag">${qa.category || '質詢題目'}</div>
        <div class="qa-question">${escHtml(qa.question)}</div>
        <div class="score-bar">
          <div class="score-dots">${dotsHtml}</div>
          <span class="score-label">相關度 ${idx === 0 ? '· 最佳匹配' : ''}</span>
        </div>
      </div>`;

    if (isExpanded) {
      html += `
      <div class="qa-tabs">
        <div class="qa-tab${tab === 'short' ? ' active' : ''}" onclick="switchTab(event,${cardId},'short')">簡答版</div>
        <div class="qa-tab${tab === 'detail' ? ' active' : ''}" onclick="switchTab(event,${cardId},'detail')">詳答版</div>
      </div>
      <div class="qa-answer" id="ans-${cardId}">${escHtml(answerText || '（無答案內容）')}</div>`;
    }

    html += `</div>`;
  });

  container.innerHTML = html;
}

function toggleCard(cardId) {
  const card = document.getElementById(`card-${cardId}`);
  if (expandedCards.has(cardId)) {
    expandedCards.delete(cardId);
    // Re-render without the answer section
    const qa = QA_DATA.find(q => q.id === cardId);
    const tabsEl = card.querySelector('.qa-tabs');
    const ansEl = card.querySelector('.qa-answer');
    if (tabsEl) tabsEl.remove();
    if (ansEl) ansEl.remove();
  } else {
    expandedCards.add(cardId);
    const qa = QA_DATA.find(q => q.id === cardId);
    const tab = activeTab[cardId] || 'short';
    const hasShort = qa.short_answer && qa.short_answer.trim();
    const hasDetail = qa.detail_answer && qa.detail_answer.trim();
    const answerText = tab === 'short' ? (hasShort ? qa.short_answer : qa.detail_answer) : (hasDetail ? qa.detail_answer : qa.short_answer);
    
    const tabsHtml = `<div class="qa-tabs">
      <div class="qa-tab${tab==='short'?' active':''}" onclick="switchTab(event,${cardId},'short')">簡答版</div>
      <div class="qa-tab${tab==='detail'?' active':''}" onclick="switchTab(event,${cardId},'detail')">詳答版</div>
    </div>`;
    const ansHtml = `<div class="qa-answer" id="ans-${cardId}">${escHtml(answerText || '（無答案內容）')}</div>`;
    card.insertAdjacentHTML('beforeend', tabsHtml + ansHtml);
  }
}

function switchTab(e, cardId, tab) {
  e.stopPropagation();
  activeTab[cardId] = tab;
  const qa = QA_DATA.find(q => q.id === cardId);
  const hasShort = qa.short_answer && qa.short_answer.trim();
  const hasDetail = qa.detail_answer && qa.detail_answer.trim();
  const answerText = tab === 'short' ? (hasShort ? qa.short_answer : qa.detail_answer) : (hasDetail ? qa.detail_answer : qa.short_answer);
  
  const card = document.getElementById(`card-${cardId}`);
  card.querySelectorAll('.qa-tab').forEach(t => t.classList.remove('active'));
  card.querySelectorAll('.qa-tab')[tab === 'short' ? 0 : 1].classList.add('active');
  
  const ansEl = document.getElementById(`ans-${cardId}`);
  if (ansEl) ansEl.textContent = answerText || '（無答案內容）';
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
