<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>議會質詢輔助系統</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --surface2: #f5f5f7;
    --border: #e5e5e7;
    --text-primary: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-tertiary: #aeaeb2;
    --accent: #0071e3;
    --accent-light: #e8f1fb;
    --success: #34c759;
    --warning: #ff9500;
    --danger: #ff3b30;
    --radius: 16px;
    --radius-sm: 10px;
  }

  html {
    height: 100%;
  }

  body {
    font-family: -apple-system, "SF Pro Display", "PingFang TC", "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    height: 100%;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 5px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    min-height: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .app-icon {
    width: 22px; height: 22px;
    background: var(--accent);
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }

  .app-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: -0.2px;
    color: var(--text-secondary);
  }

  .app-subtitle {
    display: none;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    transition: all 0.3s;
    cursor: default;
    background: var(--surface2);
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }

  .status-pill.listening {
    background: #fff0f0;
    color: var(--danger);
    border-color: #ffd5d3;
  }

  .status-pill.active {
    background: #f0fff4;
    color: var(--success);
    border-color: #c3f0cd;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
  }

  .dot.pulse {
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }

  /* ── Main Layout ── */
  main {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    padding: 16px 20px;
    gap: 14px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* ── Voice Input Card ── */
  .voice-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px 20px;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  .voice-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-tertiary);
    margin-bottom: 10px;
  }

  /* Two-column layout: transcript left, action buttons right */
  .voice-body {
    display: flex;
    gap: 12px;
    align-items: stretch;
  }

  .transcript-text {
    flex: 1;
    font-size: 14px;
    line-height: 1.55;
    color: var(--text-primary);
    min-height: 96px;
    max-height: 130px;
    overflow-y: auto;
    font-weight: 400;
    -webkit-overflow-scrolling: touch;
  }

  .transcript-text.placeholder {
    color: var(--text-tertiary);
    font-style: italic;
  }

  /* ── Voice action buttons (right column) ── */
  .voice-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
    width: 88px;
  }

  .btn-mic {
    width: 100%;
    flex: 1;
    height: 50px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-mic.start {
    background: var(--accent);
    color: white;
  }

  .btn-mic.stop {
    background: var(--danger);
    color: white;
  }

  .btn-mic:active {
    transform: scale(0.97);
    opacity: 0.85;
  }

  .btn-secondary {
    height: 42px;
    padding: 0 12px;
    width: 100%;
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
  }

  .btn-secondary:active {
    background: var(--border);
  }

  /* ── Search box ── */
  .search-row {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .search-input {
    flex: 1;
    height: 44px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0 16px;
    font-size: 15px;
    background: var(--surface);
    color: var(--text-primary);
    outline: none;
    font-family: inherit;
  }

  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  .btn-search {
    height: 44px;
    padding: 0 18px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-search:active { opacity: 0.8; }

  /* ── Results ── */
  .results-area {
    flex-shrink: 0;
  }

  .results-header {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-tertiary);
    margin-bottom: 10px;
    padding: 0 2px;
  }

  .no-result {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 180px;
    color: var(--text-tertiary);
    gap: 10px;
  }

  .no-result-icon { font-size: 40px; }
  .no-result-text { font-size: 15px; }

  /* ── Q&A Card ── */
  .qa-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .qa-card.highlighted {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  .qa-card-header {
    padding: 16px 20px 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .qa-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 5px;
    background: var(--accent-light);
    color: var(--accent);
    margin-bottom: 8px;
    letter-spacing: 0.2px;
  }

  .qa-question {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text-primary);
    letter-spacing: -0.2px;
  }

  .score-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }

  .score-dots {
    display: flex; gap: 3px;
  }

  .score-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--border);
  }

  .score-dot.filled { background: var(--accent); }

  .score-label {
    font-size: 11px;
    color: var(--text-tertiary);
  }

  /* ── Answer Tabs ── */
  .qa-tabs {
    display: flex;
    border-top: 1px solid var(--border);
    padding: 0 20px;
    gap: 0;
  }

  .qa-tab {
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .qa-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 600;
  }

  .qa-answer {
    padding: 14px 20px 18px;
    font-size: 16px;
    line-height: 1.7;
    color: var(--text-primary);
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* ── No Speech API warning ── */
  .warning-banner {
    background: #fff8e6;
    border: 1px solid #ffe0a0;
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-size: 13px;
    color: #8a6000;
    display: none;
    flex-shrink: 0;
  }

  /* Scrollbar */
  .results-area::-webkit-scrollbar { width: 4px; }
  .results-area::-webkit-scrollbar-track { background: transparent; }
  .results-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── AI 答題提示 ── */
  .ai-hint-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    flex-shrink: 0;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .ai-hint-card.has-content {
    border-color: var(--accent);
  }

  .ai-hint-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 18px 10px;
    border-bottom: 1px solid var(--border);
  }

  .ai-hint-card.has-content .ai-hint-header {
    border-bottom-color: var(--accent-light);
  }

  .ai-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--accent);
    color: white;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 3px 9px;
    border-radius: 6px;
  }

  .ai-hint-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
  }

  .ai-hint-topic {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-tertiary);
    max-width: 40%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ai-hint-body {
    padding: 12px 18px 14px;
  }

  .ai-hint-empty {
    color: var(--text-tertiary);
    font-size: 14px;
    font-style: italic;
    padding: 4px 0;
  }

  .ai-point {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 5px 0;
    font-size: 15px;
    line-height: 1.55;
    color: var(--text-primary);
  }

  .ai-point + .ai-point {
    border-top: 1px solid var(--border);
  }

  .ai-point-num {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    background: var(--accent);
    color: white;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
  }

  .ai-point-text {
    flex: 1;
  }

  /* ── Confirmed Question Cards ── */
  .confirmed-queue { display: flex; flex-direction: column; gap: 10px; }
  .cq-card {
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .cq-card.is-latest { border-color: var(--accent); }
  .cq-header {
    background: var(--surface2);
    padding: 10px 14px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .cq-card.is-latest .cq-header {
    background: var(--accent-light);
  }
  .cq-num {
    flex-shrink: 0;
    background: var(--text-tertiary);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    margin-top: 2px;
    white-space: nowrap;
  }
  .cq-card.is-latest .cq-num { background: var(--accent); }
  .cq-question {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.4;
  }
  .cq-body {
    background: var(--surface);
    padding: 10px 14px 12px;
  }

  /* ── 參考資料 section label ── */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-tertiary);
    flex-shrink: 0;
    padding: 0 2px;
  }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>
<body>

<!-- ── Password Gate ── -->
<div id="pwGate" style="
  position:fixed; inset:0; z-index:9999;
  background:#1a1a2e;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:18px;
">
  <div style="font-size:40px">🔐</div>
  <div style="color:#fff; font-size:17px; font-weight:600; letter-spacing:0.3px;">請輸入存取密碼</div>
  <input id="pwInput" type="password"
    placeholder="密碼"
    autocomplete="off"
    style="
      width:220px; padding:12px 16px;
      border-radius:12px; border:1.5px solid #444;
      background:#2a2a3e; color:#fff;
      font-size:18px; letter-spacing:4px; text-align:center;
      outline:none;
    "
    onkeydown="if(event.key==='Enter') checkPw()"
  >
  <button onclick="checkPw()" style="
    background:#0071e3; color:#fff;
    border:none; border-radius:12px;
    padding:12px 36px; font-size:15px; font-weight:600;
    cursor:pointer;
  ">進入</button>
  <div id="pwErr" style="color:#ff6b6b; font-size:13px; display:none;">密碼錯誤，請再試一次</div>
</div>
<script>
  (function(){
    const CORRECT = 'tycg2026';
    const KEY = 'qa_auth';
    if (sessionStorage.getItem(KEY) === CORRECT) {
      document.getElementById('pwGate').style.display = 'none';
    }
    window.checkPw = function() {
      const val = document.getElementById('pwInput').value;
      if (val === CORRECT) {
        sessionStorage.setItem(KEY, CORRECT);
        document.getElementById('pwGate').style.display = 'none';
      } else {
        document.getElementById('pwErr').style.display = 'block';
        document.getElementById('pwInput').value = '';
        document.getElementById('pwInput').focus();
      }
    };
    setTimeout(() => document.getElementById('pwInput').focus(), 100);
  })();
</script>

<header>
  <div class="header-left">
    <div class="app-icon">🎙</div>
    <div>
      <div class="app-title">議會質詢輔助</div>
      <div class="app-subtitle">第3屆第5次定期會 · 秘書處</div>
    </div>
  </div>
  <div class="status-pill" id="statusPill">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">待機中</span>
  </div>
</header>

<main>

  <div class="warning-banner" id="warnBanner">
    ⚠️ 此瀏覽器不支援語音辨識，請使用 Chrome 或 Safari。可用下方手動搜尋代替。
  </div>

  <div class="voice-card">
    <div class="voice-label">語音辨識</div>
    <div class="voice-body">
      <div class="transcript-text placeholder" id="transcript">等待收音…</div>
      <div class="voice-actions">
        <button class="btn-mic start" id="micBtn" onclick="toggleMic()">
          <span id="micIcon">🎙</span>
          <span id="micLabel">開始收音</span>
        </button>
        <button class="btn-secondary" onclick="resetAll()">重置</button>
      </div>
    </div>
  </div>

  <!-- AI 答題提示區塊 -->
  <div class="ai-hint-card" id="aiHintCard">
    <div class="ai-hint-header">
      <div class="ai-badge">✦ AI</div>
      <div class="ai-hint-title">答題提示</div>
      <div class="ai-hint-topic" id="aiHintTopic"></div>
    </div>
    <div class="ai-hint-body" id="aiHintBody">
      <div class="ai-hint-empty">等待收音辨識或輸入關鍵字…</div>
    </div>
  </div>

  <div class="search-row">
    <input class="search-input" id="searchInput" type="search"
      placeholder="手動輸入關鍵字搜尋…"
      oninput="onSearchInput(this.value)"
      onkeydown="if(event.key==='Enter') doSearch()">
    <button class="btn-search" onclick="doSearch()">搜尋</button>
  </div>

  <div class="section-label" id="refLabel" style="display:none">詳細參考資料</div>

  <div class="results-area" id="resultsArea">
    <div class="no-result">
      <div class="no-result-icon">📋</div>
      <div class="no-result-text">開始收音或輸入關鍵字</div>
    </div>
  </div>

</main>

<script>
const QA_DATA = [{"id": 1, "category": "秘書處業務", "question": "市府第二行政園區進度與未來規劃", "short_answer": "一、本府第二行政園區屬桃園重大城市建設工程，本處於110年完成可行性評估暨先期規劃，並提供本府都市發展局參考，現由本府都市發展局辦理，俟都發局確認園區區位後，再由本處做細部規劃。\n二、設置地點將考量交通便捷、停車空間及民眾洽公便利性等因素持續進行評估，現階段第二園區設置地點尚未定案，定案後本府將發布訊息，避免淪為炒地皮之標的及影響周遭房地產價格。\n三、第二行政園區長期方案興建預算龐大，影響深遠，本府為求謹慎周延，除考量南北平衡原則，並將桃園市議會遷建可行性一同納入評估，選址方案應有完整規劃，且有府會共識及市民的認知支持，市府才能定案，並編列足額預算據以執行，最終選址方案將以規劃符合桃園市民需求之第二行政園區為目標。", "detail_answer": "一、桃園市政府第二行政園區可行性評估暨先期規劃\n(一)本府第二行政園區屬桃園重大城市建設工程，本處於110年完成可行性評估暨先期規劃，並提供本府都市發展局參考，現由本府都市發展局辦理，俟都發局確認園區區位後，再由本處做細部規劃。\n(二)設置地點將考量交通便捷、停車空間及民眾洽公便利性等因素持續進行評估，現階段第二園區設置地點尚未定案，定案後本府將發布訊息，避免淪為炒地皮之標的及影響周遭房地產價格。\n(三)本府第二行政園區長期方案，原則規劃將中路埤塘公園及捷運綠線沿線都市計畫基地（G12周邊）或盤點其他可能適合地點，評估第二行政園區可行性。\n1.中路埤塘公園：目前因第二行政園區相關需求尚未確定，且有部分土地刻正在和農田水利署協商中，爰內政部都委會退回修正中，完成後賡續辦理送內政部都委會審議程序。\n2.捷運綠線沿線都市計畫基地（G12周邊）：都發局依照大眾運輸導向型發展（TOD）概念，以捷運車站周邊500至800公尺範圍規劃，及開發連接南崁溪左右岸道路，預計114年辦理公開展覽，完成後賡續送市都委會審議程序。\n(四)第二行政園區長期方案興建預算龐大，影響深遠，本府為求謹慎周延，除考量南北平衡原則，並將桃園市議會遷建可行性一同納入評估，選址方案應有完整規劃，且有府會共識及市民的認知支持，市府才能定案，並編列足額預算據以執行，最終選址方案將以規劃符合桃園市民需求之第二行政園區為目標。\n二、六都一級機關位於市政大樓外之情形：\n(一)台北市：\n警察局、消防局、捷運工程局、體育局、翡翠水庫管理局、兵役局、客家事務委員會及公務人員訓練處，共8個機關。\n(二)新北市：\n警察局、消防局、環保局、衛生局、青年局及捷運工程局，共6個機關。\n(三)台中市(臺灣大道市政大樓、陽明市政大樓及文心第二行政大樓)：\n交通局、地方稅務局、地政局、警察局、消防局、衛生局、捷運工程局及原住民族事委員會，共8個機關。\n(四)台南市(目前有永華及民治2個市政中心)：\n警察局、消防局、環境保護局、財政稅務局、衛生局及體育局，共6個機關。\n(五)高雄市(目前有四維及鳳山2個行政中心)：\n警察局、消防局、環境保護局、衛生局、文化局、交通局、勞工局、客家委員會、運動發展局、毒品防制局、高雄市立空中大學，共11個機關。\n(六)桃園市：\n捷運工程局、環境保護局、水務局、警察局、衛生局、消防局、文化局、地方稅務局、客家事務局、青年事務局、體育局、交通局、經濟發展局(市場科及商業發展科)、地政局(地價科及航空城開發科)、教育局(幼兒教育科)、婦幼局(新住民事務科)、勞動局(跨國勞動事務科)，共17個機關。其中跨府內、外一級機關共5個：經濟發展局、地政局、婦幼局、教育局、勞動局。"}, {"id": 2, "category": "秘書處業務", "question": "市府一級機關府內外分布狀況?在外租賃機關狀況及租金?", "short_answer": "府內一級機關：20個\n府外一級機關：17個\n跨府內、外一級機關：5個\n本府目前有9個一級機關(含所屬二級，不含戶政事務所、地政事務所、衛生所等性質)於府外租賃辦公廳舍，每月租金總額約197萬元，每年租金總額約2,363萬元。", "detail_answer": "府內一級機關：20個\n依據市政大樓樓層低到高排序：經濟發展局、都市發展局、新聞處、勞動局、社會局、農業局、地政局、秘書處、財政局、主計處、原住民族行政局、民政局、工務局、法務局、觀光旅遊局、婦幼局、智慧城鄉發展委員會、人事處、政風處、教育局。\n府外一級機關：17個\n捷運工程局、環境保護局、水務局、警察局、衛生局、消防局、文化局、地方稅務局、客家事務局、青年事務局、體育局、交通局、經濟發展局(市場科及商業發展科)、地政局(地價科及航空城開發科)、教育局(幼兒教育科)、婦幼局(新住民事務科)、勞動局(跨國勞動事務科)。\n跨府內、外一級機關：5個\n經濟發展局、地政局、婦幼局、教育局、勞動局。\n本府目前有9個一級機關(含所屬二級，不含戶政事務所、地政事務所、衛生所等性質)於府外租賃辦公廳舍，每月租金總額約197萬元，每年租金總額約2,363萬元。(詳如下府外單位彙整表)。\n府外單位彙整表"}, {"id": 3, "category": "秘書處業務", "question": "市政大樓辦公空間調整(含綜合服務櫃台設置、原民局空間改善)", "short_answer": "一、第一階段：由都市發展局、建築管理處、政風處、婦幼發展局、智慧城鄉發展委員會及教育局配合辦理空間調整。截至114年2月，均已完工遷入。\n二、第二階段：由參事參議辦公室、觀光旅遊局、經濟發展局、民政局、法務局、勞動局、社會局、性別平等辦公室及公務人員協會辦公室，配合辦理空間調整。截至114年2月，參事參議辦公室及觀光旅遊局已完工遷入；經濟發展局、社會局、性別平等辦公室、公務人員協會及民政局空間已點交完畢，刻正進行設計規劃及施工。另勞動局俟社會局完成搬遷後調整；法務局俟經濟發展局完成搬遷後調整。\n三、綜合服務櫃檯設置\n為縮短行政作業流程，以節省洽公時間，本府市政大樓「綜合服務櫃檯」，已於113年9月2日起正式啟用，進駐單位為都市發展局、地政局(桃園區地政事務所)、交通局、衛生局、婦幼發展局、社會局及勞動局，並已於入口大廳明顯處強化指標牌設置，有效引導民眾前往。\n四、空間調整後各機關電話分機安排\n(一)原則由各機關依其業務性質及需求規劃電話分機。經盤整本次市政大樓辦公空間調整各機關原則均已原號碼移機方式辦理，以避免洽辦公民眾聯繫不到之情形。\n(二)綜合服務櫃檯部分，各進駐機關原則依原服務電話分機以直播、轉接或專線方式提供民眾服務。\n五、原民局空間改善\n為提供原住民族行政局(以下稱原民局)洽公民眾良好之服務空間，可於原6樓原民局外志工服務台旁研議設置洽談區，以供原民局洽公民眾使用。另原民局是否遷出市府，須由原民局自行依業務及整體需求考量進行規劃。", "detail_answer": "一、第一階段：由都市發展局、建築管理處、政風處、婦幼發展局、智慧城鄉發展委員會及教育局配合辦理空間調整，截至114年2月，均已完工遷入。\n都發局：後棟10樓，已於112年12月18日完成搬遷。\n建管處：後棟1、11樓，已於113年5月13日完成搬遷。\n政風處：後棟11樓，已於113年5月13日完成搬遷。\n婦幼發展局：因應本府婦幼發展局於113年1月1日成立，爰規劃辦公空間於前棟8樓，已於113年12月31日完成搬遷。\n智慧城鄉發展委員會：後棟9、11樓，部分科室已於112年12月31日由6樓遷移至11樓。\n教育局：後棟14、15樓，已於113年12月25日完成搬遷。\n綜合服務櫃檯：於前棟1樓東側，由7個機關設櫃(標準櫃檯寬度120公分，足供民眾洽公使用)，包含都發局、地政局(桃園區地政事務所)、交通局、衛生局、婦幼局、社會局及勞動局，入口大廳再次調整指標牌字體大小及位置，以利引導民眾前往洽公，已於113年第3季正式啟用。\n二、第二階段：由參事參議辦公室、觀光旅遊局、經濟發展局、民政局、法務局、勞動局、社會局、性別平等辦公室及公務人員協會辦公室，配合辦理空間調整。\n參事參議辦公室：後棟6、14、15樓，已完成空間調整。\n觀旅局：前棟8樓，已於113年1月19日完成空間調整(預計114年第1季完成整體空間調整)。\n經發局：整合於前棟1樓及前後棟2樓，已於113年4月11日完成空間點交，刻正進行設計規劃及施工。\n民政局：前棟6樓，已於113年1月2日完成空間點交，刻正進行設計規劃及施工。\n社會局：後棟3、4及8樓，已於113年7月10日完成空間點交，刻正進行設計規劃。\n性別平等辦公室：前棟7樓，已於113年7月12日完成空間點交，刻正進行設計規劃。\n公務人員協會：前棟7樓，已於113年7月12日完成空間點交，刻正進行設計規劃。\n勞動局俟社會局完成搬遷後調整；民政局及法務局俟經發局完成搬遷後調整。\n三、綜合服務櫃檯設置\n為縮短行政作業流程，以節省洽公時間，本府市政大樓「綜合服務櫃檯」，已於113年9月2日起正式啟用，進駐單位為都市發展局、地政局(桃園區地政事務所)、交通局、衛生局、婦幼發展局、社會局及勞動局，並已於入口大廳明顯處強化指標牌設置，有效引導民眾前往。\n四、空間調整後各機關電話分機安排\n(一)有關各機關電話分機，原則由各機關依其業務性質及需求規劃電話分機。經盤整本次市政大樓辦公空間調整各機關原則均已原號碼移機方式辦理，以避免洽辦公民眾聯繫不到之情形。\n(二)綜合服務櫃檯部分，各進駐機關原則依原服務電話分機以直播、轉接或專線方式提供民眾服務。\n五、原民局空間改善\n依據「行政院與所屬各機關辦公處所空間及面積規劃原則」，一般人員之辦公室人均面積建議為2.42坪，本府原民局位於市政大樓後棟6樓，現況面積為176坪，人均面積為2.23坪，與行政院建議規劃原則相近。\n有關改善原民局辦公廳舍空間一案，經全面盤整本府人均面積較低的機關：教育局人均面積為1.64坪；勞動局人均面積為1.75坪；民政局人均面積為2.03坪；社會局人均面積為2.17坪，需先予考量增加辦公處所空間及面積。\n現行為提供原民局洽公民眾良好之服務空間，可於原6樓原民局外志工服務台旁研議設置洽談區，以供原民局洽公民眾使用。另原民局是否遷出市府，須由原民局自行依業務及整體需求考量進行規劃。"}, {"id": 4, "category": "秘書處業務", "question": "平鎮高中南側整開區設置南區行政園區", "short_answer": "平鎮高中南側整開區，現由本府都市發展局保留行政機關發展空間。本府南區行政園區屬桃園重大城市建設工程，應有完整規劃，且有府會共識及市民的認知支持才能定案，並編列足額預算據以執行，最終將以規劃符合桃園市民需求之行政園區為目標。", "detail_answer": "平鎮高中南側整開區，現由本府都市發展局保留行政機關發展空間。本府南區行政園區屬桃園重大城市建設工程，應有完整規劃，且有府會共識及市民的認知支持才能定案，並編列足額預算據以執行，最終將以規劃符合桃園市民需求之行政園區為目標：112年1月6日市都委會報告重啟，112年11月27日市都委會報告配合鐵路地下化出土段南延調整規劃內容，刻正配合平鎮車站南移、捷運橘線規劃及南區行政藝文副都心概念修正計畫內容，再提市都委會續審。"}, {"id": 5, "category": "秘書處業務", "question": "市府後棟外牆整修案進度(含東西南側)", "short_answer": "一、「本府後棟建築北側結構外牆修復工程」總經費約新台幣(以下同)2億217萬元，已於112年6月27日竣工，並於112年11月1日完成驗收，亦完成後棟無障礙坡道優化及後門新設人行道磚鋪設。\n二、「本府後棟建築東西南側結構外牆修復工程」已委託本府新建工程處代辦，總預算約3億9,500萬元，已於113年底確認需求完成，並賡續辦理專案管理上網招標及修復工程，全案預計119年竣工。", "detail_answer": "一、「本府後棟建築北側結構外牆修復工程」總經費約新台幣(以下同)2億216萬8,300元，已於112年6月27日竣工，並於112年11月1日完成驗收，亦完成後棟無障礙坡道優化及後門新設人行道磚鋪設。\n二、「本府後棟建築東西南側結構外牆修復工程」已委託本府新建工程處代辦，總預算為3億9,417萬2,000元，相關說明如下：\n(一)分年度編列說明如下：\n1.113年度編列3,000萬元。\n2.116年度編列9,000萬元。\n3.117年度編列9,800萬元。\n4.118年度編列1億3,662萬元。\n5.119年度編列3,955萬2,000元。\n  (二)預計辦理期程如下：\n1.確認需求：於113年12月31日完成。\n2.確認專案管理廠商：預定於114年10月1日完成。\n3.確認技術服務廠商：預定於115年2月28日完成。\n4.預算書圖核定：預定於115年12月31日完成。\n5.工程招標上網：預定於116年2月28日完成。\n6.工程標決標：預定於116年5月31日完成。\n7.工程開工：預定於116年7月31日完成。\n8.工程竣工：預定於119年1月31日完成。\n9.工程驗收：預定於119年5月31日完成。"}, {"id": 6, "category": "秘書處業務", "question": "市府周邊民眾洽公停車困難，請問周邊停車場分配情形?", "short_answer": "汽車停車格2,039個及機車停車格2,246個(含收費機車格56格及本處權管134個)。", "detail_answer": "一、目前市府周圍及民營停車場總計提供汽車停車格2,039個及機車停車格2,246個(含收費機車格56格及本處權管134個)，細目如下：\n二、市府周邊騎樓可停放機車路段：縣府路勇一街至信二街口、縣府路民安路口至縣府路270號止、縣府路294巷口至縣府路330號止。\n三、市政府與桃園火車站之間往返，設有免費電動巴士接駁車，每15分鐘1班，離尖峰時段約30分鐘1班，提供民眾免費搭乘。除了電動接駁巴士，貫穿桃園區的巿民免費公車總站亦於市府行政園區內。\n四、西門地下停車場提供2輛7人座免費接駁專車，接駁車由停車場、市政府對開，週一至週五每15分鐘1班車，停車場發車時間自上午8時30分至下午6時，並設有民眾服務電話03-3310804供民眾停車時查詢使用。"}, {"id": 7, "category": "秘書處業務", "question": "秘書處權管停車空間有哪些?", "short_answer": "市政大樓地下停車場：汽車位165個\n相關分配說明如下： \n(一)首長公務座車27個。\n(二)府層長官及秘書處統籌公務用保留車位30個。 \n(三)府層、首長私車車位29個。 \n(四)各局處同仁79個。\n二、市政大樓東側機車停車場：機車位80個\n三、綜合會議廳機車停車場：機車位54個", "detail_answer": "秘書處權管停車場合計共3處，詳細內容如下:\n備註：市政大樓停車場相關分配說明如下： \n(一)首長公務座車27個。 \n(二)府層長官及秘書處統籌公務用保留車位30個。 \n(三)府層、首長私車車位29個。 \n(四)各局處同仁79個。"}, {"id": 8, "category": "秘書處業務", "question": "市政大樓機械停車位使用保養情形", "short_answer": "一、市政大樓地下3樓停車場共計110位停車格。\n二、市政大樓機械停車位每月委託盛鴻機械有限公司定期實施保養2次，並每週由本府駐點機電廠商定期巡檢各項停車場設備1次。\n三、市政大樓機械停車位由臺灣停車設備暨昇降設備安全協會每年安全檢查合格。", "detail_answer": "一、設備及保養維護措施\n(一)本府市政大樓地下3樓停車場設有機械停車設備共計110位停車格，已於107年更新完成。\n(二)市府大樓停車場之安全檢查項目，包括各機件之加油潤滑、清理點檢、性能調整、零件配換等作業，皆依內政部營建署函頒之「建築物昇降設備設置及檢查管理辦法」進行定期保養，並查驗維護人員之專業技術證照(機械停車設備裝修技術士執照)，以維護設備之正常運作，目前市政大樓機械停車設備皆已核發建築物機械停車設備使用許可證。\n(三)市政大樓機械停車位每月委託盛鴻機械有限公司依上述方式定期實施保養2次，並每週由本府駐點機電廠商定期巡檢各項停車場設備1次。\n(四)市政大樓機械停車位依《建築物機械停車設備設置及檢查管理辦法》委託盛鴻機械有限公司向臺灣停車設備暨昇降設備安全協會申請安全檢查，且全數合格並取得使用許可證。\n二、安全措施\n(一)安全裝置：升降式車位上層車位停置定位後會有掛勾將安全鎖固定；循環式下層車位周邊設有安全框，以防止鍊條突然斷裂或是油壓故障導致掉落。\n(二)紅外線感應器：於車位前方柱子設有紅外線感應器，當停車設備運行中感應到有外物進入停車區域內時，會緊急終止設備運作以確保安全性；此外下方車位後方亦設有紅外線感應器，當已有車輛停入會將開關斷電以避免誤觸導致上層車板下壓。"}, {"id": 9, "category": "秘書處業務", "question": "桃園市綜合會議廳相關借用標準及收費為何？", "short_answer": "一、借用及收費情形\n(一)依據桃園市政府市政大樓所屬場地使用管理要點第4點規定，場地使用優先順序如下： \n    1.本府機關、學校。 \n    2.其他政府機關、學校。 \n    3.經立案之人民團體。\n(二)桃園市政府市政大樓所屬場地使用收費基準表", "detail_answer": "一、廳舍活化\n 原桃園市民代表會重新修繕並調整空間，1樓為辦公區及新聞媒體發稿區、2樓為桃園市綜合會議廳，3樓為會議室空間，分別由衛生局、新聞處、本處等管理使用。\n二、借用及收費情形\n(一)依據桃園市政府市政大樓所屬場地使用管理要點第4點規定，場地使用優先順序如下： \n    1.本府及所屬機關、學校。 \n    2.其他政府機關、學校。 \n 3.經立案之人民團體。故經立案之人民團體可申請使用桃園市綜合會議廳。\n(二)桃園市政府市政大樓所屬場地使用收費說明如下：\n 107年完成訂定「桃園市政府市政大樓所屬場地使用收費標準」 (詳如下表)。\n\n桃園市政府市政大樓所屬場地使用收費基準表"}, {"id": 10, "category": "秘書處業務", "question": "場地借用使用情形？", "short_answer": "一、川堂及廣場\n1樓川堂113年8月1日至114年2月28日止，共借用19次，包含活動策展、農產品展售及桃園伴手禮展銷。另府前廣場共借用10次。\n二、會議室\n(一)市政大樓等場地113年8月1日至114年2月28日止借用次數：\n(二)市政大樓目前會議室、大禮堂僅供本府及所屬機關公務使用，未對外租借。\n(三)桃園市綜合會議廳及府前廣場可對外租借。", "detail_answer": "一、川堂\n(一)1樓川堂113年8月1日至114年2月28日止，共借用19次，包含活動策展、農產品展售及桃園伴手禮展銷。另府前廣場共借用10次舉辦活動。\n(二)為配合本府新聞處辦理「ㄚ桃園哥無人商店」活動，於113年12月6日至114年5月31日止借用1樓川堂予新聞處設置智販機冷藏2台、智販機常溫1台、拍貼機1台（已於114年2月3日撤場）及夾娃娃機2台，以利該處進行本市吉祥物ㄚ桃園哥創新IP 暨聯名商品發布。\n二、會議室\n(一)市政大樓等場地於113年8月1日至114年2月28日止借用次數如下：\n市政大樓各場地借用次數一覽表\n(二)因本府市政大樓辦公空間不足、會議室使用相當頻繁，實不敷本府機關使用，故會議室、大禮堂，目前僅供本府及所屬機關公務使用，未對外租借。\n(三)桃園市綜合會議廳及府前廣場可對外租借，並已訂定「桃園市政府市政大樓所屬場地使用收費基準表」，以提升便民服務。\n三、府前廣場借用程序\n依「桃園市政府市政大樓所屬場地使用管理要點」，本府及所屬機關學校、其他政府機關學校及經立案之人民團體辦理政令宣導、公益、文化、社教、休閒體育、民俗節慶及不妨礙公共利益之商業行為等活動，得於使用日前15至90日檢附相關文件資料，來函向本處提出申請。"}, {"id": 11, "category": "秘書處業務", "question": "市政大樓電梯使用情形，有無設置智慧裝置？", "short_answer": "一、安全措施\n(一)本府市政大樓原配置電梯數量前棟4部、後棟7部，計11部。\n(二)目前市政大樓11部電梯皆已核發昇降機設備使用許可證，有效期限為114年8月(每半年換證1次)。\n(三)市政大樓每月定期實施保養2次。\n二、採取分流措施及增設智慧裝置。", "detail_answer": "一、安全措施\n(一)本府市政大樓原配置電梯數量前棟4部、後棟7部，計11部。係於105年12月汰換完成。\n(二)市政大樓電梯機電之安全檢查項目，包括各機件之加油潤滑、清理點檢、性能調整、零件配換等作業，皆依內政部營建署函頒之建築物昇降機維護保養紀錄表進行定期保養，並查驗維護人員之專業技術證照(昇降機設備裝修技術士執照)，以維護電梯之正常運作，目前市政大樓11部電梯皆已核發昇降機設備使用許可證，有效期限為114年8月(每半年換證1次)。\n(三)市政大樓每月依上述方式定期實施保養2次。\n二、分流措施\n市政大樓後棟4部電梯分別採單數及雙數樓層停靠，以達到人群分流及提升使用效能。另12樓以上樓層考量高樓層人員使用需求，皆有停靠。為降低電梯待機之電力損耗及負載變動，市政大樓電梯採用變頻式省電型電梯，規劃平日下午7時至次日上午7時及非上班日期間，前棟大樓僅開放2部電梯，後棟大樓開放3部電梯使用。\n三、增設智慧裝置\n(一)於後棟1、6號電梯加裝能量回饋裝置，將多餘電量儲能後回饋至大樓電網，以達成能源再利用。為達節能效果，本府市政大樓電梯已規劃設置智慧型功能，後棟1、2號電梯及後棟5、6號電梯分別設置連動控制，經軟體運算自行派車，避免電梯站站停。\n(二)已於113年4月針對市政大樓及綜合會議廳共12台電梯裝設物聯網IoT系統。\n(三)市政大樓等電梯將持續評估引進手勢叫車、非接觸式按鈕感應叫車等智慧裝置，以便市府同仁及洽公民眾使用。"}, {"id": 12, "category": "秘書處業務", "question": "市政大樓7號電梯零件更換進度？", "short_answer": "市政大樓後棟7號電梯於403花東大地震後由廠商進行整體檢查，發現部分零件受損嚴重，爰需進行更換。本案於113年7月12日決標，並於113年9月3日驗收完成，持續維護使用安全性與舒適性。\n本處已於114年2月14日完成車廂內門及天井更換，合計經費為6萬7,877元，後續將現況及實際使用狀況陸續安排其他零件更換作業。", "detail_answer": "(同簡答)"}, {"id": 13, "category": "秘書處業務", "question": "目前B1美食街營運狀況？是否使用瓦斯管線？", "short_answer": "一、112年7月1日起至117年6月30日止租予興旺國際餐飲有限公司:\n(一)年租金：70萬元。\n(二)辦理方式：場地招租。\n二、餐廳詳細資訊如下：\n(一)優惠活動：憑市民卡或市府員工證可享自助餐及部分商品折扣。\n(二)自助餐並引進智慧秤重系統(六都首創)，112年9月1日改裝完畢，憑市民卡可享95折優惠。\n三、餐廳廠商使用瓦斯管線相關說明：\n(一)餐廳廠商每日於營業結束時確實關閉瓦斯，並檢查瓦斯管線，每日作成紀錄，倘有發現毀壞、破損、漏氣或其他異常情形時，將立即通報欣桃瓦斯。\n(二)本處每月亦不定期進行抽查暨每年大樓消防安檢。\n(三)另欣桃每年定期至現場檢查，114年2月14日(台中氣爆後)亦派員加強檢查。", "detail_answer": "一、112年7月1日起至117年6月30日止租予興旺國際餐飲有限公司：\n(一)年租金：70萬元。\n(二)辦理方式：場地招租。\n二、餐廳詳細資訊如下：\n(一)優惠活動：憑市民卡或市府員工證可享自助餐及部分商品折扣。\n(二)自助餐並引進智慧秤重系統(六都首創)，112年9月1日改裝完畢，憑市民卡可享95折優惠。\n三、有關市政大樓地下1樓攤商櫃位租予房仲事宜，說明如下：\n(一)經查該房仲(明瑋霞觀：接待會館於桃園市桃園區縣府路308號)合法設置接待會館，本攤位僅為宣傳，無實質販售行為。\n(二)該櫃位已於113年4月12日下午撤櫃。\n(三)本案地下1樓場地招租契約僅規範不得販售檳榔、菸、酒及不符合食品衛生等相關法令之食品等，已函知廠商除既定營業項目外，倘有新增項目均需向本處核備。\n四、餐廳廠商使用瓦斯管線相關說明：\n(一)餐廳廠商每日於營業結束時確實關閉瓦斯，並檢查瓦斯管線，每日作成紀錄，倘有發現毀壞、破損、漏氣或其他異常情形時，將立即通報欣桃瓦斯。\n(二)本處每月亦不定期進行抽查暨每年大樓消防安檢。\n(三)另欣桃每年定期至現場檢查，114年2月14日(台中氣爆後)亦派員加強檢查。"}, {"id": 14, "category": "秘書處業務", "question": "市政大樓相關節能減碳措施？用水用電量？市府碳排放量？", "short_answer": "一、節電措施\n(一)電梯皆使用變頻式省電型電梯。\n(二)電梯設置智慧型功能連動控制。\n(三)蒸飯箱及飲水機設定時器。\n(四)緊急及公共空間照明已全數汰換為T5省電燈管或LED燈具。\n(五)利用需量電力監控系統。\n(六)每年用電約700萬餘度。\n(七)因應113年電價漲幅12%(流動電費調漲約14%，基本電費無漲價，合計電費平均約漲12%)所增加之300餘萬元費用，尚可由本處業務費勻支。\n(八)113年已加入台電新修正之三段式電價優惠方案暨冰水主機案節電，惟因應自113年10月份起漲幅約12%（流動電費調漲約14%，基本電費無漲價，合計電費平均約漲12%），114年費用預計為3,840萬元，預算為3,700萬元，所增所加之140餘萬元費用，尚可由本處業務費勻支。\n二、節水措施\n再利用雨水資源：回收系統。\n茶水間及廁所用水：即時維修，更換省水標章衛生設備。\n每年用水約6萬餘度，水費平均約100萬餘元(每月平均約8萬3,000元)\n三、本府市政大樓113年碳排放量約3431噸，112年碳排放量約為3,450噸，111年碳排放量約為3,807噸，113年較112年減少約19噸。", "detail_answer": "一、節電措施\n近3年用電資料分析(市政大樓前後棟+廣場)\n(一)減少電梯用電：市政大樓後棟4部電梯分別採單數及雙數樓層停靠，以達到人群分流及提升使用效能。另12樓以上樓層考量高樓層人員使用需求，皆有停靠。為降低電梯待機之電力損耗及負載變動，市政大樓電梯採用變頻式省電型電梯，規劃平日下午7時至次日上午7時及非上班日期間，前棟大樓僅開放2部電梯，後棟大樓開放3部電梯使用。\n(二)電梯能源再利用：於後棟1、6號電梯加裝能量回饋裝置，將多餘電量儲能後回饋至大樓電網，以達成能源再利用。為達節能效果，本府市政大樓電梯已規劃設置智慧型功能，後棟1、2號電梯及後棟5、6號電梯分別設置連動控制，經軟體運算自行派車，避免電梯站站停。\n(三)裝設定時器限定供電時段：全面於市政大樓公共區域之飲水機及蒸飯箱等設備裝設定時器，以限定供電時段，減少非使用時段耗電量較大之設備電力消耗。\n(四)全面汰換為省電燈具：本府市政大樓公共空間照明、消防用之緊急照明及逃生指示燈具已全數汰換為T5省電燈管或LED燈具，以節省照明用電。\n(五)監控電力運用：為達節電效果，運用需量電力監控系統掌握市政大樓電力使用，以使實際用電量與契約容量達平衡及最佳化。\n(六)本處於113年辦理後棟冰水主機購置暨中央空調系統節能方案，購置高效能冰水主機做為主要設備，與既有冰水主機輪替運轉，及改善冷卻水塔散熱功能，以降低用電度數。\n(七)每年用電約700萬餘度。\n(八)112年度市政大樓因辦公廳舍調整，大樓內人數約為3,027人，較111年度人數約為3,470人低，故112年度用電度數約為687萬度，較111年度752萬度低，另113年大樓人數約為3,093人，用電度數約為692萬度，與112年大致持平。\n(九)因應113年電價漲幅12%(流動電費調漲約14%，基本電費無漲價，合計電費平均約漲12%)所增加之300餘萬元費用，尚可由本處業務費勻支。\n(十)113年已加入台電新修正之三段式電價優惠方案暨冰水主機案節電，惟因應自113年10月份起漲幅約12%(流動電費調漲約14%，基本電費無漲價，合計電費平均約漲12%)，114年費用預計為3,840萬元，預算為3,700萬元，所增所加之140餘萬元費用，尚可由本處業務費勻支。\n二、節水措施\n近3年用水資料分析(市政大樓)\n再利用雨水資源：本府市政大樓設有雨水回收系統，運用儲集容量約4噸之回收水澆灌周邊植栽。\n茶水間及廁所用水：定期派員巡檢茶水間及廁所，以即時維修漏水設備並調節水龍頭達最佳出水量，並利用市政大樓1樓電子動態字幕機宣傳節水措施。廁所已重新配置相關用水設備及給排水管線，更換省水標章衛生設備，小便器亦全面安裝感應式節水沖水器。\n每年用水約6萬餘度，水費約100萬餘元(每月平均約8萬3,000元)，近年用水皆持平。\n112年度市政大樓因辦公廳舍調整，大樓內人數約為3,027人，較111年度人數約為3,470人低，故112年度用水度數約為5萬5,000度較111年度6萬2,800度低，113年大樓人數約為3,093人，用水度數約為5萬4,600度，與112年大致持平。\n三、本府市政大樓113年碳排放量約3,431噸，112年碳排放量約為3,450噸，111年碳排放量約為3,807噸，113年較112年減少約19噸(0.55%)。"}, {"id": 15, "category": "秘書處業務", "question": "市政大樓能源使用調查委託專業技術服務案進度？", "short_answer": "考量市政大樓前棟空調設備尚未建立評估其效率之完整系統，且本大樓用電線路亦未明確區分公共區域及各局(處)辦公區域專用電源迴路，為有效掌控能源使用流向及推動節能減碳管理，故辦理此案，預計114年6月前完成以有效掌控能源使用流向及推動節能減碳管理。", "detail_answer": "考量市政大樓前棟空調設備尚未建立評估其效率之完整系統，且本大樓用電線路亦未明確區分公共區域及各局(處)辦公區域專用電源回路，為有效掌控能源使用流向及推動節能減碳管理，故辦理此案，預計114年6月前完成以有效掌控能源使用流向及推動節能減碳管理。\n期程如下\n(一)114年1月22日：上網公告。\n(二)114年2月4日：開標。\n(三)114年2月17日：決標。\n(四)114年4月：預計完成初期調查。\n(五)114年第2季：預計完成成果報告。"}, {"id": 16, "category": "秘書處業務", "question": "本府市政大樓因應停水或輪流供水因應作為?", "short_answer": "持續留意水情燈號，隨時注意自來水公司發布停止供水或輪流供水相關訊息，預先儲備用水。停止供水或輪流供水時本府市政大樓處置措施：\n(一)持續宣導節約用水，以養成市府同仁節約用水習慣。\n(二)加強公共區域離峰及特定時段降低管壓供水。\n(三)每日盤點市政大樓水塔水量並聯繫調派水車，緩解供水需求。\n(四)各樓層廁所放置大型儲水桶，以預先儲水作為缺水時緊急備援水源之用。\n(五)停供市政大樓澆灌、外牆沖洗、清洗人行道及水溝等非必要或非急需用水。\n(六)於市政大樓跑馬燈刊登節約用水、停限水等相關訊息之發布。", "detail_answer": "持續留意水情燈號，隨時注意自來水公司發布停止供水或輪流供水相關訊息，預先儲備用水。停止供水或輪流供水時本府市政大樓處置措施：\n(一)持續宣導節約用水，以養成市府同仁節約用水習慣。\n(二)加強公共區域離峰及特定時段降低管壓供水。\n(三)每日盤點市政大樓水塔水量並聯繫調派水車，緩解供水需求。\n(四)各樓層廁所放置大型儲水桶，以預先儲水作為缺水時緊急備援水源之用。\n(五)停供市政大樓澆灌、外牆沖洗、清洗人行道及水溝等非必要或非急需用水。\n(六)於市政大樓跑馬燈刊登節約用水、停限水等相關訊息之發布。\n儲(送)水相關設備及前置作業盤點"}, {"id": 17, "category": "秘書處業務", "question": "市府大樓友善措施？哺集乳室設備汰換進度？", "short_answer": "市府大樓友善措施：\n一、為提升友善環境，市府設置哺乳室3間、親子廁所4間、尿布台16組、無障礙廁所21間，及衛生棉貼心盒2處等友善措施。\n二、哺集乳室：\n(一)計3間，位於後棟1樓、3樓及13樓，哺乳室內提供濕紙巾、溢乳墊、酒精及母乳袋等，並於每日巡查即時補足。\n(二)哺集乳室設備汰換：為使用者健康和安全考量，規劃辦理本府哺(集)乳室改善作業，全案預算經費約為新台幣170萬元，已逕洽廠商進行現況勘查，刻正辦理需求確認及規劃修繕項目，預計於今年(114年)年底前陸續改善完成。\n三、親子廁所計4間，位於前棟2樓、6樓及後棟4樓、8樓廁所，廁間皆設有兒童洗手台、尿布台及兒童安全座椅。\n四、尿布台共16組，設置於親子廁所、無障礙廁所、哺乳室及部分一般廁間內。\n五、無障礙廁所計21間，除2樓及6樓外，其餘各樓層皆有設置。\n六、衛生棉貼心盒設置2處，位於本府市政大樓1樓女廁，以擴大推動月經平權，營造月經平權友善環境。", "detail_answer": "一、為提升友善環境，市府設置哺乳室3間、親子廁所4間、尿布台16組、無障礙廁所21間，及衛生棉貼心盒2處等友善措施。\n二、哺集乳室：\n(一)計3間，位於後棟1樓、3樓及13樓，哺乳室內提供濕紙巾、溢乳墊、酒精及母乳袋等，並於每日巡查即時補足。\n(二)哺集乳室設備汰換：為使用者健康和安全考量，規劃辦理本府哺(集)乳室改善作業，全案預算經費約為新台幣170萬元，已逕洽廠商進行現況勘查，刻正辦理需求確認及規劃修繕項目，預計於今年(114年)年底前陸續改善完成。\n三、親子廁所計4間，位於前棟2樓、6樓及後棟4樓、8樓廁所，廁間皆設有兒童洗手台、尿布台及兒童安全座椅。\n四、尿布台共16組，設置於親子廁所、無障礙廁所、哺乳室及部分一般廁間內。\n\n尿布台設置地點及數量表\n五、無障礙廁所計21間，除2樓及6樓外，其餘各樓層皆有設置。\n六、衛生棉貼心盒設置2處，位於本府市政大樓1樓女廁，自113年5月9日設置，每日巡查2次，並即時補充，以擴大推動月經平權，營造月經平權友善環境。\n七、本府市政大樓於2、4、6及8樓皆設有親子廁所，另依「既有公共場所親子廁所盥洗室替代改善計畫作業程序及認定原則」於10樓及14樓設有替代改善設備，均符合相關法規(服務範圍不得超過三層)；無障礙廁所每增加3層加設1處，本大樓共設有21間，符合法規；哺乳室僅規定應設置，無規定數量，本大樓共設有3間。\n八、本府養護工程處於112年依照內政部營建署「市區道路人行道路口導盲設施設計指南」完成本府市政大樓後棟人行道路口警示磚「定位帶」及「警示帶」設置，以避免視障民眾錯過或無法識別警示帶，致無法順利通過無障礙斜坡處路口。\n九、113年7月於後棟1樓綜合服務櫃台旁新設無障礙坡道，113年12月優化後棟1樓坡道(坡度延長、新增扶手及服務鈴)。"}, {"id": 18, "category": "秘書處業務", "question": "本府辦公大樓委外作業情形?", "short_answer": "一、考量整棟市政大樓廳舍管理維護工作量繁大、繁複及用電設備安全性，且因應本府專業技術人力不足，委由專業廠商維護保養市政大樓。\n二、委外維護保養作業現況：\n(一)清潔維護工作：信實公寓大廈管理維護股份有限公司。\n(二)電話系統保養：台恩通信有限公司。\n(三)機水電、消防：正和機電技術工程有限公司。\n(四)電梯定期維護：日立永大股份有限公司桃園分公司。\n(五)空調：普泉工程股份有限公司。\n(六)會議室、大禮堂、廣播系統維護：忠伊科技有限公司。\n(七)市府周圍綠美化維護：綠手指園藝社。\n(八)飲用水設備：賀溢企業有限公司。\n(九)以上合計支出：每月約381萬元(每年約4,569萬元)。\n三、場地招租作業現況：\n(一)地下1樓場地(招租)：興旺國際餐飲有限公司。\n(二)1樓便利商店場地(招租)：全家便利商店股份有限公司。\n(三)以上合計收入：每月約12萬元(每年約143萬元)。", "detail_answer": "一、考量整棟市政大樓廳舍管理維護工作量繁大、繁複及用電設備安全性，且因應本府專業技術人力不足，委由專業廠商維護保養市政大樓。\n二、委外維護保養及場地招租作業現況：\n備註：\n委外維護保養合計支出：每月約381萬元(每年約4,569萬元)\n場地招租合計收入：每月約12萬元(每年約143萬元)"}, {"id": 19, "category": "秘書處業務", "question": "本府市政大樓消防作為", "short_answer": "一、每週1次進行例行性消防設備清潔保養維護及測試，包含泡沫系統、自動撒水系統、火警系統、避難設備及排煙系統等，如有發現缺失，立即改善。\n二、本府市政大樓於113年8月依消防法規完成消防安全設備檢修及申報事宜(每年一次)。", "detail_answer": "一、每週1次進行例行性消防設備清潔保養維護及測試，如有發現缺失，立即改善，其工作項目如下：\n(一)泡沫系統設備\n(二)自動撒水設備\n(三)火警自動警報系統(R型總機)\n(四)避難設備\n(五)排煙系統\n(六)室內消防栓(含確認滅火器效能及藥劑期限)\n(七)室外各送水口及採水口\n(八)緊急照明燈\n(九)標示設備\n(十)其他消防安全相關業務\n二、113年8月至114年2月消防設備改善如下：\n(一)後棟地下3樓辦理泡沫泵浦底閥修繕。\n(二)前棟1樓執勤中心辦理消防受信總機修繕。\n(三)後棟8樓辦理中繼撒水機組及輔助泵浦壓力開關修繕。 \n(四)後棟13樓人事處辦理影印機室上方撒水頭修繕。\n(五)後棟1樓及11樓辦理火警自動警報系統連線測試。\n(六)前棟4樓農業局檔案室辦理火警探測器線路改接及測試。\n三、本府市政大樓於113年8月依消防法規完成消防安全設備檢修及申報事宜。本年度刻正辦理檢修作業，其檢修內容包含各項火警設備火警測試、緊急廣播系統測試、各式消防、採水、撒水等系統測試及各式標示設備、緊急照明設備及避難器具檢查。"}, {"id": 20, "category": "秘書處業務", "question": "登革熱疫情市府作為", "short_answer": "一、每月共計派員2人次，進行市政大樓及綜合會議廳病媒蚊蟲防治噴藥、投藥作業1次。\n二、每週共計派員10人次確認市政大樓前、後棟地下停車場捕蚊燈、黏蚊板及防蚊防臭氣密水溝蓋妥善及完整。\n三、每日於公共區域進行清潔維護工作，每週共計派員60人次巡視清理本府市政大樓、16樓空中花園景觀池與綜合會議廳周邊環境、積水容器及周邊排水溝渠。", "detail_answer": "一、為防止病媒蚊及幼蟲孳生，每月共計派員2人次，進行市政大樓及綜合會議廳病媒蚊蟲防治噴藥、投藥作業1次，並於颱風季時加強辦理相關工作，以落實病媒蚊蟲防治工作。\n二、為防止病媒蚊孳生，每週共計派員10人次確認市政大樓前、後棟地下停車場捕蚊燈、黏蚊板及防蚊防臭氣密水溝蓋妥善及完整。\n三、市府清潔人員每日於公共區域進行清潔維護工作，每週共計派員60人次巡視清理本府市政大樓、16樓空中花園景觀池與綜合會議廳周邊環境、排水溝渠及積水容器，以維護本府市政大樓及桃園市綜合會議廳環境清潔品質、強化公共區域環境消毒、因應病媒蚊蟲防疫及防範登革熱。"}, {"id": 21, "category": "秘書處業務", "question": "駐衛警人力調配？後續保全人力規劃？", "short_answer": "一、為維護市政大樓安全，本處依據「各機關學校團體駐衛警察設置管理辦法」設置本府駐衛警察，目前配置小隊長1名及隊員12名，共計13名全日排班輪值。\n二、本府警察局保安警察大隊支援前棟大門每日24小時及後棟大門上班日12小時(07：00-19：00)哨點安全維護勤務，以維護市政大樓出入口安全。\n三、本府目前駐衛警察共有13名人員(含小隊長)，囿於115年1月初將有1名隊員屆齡退休(遇缺不補)，為持續維護本府市政大樓及綜合會議廳之安全與秩序管理，預計114年第4季於政府電子採購網共同供應契約採購警衛勤務人員1名，以確保人力量能，協助值勤工作業務推動。", "detail_answer": "一、為維護市政大樓安全，本處依據「各機關學校團體駐衛警察設置管理辦法」設置13名本府駐衛警察(小隊長1名及隊員12名)，全日進行排班輪值。其中1人為小隊長，負責隊員勤務之調配、管理督導考核及行政工作協調，值班時段及配置人力詳如下表。\n二、本府警察局保安警察大隊支援前棟大門每日24小時及後棟大門上班日12小時(07：00-19：00)哨點安全維護勤務，以維護市政大樓出入口安全。\n三、本府目前駐衛警察共有13名人員(含小隊長)，囿於115年1月初將有1名隊員屆齡退休(遇缺不補)，為持續維護本府市政大樓及綜合會議廳之安全與秩序管理，預計114年第4季於政府電子採購網共同供應契約採購警衛勤務人員1名，以確保人力量能，協助值勤工作業務推動。"}, {"id": 22, "category": "秘書處業務", "question": "市政大樓後棟屋頂防水工程進度?", "short_answer": "本府後棟市政大樓因屋頂長年日晒雨淋，歷經氣候變遷，造成原有防水老化及損壞情形，爰陸續規劃屋頂防水改善作業。\n本府市政大樓後棟16樓屋頂業於113年12月份完成屋頂防水層及屋突區域防水補強，並賡續洽廠商進行17樓屋頂防水現況勘查，刻正辦理規劃修繕項目及面積，預計於今年(114年)年底前陸續改善完成。", "detail_answer": "(同簡答)"}, {"id": 23, "category": "秘書處業務", "question": "市政大樓後棟中央空調冰水主機汰換進度?", "short_answer": "一、為維持本府市政大樓舒適洽辦公環境及降低空調設備耗能，爰購置高效能冰水主機。設置完成後將採3台冰水主機輪替運轉，預期可有效節能，並避免任一機組故障時市政大樓空調系統中斷。\n二、安裝工期：預計150日曆天。\n三、年度經費：1,700萬元(財物採購案)，98萬元(勞務採購案)。\n四、委託規劃設計及監造技術服務勞務採購案：立昕工程技術顧問有限公司得標。\n五、財物採購案：中興電工機械股份有限公司得標。\n六、財物採購案已於113年7月5日決標、113年12月12日驗收完成。", "detail_answer": "一、為維持本府市政大樓舒適洽辦公環境及降低空調設備耗能，爰購置高效能冰水主機。設置完成後將採3台冰水主機輪替運轉，預期可有效節能，並避免任一機組故障時市政大樓空調系統中斷。\n二、施工工項：\n(一)新增400噸冰水主機1台\n(二)汰換後棟2台800噸冷卻水塔散熱材\n(三)汰換整合監控系統\n三、安裝工期：預計150日曆天。\n四、年度經費：1,700萬元(財物採購案)，98萬元(勞務採購案)。\n五、委託規劃設計及監造技術服務勞務採購案：立昕工程技術顧問有限公司得標\n(一)113年3月6日：決標\n(二)113年3月19日：核定基本設計\n(三)113年4月22日：細部設計審查會議\n(四)113年5月13日：核定細部設計\n(五)113年12月25日：驗收完成\n六、財物採購案：中興電工機械股份有限公司得標\n(一)113年5月25日：公告上網\n(二)113年6月25日：開標\n(三)113年7月5日：決標\n(四)113年12月12日：驗收完成\n七、預計期程：113年底前完成。"}, {"id": 24, "category": "秘書處業務", "question": "基地台增設計畫？", "short_answer": "一、有關基地台共構案(台灣大哥大、中華電信、遠傳電信等3家共構，由台灣大哥大為代表人)於112年11月市政大樓頂樓場勘。113年初請廠商就屋頂防水層防護、電磁波規範、影響範圍等研議可行性。\n二、廠商於2月補充說明相關疑慮及執行計畫，3月再次現勘確認現場環境，惟歷經4月3日地震及10月3日屏東縣內埔鄉大樓頂樓的基地台，被山陀兒颱風吹落於大樓中庭之事件，考量建築物載重、耐震、抗風等情形，爰電信基地台應與外牆整修工程及屋頂防水同步辦理且於安全無虞前提下再行研議。\n三、工程期程預計4個月。", "detail_answer": "一、有關基地台共構案(台灣大哥大、中華電信、遠傳電信等3家共構，由台灣大哥大為代表人)於112年11月市政大樓頂樓場勘。113年初請廠商就屋頂防水層防護、電磁波規範、影響範圍等研議可行性。\n二、廠商於2月補充說明相關疑慮及執行計畫，3月再次現勘確認現場環境，惟歷經4月3日地震後，將評估建築物耐重等情形，於安全無虞前提下再行研議。\n三、工程期程預計4個月(全部工程 D+120天)\n電力申請作業 D+15天；電力佈放工程 D+10天 \n光纜傳輸工程 D+15天；機房建置工程 D+5天 \n鋼構骨架備料 D+30天 \n屋頂吊掛作業 D+5天 \n屋頂美化安裝作業工程 D+20天 \n天線安裝工程 D+15天 \n室外涵蓋驗收工程 D+5天 \n四、經查本府市政大樓後棟係屬鋼骨鋼筋混凝土構造，並以二次構件固定混凝土帷幕系統，且帷幕系統設計主要以承受本身帷幕自體載重所設計。\n再查，本府市政大樓後棟於民國83日建置至今已逾30年，建物連接帷幕系統之二次構件已有多處鏽蝕損壞處，且分別於105年9月27、28日梅姬颱風、108年7月14日丹娜絲颱風及110年10月圓規颱風侵襲，造成本府市政大樓後棟牆面剝落，並已規劃結構外牆整修工程，爰後棟外牆及女兒牆面現況已不適合再附掛相關設施。\n另鑒於「屏東縣內埔鄉大樓頂樓的基地台，被山陀兒颱風吹落於大樓中庭」且本府外牆整修工程施作將破壞或影響屋頂防水層或附掛設施，爰電信基地台應與外牆整修工程及屋頂防水同步辦理，以避免牆面無法承受附掛載掉落及漏水或因外牆整修工程造成基地台破壞之情形。"}, {"id": 25, "category": "秘書處業務", "question": "社團使用市政大樓地下室場地事宜", "short_answer": "一、本(114)年度各社團使用地下室場地情形如下：\n(一)B2文康休閒中心：桌球社、瑜珈社、舞蹈研究社。\n(二)B2川堂：舞蹈社、汾陽氣功社、太極拳研習社。\n二、原市政大樓B1川堂借用予社團活動使用，初期社員人數較少，不影響主要動線的行進，惟本年度因參與社團活動人數增加，以致影響洽公民眾及同仁辦公進出川堂之路權。\n三、為考量社團使用環境與洽公民眾及同仁動線，爰提供較大之B2川堂空間供社團使用，可使用空間自原本約60坪增加至81坪，減少社團與洽辦供民眾互相干擾之情形，經調整後已獲得數次市政信箱的肯定。", "detail_answer": "(同簡答)"}, {"id": 26, "category": "秘書處業務", "question": "市政大樓等會議室會議麥克風音響系統汰換進度？", "short_answer": "一、本府市政大樓12樓會議室(以下簡稱會議室)因使用頻率高且有多種不同形式會議使用，為提升會議室使用彈性度及會議使用效率，同時可降低會議音量對周圍辦公室影響，擬汰換更新採用麥克風設備內建喇叭產品，以提供更完善合適會議空間，爰辦理旨案採購事宜。\n二、安裝工期：14日曆天。\n三、年度經費：預算金額115萬元，採購金額145萬元(保留後續擴充期間自決標日次日起至114年12月31日止或擴充上限金額為本案公告之預算金額扣減決標金額所得餘額總計加計30萬元)。\n四、財物採購案：忠伊科技有限公司得標。\n五、期程：113年8月20日決標，113年8月25日完工，113年9月11日驗收完竣。", "detail_answer": "一、本府市政大樓12樓會議室(以下簡稱會議室)因使用頻率高且有多種不同形式會議使用，為提升會議室使用彈性度及會議使用效率，同時可降低會議音量對周圍辦公室影響，擬汰換更新採用麥克風設備內建喇叭產品，以提供更完善合適會議空間，爰辦理旨案採購事宜。\n二、施工工項：\n(一)汰換桌上型主席會議麥克風 1台。\n(二)汰換桌上型列席會議麥克風 59台。\n(三)設備安裝與舊系統主機及視訊系統連動設定及調整。\n三、安裝工期：14日曆天。\n四、年度經費：預算金額115萬元，採購金額145萬元(保留後續擴充期間自決標日次日起至114年12月31日止或擴充上限金額為本案公告之預算金額扣減決標金額所得餘額總計加計30萬元)。\n五、財物採購案：忠伊科技有限公司得標。\n(一)113年8月5日：公告上網\n(二)113年8月9日：開標\n(三)113年8月14日：評審\n(四)113年8月20日：決標\n六、期程：113年8月20日決標、8月25日完工、9月11日驗收完竣。"}, {"id": 27, "category": "秘書處業務", "question": "市府大樓是否可攜帶寵物入內？有何門禁管制？", "short_answer": "依據「桃園市政府辦公大樓門禁管理要點」，除導盲犬以外之動物禁止進入市政大樓。", "detail_answer": "一、依據「桃園市政府辦公大樓門禁管理要點」第8點規定，有下列情形之一者，本府駐衛警察應禁止進入本大樓：(三)攜帶導盲犬以外之動物或影響安全之危險物品。\n二、考量本府市政大樓內辦公空間較為擁擠，且1樓有喜憨兒及視障按摩小站工作人員，倘攜帶寵物入內恐影響或干擾其工作(噪音等)。\n三、其他五都市政大樓開放寵物入內規定如下：\n(除本市及臺南市外，其他四都均有條件開放寵物入內，惟臺南市政府權宜作法：實際遇到處理方式，如果有放在提籃內不會強硬禁止，但若是牽繩會由駐衛警察勸導)"}, {"id": 28, "category": "秘書處業務", "question": "市府員工餐廳食農教育辦理情形？", "short_answer": "本處請租用廠商「興旺餐飲管理顧問有限公司」輔導攤商優先考量使用國產食材。\n本處參加農業部農糧署「113年政府機關(構)及公營事業使用在地生產農產品獎勵選拔活動」榮獲獎勵。", "detail_answer": "為共同實踐注重健康飲食及支持國產農產品、促進在地經濟及農業之發展本市推動食農教育相關事項，本處請市政大樓地下1樓租用廠商「興旺餐飲管理顧問有限公司」，輔導攤商優先考量使用國產食材。\n於113年參加農業部農糧署「113年政府機關(構)及公營事業使用在地生產農產品獎勵選拔活動」，以採購符合三章一Q(三章一Q為：CAS台灣優良農產品標章、台灣有機農產品標章、產銷履歷農產品標章，及臺灣農產品生產追溯條碼QR-Code)之米食，榮獲獎勵。"}, {"id": 29, "category": "秘書處業務", "question": "市政大樓是否設置無線充電座？", "short_answer": "本處114年1月已於本府市政大樓1樓民眾洽公之綜合服務櫃台及經濟發展局商業行政科繕寫處，設置免費無線充電座，並考量有線充電需求，爰一併設置市場主流接頭之有線充電座，以提供洽辦公民眾安心充電之便民服務。\n本處亦於114年1月函請本府各機關考量其業務性質、服務對象及辦理內容，依實際需求自行評估是否於預算內辦理服務櫃台增設手機無線充電座，以達到提升友善服務品質之效。", "detail_answer": "(同簡答)"}, {"id": 30, "category": "秘書處業務", "question": "本市有多少個締盟城市?本次報告期間，本市與締盟城市及國際城市間在各方面有哪些實質交流互動?", "short_answer": "一、15國38個締盟城市。\n二、113年8月1日至114年3月25日期間之交流：\n(一)與締盟城市之交流計14場。\n(二)與締盟城市以外城市之交流計13場，包含交流及拜會接待等。\n→(一)+(二)共計27場(28國331人次)\n(三)本處辦理首長等參與國際事務及出席國際性活動計22場，包含出席駐台代表處國慶酒會等。", "detail_answer": "一、本市目前共有15國38個締盟城市，分別為亞洲14個、美洲14個、中南美洲1個、歐洲6個、大洋洲3個。\n\n二、本處113年8月1日至114年3月25日期間(本處官網公佈之資訊)之交流\n(一)與締盟城市之交流計14場：\n\n(二)與締盟城市以外城市之交流計13場:\n→(一)+(二)共計27場(28國331人次)\n三、本處辦理首長等參與國際事務及出席國際性活動計19場，包含出席駐台代表處國慶酒會等：\n\n★補充參考：本府其他局處國際交流"}, {"id": 31, "category": "秘書處業務", "question": "請臚列本次報告期間，本市與各國間重要的交流活動。", "short_answer": "辦理「桃園市‧日本茨城縣筑波未來市友好城市協定簽署儀式」\n辦理「各國駐台辦事處職員交流活動」\n辦理「2025台灣燈會在桃園—締盟城市等外賓暨表演團體接待事宜」\n辦理「日本千葉縣成田市小泉一成市長演講」\n辦理「貝里斯與本市原住民族交流活動」\n辦理「櫻原際會 神遊桃園—駐台大使及代表走訪拉拉山巨木區暨賞櫻一日遊活動」\n辦理「桃園市與馬紹爾群島共和國奧爾環礁姊妹市協定簽署儀式」", "detail_answer": "本次工作報告期間，本市持續辦理國際事務及城市外交業務。茲將重點工作臚列如下：\n辦理「桃園市‧日本茨城縣筑波未來市友好城市協定簽署儀式」\n113年10月23日辦理本市與日本茨城縣筑波未來市友好城市協定簽署儀式，外交部台灣日本關係協會總領事回部辦事陳忠正及日本台灣交流協會高羽陽副代表出席見證；筑波未來市為本市第37個締盟城市，未來雙方將持續就農業、青少年棒球、文化及經濟等不同領域深化交流。\n辦理「各國駐台辦事處職員交流活動」\n113年12月21日邀請新加坡駐台北商務辦事處、史瓦帝尼王國大使館、關島台灣辦事處、馬紹爾群島共和國大使館、駐臺北韓國代表部、泰國貿易經濟辦事處、沙烏地阿拉伯商務辦事處、法國在台協會、馬來西亞友誼及貿易中心及德國在台協會等駐台使館及代表處職員，於本市觀音區林家古厝等景點辧理各國駐台辦事處職員交流活動，增進彼此情誼，以利後續國際交流業務合作順遂。\n辦理「2025台灣燈會在桃園—締盟城市等外賓暨表演團體接待事宜」\n    (一)2025台灣燈會在桃園期間，辦理締盟城市等外賓暨表演團體歡迎晚宴交流、出席燈會開幕式、參觀燈會及參訪市政建設等接待事宜，燈會期間總計接待外賓5國16城市計65人，表演團體3團計56人。除開幕式外，亦安排其他締盟城市等訪團參觀燈會及生質能中心、桃園市立兒童美術館等市政建設，讓外賓了解桃園市政發展。\n    (二)本次邀請締盟城市表演團體：千葉縣和太鼓凪、宮崎縣南部式及菲律賓安吉利斯城市大學舞蹈團等3團計56人蒞桃演出，除安排參與2月12日下午踩街遊行外、亦安排12及13日於主舞台演出。\n辦理「日本千葉縣成田市小泉一成市長演講」\n    114年2月12日日本千葉縣成田市小泉一成市長擔任本處辦理講座之主講人，以「成田市觀光文化及國際交流簡介」為題，分享該市的觀光及文化魅力等，讓市民更加認識本市友好城市—成田市，拓展國際視野。\n辦理「貝里斯與本市原住民族交流活動」\n    114年2月14日本府原住民族行政局及本處於貝里斯橘道鎮拉德里克．雪普德市長一行受邀出席「2025台灣燈會在桃園」開幕式期間，共同合辦貝里斯與本市原住民族交流活動，貝里斯大使館碧坎蒂大使亦受邀出席，行程安排參訪本市原住民族文化會館、撒烏瓦知部落，及KIRI國際原住民族文創園區，並與本市原住民族耆老及原民局團隊等進行原住民族相關議題交流，分享彼此就原住民族文化相關保存、推廣、與產業發展結合之政策推動情形，亦就未來可能之交流面向交換意見。\n辦理「櫻原際會 神遊桃園—駐台大使及代表走訪拉拉山巨木區暨賞櫻一日遊活動」\n114年2月27日邀請駐台大使及代表走訪復興區拉拉山國家森林遊樂區神木步道，親身感受桃園原鄉風景秀麗之美，並前往原住民族行政局輔導之原住民族餐廳品嚐特色美食及體驗手作原民傳統小物。本次活動除增進與駐台單位間之互動，亦藉此有效行銷桃園觀光、原住民族文化及農特產。\n辦理「桃園市與馬紹爾群島共和國奧爾環礁姊妹市協定簽署儀式」\n114年3月17日辦理本市與馬紹爾群島共和國奧爾環礁姊妹市協定簽署儀式，馬紹爾群島共和國大使館卡蒂爾大使、外交部駐馬紹爾群島共和國夏季昌大使及亞東太平洋司許書智副司長等出席見證；奧爾環礁為本市第38個締盟城市，未來雙方將持續就文化、觀光、經濟及教育等不同領域深化交流。"}, {"id": 32, "category": "秘書處業務", "question": "本年度國際交流規劃？", "short_answer": "辦理例行性接待外賓拜會及參訪事宜。\n協助他局處辦理大型活動接待外賓，如龍岡米干節接待各國駐台大使代表及石門水庫楓半馬接待締盟城市參與外賓等。\n邀請締盟城市出席「2025台灣燈會在桃園」。\n辦理代表處基層職員交流活動。\n規劃與城市網(CityNet)共同辦理城市防災減災線上研討會。\n規劃與其他城市洽談簽約事宜。\n適時規劃首長出訪締盟城市等行程，亦將配合他局處出訪案規劃辦                                                                           理。", "detail_answer": "本(114)年度國際交流規劃如下:\n外賓接待事宜\n(一)例行性接待蒞桃外賓拜會市府及參訪市政建設等。\n(二)援例協助他局處辦理大型活動接待外賓，如協助本府觀光旅遊局接待出席龍岡米干節系列活動—火把節及使節宴之各國駐台大使代表，及協助體育局接待參與石門水庫楓半馬之締盟城市外賓等。\n(三)邀請締盟城市首長及表演團體等出席「2025台灣燈會在桃園」，燈會期間總計接待外賓5國16城市計65人，表演團體3團計56人。\n(四)援例辦理代表處基層職員交流活動。\n二、參與國際組織活動\n規劃與城市網(CityNet)共同辦理城市防災減災線上研討會。\n三、辦理國際性活動\n(一)辦理「櫻原際會 神遊桃園—駐台大使及代表走訪拉拉山巨木區暨賞櫻一日遊活動」。\n(二)辦理代表處基層職員交流活動。\n四、城市締盟\n(一)113年10月23日辦理本市與日本茨城縣筑波未來市友好城市協定書簽署儀式。\n(二)114年3月17日辦理本市與馬紹爾群島共和國奧爾環礁姊妹市協定簽署儀式。\n(三)規劃與其他城市洽談簽約事宜。\n五、首長出國事宜\n    本處將適時規劃首長出訪締盟城市等行程，另亦將配合他局處出訪案規劃辦理。"}, {"id": 33, "category": "秘書處業務", "question": "請問本年是否有締盟規劃？", "short_answer": "一、本(114)年城市締盟規劃：\n(一)去(113)年10月23日辦理本市與日本茨城縣筑波未來市友好城市協定書簽署儀式。\n(二)114年3月17日辦理本市與馬紹爾群島共和國奧爾環礁姊妹市協定簽署儀式，此外亦規劃與其他城市洽談簽約事宜。\n二、自張市長上任後，本府積極安排各國駐台機構代表蒞府拜會，期發掘更多面向合作之可能性，也盼代表能協助引薦與本市市政發展相符之城市，讓雙方有更多交流機會，朝向締盟努力。市府也透過與其他城市間之交流互動，探詢更多締盟機會。", "detail_answer": "同上"}, {"id": 34, "category": "秘書處業務", "question": "桃園之城市外交是否有原鄉交流方面的規劃？如何推動觀光？與南島語系國家之交流？有關議員提出之「新新宜桃彩虹線-泰雅族原住民族跨域合作」，秘書處有何發想？", "short_answer": "一、本市城市外交就原鄉交流及推動原鄉觀光之具體作為如下：\n(一)安排參訪具原民文化之特色景點。\n(二)製作外語版城市簡介，行銷原民特色美食。\n(三)致贈原民特色藝品及伴手禮。\n二、陳瑛議員所提「新新宜桃彩虹線-泰雅族原住民族跨域合作」之規劃：購買原民特色禮品、與原民局合辦活動、亦將就個案評估與新新宜桃等城市跨域合作。\n三、南島語系國家交流：113年8月1日起至114年3月17日期間與南島語系國家之駐台單位代表及城市外賓間計辦理8場交流活動。\n四、辦理「貝里斯與本市原住民族交流活動」\n114年2月14日本府原住民族行政局及本處於貝里斯橘道鎮拉德里克．雪普德市長一行受邀出席「2025台灣燈會在桃園」開幕式期間，共同合辦貝里斯與本市原住民族交流活動，貝里斯大使館碧坎蒂大使亦受邀出席，行程安排參訪本市原住民族文化會館、撒烏瓦知部落，及KIRI國際原住民族文創園區，並與本市原住民族耆老及原民局團隊等進行原住民族相關議題交流，分享彼此就原住民族文化相關保存、推廣、與產業發展結合之政策推動情形，亦就未來可能之交流面向交換意見。\n五、辦理「桃園市與馬紹爾群島共和國奧爾環礁姊妹市協定簽署儀式」\n114年3月17日辦理本市與馬紹爾群島共和國奧爾環礁姊妹市協定簽署儀式，馬紹爾群島共和國大使館卡蒂爾大使、外交部駐馬紹爾群島共和國夏季昌大使及亞東太平洋司許書智副司長等出席見證；奧爾環礁為本市第38個締盟城市，未來雙方將持續就文化、觀光、經濟及教育等不同領域深化交流。", "detail_answer": "一、有關本市國際交流事務中，對於原鄉交流及推動原鄉觀光之具體作為如下：\n安排參訪具有原住民族文化之特色景點行程\n本處依外賓背景及需求，安排參訪具有原住民族文化之特色景點等行程，未來也將適時安排桃園原鄉之旅體驗活動。\n製作外語版城市簡介，行銷原住民特色景觀美食\n本處製作「桃園散策」日文版觀光宣導手冊，手冊中介紹復興區與大溪區的泰雅族歷史文化，亦就復興區樂信．瓦旦紀念公園、大溪區原住民族文化館、豐年祭與歲時祭儀等本市著名原住民族文化景點及慶典進行推廣，吸引日本青年學子蒞桃觀光及進行修學旅行。\n利用城市外交機會，贈送外賓原住民特色藝品及伴手禮：\n遇外賓接待活動，會視外賓背景等挑選致贈具有原住民特色藝品及在地農特產品及伴手禮等，藉此推展行銷原住民族文化。114年3月17日「桃園市與馬紹爾群島共和國奧爾環礁姊妹市協定簽署儀式」之際，致贈本市排灣族青年畫家陳辰Muwasi創作的紀念畫作予奧爾環礁海薩．凱額斯市長。\n二、除上開安排本市原鄉文化之參訪及介紹等，本市亦與南島語系國家城市進行交流，113年8月1日起至114年3月17日期間交流情形臚列如下：\n三、未來亦將持續與南島語系國家進一步交流，盼能加強太平洋夥伴關係，深化雙邊交流，亦將持續規劃邀請駐台單位、大使館及外賓訪團前往本市復興區進行觀光交流，促進本市原鄉觀光發展。\n四、有關陳瑛議員提出之「新新宜桃彩虹線-泰雅族原住民族跨域合作」，本處未來將持續透過多元方式，與本府原住民族行政局共同推廣本市原住民族文化外，亦將就個案評估與新新宜桃等城市跨域合作之可能性。\n五、辦理「貝里斯與本市原住民族交流活動」\n114年2月14日本府原住民族行政局及本處於貝里斯橘道鎮拉德里克．雪普德市長一行受邀出席「2025台灣燈會在桃園」開幕式期間，共同合辦貝里斯與本市原住民族交流活動，貝里斯大使館碧坎蒂大使亦受邀出席，行程安排參訪本市原住民族文化會館、撒烏瓦知部落，及KIRI國際原住民族文創園區，並與本市原住民族耆老及原民局團隊等進行原住民族相關議題交流，分享彼此就原住民族文化相關保存、推廣、與產業發展結合之政策推動情形，亦就未來可能之交流面向交換意見。\n六、辦理「桃園市與馬紹爾群島共和國奧爾環礁姊妹市協定簽署儀式」\n114年3月17日辦理本市與馬紹爾群島共和國奧爾環礁姊妹市協定簽署儀式，馬紹爾群島共和國大使館卡蒂爾大使、外交部駐馬紹爾群島共和國夏季昌大使及亞東太平洋司許書智副司長等出席見證；奧爾環礁為本市第38個締盟城市，未來雙方將持續就文化、觀光、經濟及教育等不同領域深化交流。"}, {"id": 35, "category": "秘書處業務", "question": "近幾年都有辦理論壇，今年有何規劃？", "short_answer": "一、114年度改採不同形式之活動辦理，或配合其他局處所辦理大型活動，邀請締盟城市首長及駐台代表等參與，適時辦理相關論壇。\n二、114年2月12日辦理日本千葉縣成田市小泉一成市長演講。", "detail_answer": "一、本處自109年起，每年均辦理論壇，邀請締盟城市首長、駐台代表及專家學者等，依不同主題分享城市治理經驗或相關領域專業知識等。茲將臚列如下:\n二、114年度改採不同形式之活動辦理，或配合其他局處所辦理大型活動，邀請締盟城市首長及駐台代表等參與，適時辦理相關論壇。\n三、114年2月12日日本千葉縣成田市小泉一成市長出席本處假桃園市立圖書館總館1樓微光廳辦理之講座，並擔任主講人，以「成田市觀光文化及國際交流簡介」為題，分享該市的觀光及文化魅力等，讓市民更加認識本市友好城市—成田市，拓展國際視野。"}, {"id": 36, "category": "秘書處業務", "question": "本市有加入哪些國際組織?本市未來有無加入其他國際組織之規劃?\n建議市府多了解聯合國或是其他國際組織的活動，並讓議員知悉。", "short_answer": "一、配合SDGs-SDG17：全球夥伴關係之目標-積極加入國際組織，本市於2024年須加入8個國際組織(已達成)，另須於2030年達10個國際組織。\n二、本市目前加入8個(本處主責3個)，未來將持續規劃加入其他國際組織，積極參與其組織計畫及爭取合辦活動，增加與各國多邊合作機會。\n三、獲知活動訊息將評估參與對象後適時轉達議員知悉。", "detail_answer": "一、本處綜理本府國際交流業務，為讓桃園於國際社會展露頭角，本處積極推動加入各類國際組織，展現城市外交軟實力。\n二、配合聯合國永續發展目標SDGs之目標(SDG17：全球夥伴關係-強化永續發展執行方法及活化永續發展全球夥伴關係)-積極加入國際組織，本市於2024年須加入8個國際組織(已達成)，另須於2030年達10個國際組織。\n三、本市目前加入8個國際組織(本處主責3個)，未來將持續規劃加入其他國際組織，積極參與其組織計畫及爭取合辦活動，增加與各國多邊合作機會。\n\n三、目前本處主責加入之國際組織計3個，茲列舉如下：\n(一)國際組織-「城市網」（CityNet）\n  1.108年11月7日本市加入國際組織「城市網」，透過與國際組織平台的網絡，深化與各國城市的連結與技術交流，提升本市於在國際的能見度。\n  2.「城市網」為亞太地區交流合作平台之一，致力於促進城市基礎設施及城市永續發展，目前有21國154個會員，總部設於韓國首爾。六都之中，本市、台北市、台中市及高雄市皆為正式會員。\n  3.113年8月1日起至114年3月17日期間，本市在「城市網」參與成果：\n  4.持續將「城市網」之資訊與資源，橫向分享給府內有關機關，有助於提升該機關之國際參與度與能見度。\n(二)國際組織-「國際姊妹市協會」(Sister Cities International，SCI)\n  1.109年3月本市已完成加入「國際姊妹市協會」之復會申請，希透過加入該組織深化本市與國際城市在文化、教育、資訊、經貿發展及人道救助等多領域交流與合作，創造友誼與互信之基礎，提升本市的國際影響力。\n  2.「國際姊妹市協會」於1956年創立，致力促進國際城市間的合作夥伴關係，為全球最大的市民外交組織。六都之中，本市、台北市、新北市及台中市皆為正式會員。\n  3.113年8月1日起至114年3月17日期間，本市在「國際姊妹市協會」的參與成果：\n  4.持續將「國際姊妹市協會」之資訊與資源，橫向分享給府內有關機關，有助於提升該機關之國際參與度與能見度。\n(三)國際組織-「全球社會經濟論壇」(Global Social Economy Forum，GSEF)\n  1.本市於110年9月7日正式加入，期透過加入GSEF強化國際交流，可向世界分享本市落實永續發展於城市治理，及追求經濟發展兼顧環境永續等相關經驗。\n  2.全球社會經濟論壇於2013年成立，係一倡議社會與團結經濟之國際組織，其秘書處於2022年由韓國首爾搬遷至法國波爾多，並受波爾多市政府支持，近年來積極建立與各國地方政府間之關係，旨在通過多邊夥伴關係的跨界合作，定期舉行國際論壇，分享觀點和經驗，以實現包容、公平和以人為本的世界。\n  3.該論壇現有78個成員，來自5大洲36個國家，含地方政府、社會和團結經濟論壇」之資訊與資源，橫向分享給府內有關機關，有助於提升該機關之國際參與度與能見度。\n  4.113年8月1日起至114年3月17日期間，本市在「全球社會經濟論壇」的參與成果：\n  5.持續將「全球社會經濟論壇」之資訊與資源，橫向分享給府內有關機關，有助於提升該機關之國際參與度與能見度。\n四、未來將持續規劃加入其他國際組織，參與其組織計畫及爭取合辦活動，增加與各國多邊合作機會。\n五、未來倘獲知本市加入之國際組織自辦、或本市與其合辦或其轉知其他國際組織如聯合國等辦理之活動，將評估活動參與對象，適時轉達相關訊息予議員知悉。"}, {"id": 37, "category": "秘書處業務", "question": "架設「桃園城市外交典藏」網站展現本市城市外交成果及城市介紹。", "short_answer": "一、目前展示422件國外城市特色禮品及34篇主題展覽。\n二、網站建置中英文版，網頁操作介面已適度修正至更加友善，讓民眾能更方便點選，快速了解桃園之城市外交成果及認識締盟城市(截至114年2月28日止，網頁瀏覽量為318萬6,395次)。\n三、建置費用為29萬5,000元，每年維運費用為6萬3,000元。", "detail_answer": "一、本府積極推展城市外交，與國際城市進行交流，為展現本市外交成果，特架設「桃園城市外交典藏」網站，精選412件國外城市特色禮品，期望民眾透過禮品背後的文化、產業特色對桃園的城市外交有所認識。\n二、網站建置中英文版，中英文版已分別於110年11月及111年5月上線。\n三、除已上架之422件禮品均有詳細之禮品介紹外，亦有34篇主題展覽可供民眾閱讀。上架內容均有英譯版。\n四、113年10月完成15件禮品及2則主題展覽上架作業，另網站操作介面亦已更新至更加友善，讓民眾能更快速點選，了解桃園之城市外交成果(截至114年2月28日止，網頁瀏覽量為318萬6,395次)。\n五、未來將持續更新張市長收到的國際交流禮品，推出更多介紹這些國際禮品的主題展覽文，若舉辦其他大型城市外交活動，也將酌情撰文紀錄。\n六、本府「桃園城市外交典藏網站」支出經費： \n(一)建置：110年經費預算為30萬元，建置網站及維運至111年底，決標金額29萬5,000元，由瓜口瓜設計工作室承作。\n(二)自112年起網站每年維運費用為6萬3,000元，由瓜口瓜設計工作室執行，詳如下表："}, {"id": 38, "category": "秘書處業務", "question": "關於本市國際交流活動，應主動公開相關訊息；另可考量階段性活動或任務結束後再剪輯、再一次發布。", "short_answer": "一、秘書處官網影音專區已上架數支活動影片。\n二、活動相關新聞露出及名稱可至秘書處官網查詢。\n三、開放民眾可參與之活動，亦會於活動前在秘書處官網公開報名資訊。", "detail_answer": "一、秘書處官網影音專區已上架數支活動影片，包含每季國際交流活動成果影片，供市民點閱。自張市長上任以來，秘書處官網國際交流的影片數量、觀看次數及製作費用列表如下:\n二、本處國際交流活動，相關新聞露出可至本府秘書處官網－訊息公告－最新消息查詢，相關活動名稱也可至本府秘書處官網－業務資訊－國際事務科－近期交流訊息與成果查詢。\n三、未來本市倘與締盟城市等進行交流，仍會持續將訊息放置於本府秘書處官網，提供民眾查詢，俾了解本市城市交流成果；開放民眾可參與之活動，亦會於活動前在秘書處官網公開報名資訊，歡迎民眾踴躍參與。"}, {"id": 39, "category": "秘書處業務", "question": "今年市長出國計畫為何?(大陸出國計畫詳第74題)\n如有國際城市交流相關行程請告知議員，亦可適當安排讓議員自費參加交流行程，亦有建議比照台北市政府方式，讓各黨團派員一同出訪。", "short_answer": "一、本處114年出國預算：美洲國家150萬、歐洲國家100萬、亞太國家140萬，合計390萬。\n二、本處將適時規劃首長出訪締盟城市等行程，另亦將配合他局處出訪案規劃辦理。\n三、後續倘有出訪需求，將適時研議邀請本市議會議員自費同行。\n四、目前本處出國預算支應情形如下：", "detail_answer": "一、本處114年編列之出國預算如下：\n二、本處將適時規劃首長出訪締盟城市等行程，另亦將配合他局處出訪案規劃辦理。\n三、後續倘有出訪需求，本處將會配合安排規劃，亦將適時研議邀請本市議會議員自費同行，促進府會和諧與加強府會關係。\n四、目前本處出國預算支應情形如下："}, {"id": 40, "category": "秘書處業務", "question": "市府出訪係依採購法辦理招標？", "short_answer": "辦理出訪採購方式如下：\n一、可依採購法辦理招標\n二、以個人名義委託旅行社代為採購國際機票，並依國外出差旅費報支要點個別報支者，不適用政府採購法。", "detail_answer": "辦理出訪可依採購法辦理招標，亦可依據行政院公共工程委員會96年5月22日工程企字第09600204030號函示:「2員以上之機關人員公務出國前往同一目的地，不論是否搭乘同一班機，如以個人名義委託旅行社代為採購國際機票，並依國外出差旅費報支要點個別報支者，不適用政府採購法。惟如以機關名義合併採購較具採購效益者，不以由機關人員個別辦理為限。故本案仍請視其業務實況需要，依上開函釋規定以符合採購效益之原則，由機關本於權責處理。」故出國考察案可不適用政府採購法，採用個別報支並依據「國外出差旅費報支要點」據以核銷。"}, {"id": 41, "category": "秘書處業務", "question": "請說明出國考察經費之用途，及市府出訪，以個人出差旅費報支方式辦理，如何計算及核銷？實際支出和回國後核銷之差額，撥予出訪人員是否合於規定？", "short_answer": "依據：行政院主計總處訂定之國外出差旅費報支要點。\n可報支項目為交通費、生活費及辦公費。\n直轄市市長：\n(一)可搭商務艙\n(二)禮品交際及雜費：\n1.1至6人:未達15日者10萬元，15日以上者15萬元。\n2.第7人以上:除前規定數額外，加計每人每日新台幣600元。\n四、「國外出差旅費報支要點」(以下簡稱報支要點)，規定國外出差旅費包括交通費、生活費及辦公費，係屬全國一致性標準，全國各公務機關均依此要點辦理申報。\n五、行政院主計總處訂定報支要點時，考量出差人員因公出國所需生活費無法完全統一標準，故依出國地區訂定不同之生活費，並簡化報支作業，交通費及辦公費需檢據核銷，生活費不必檢據核銷，本處依規定以日支數額計算核支生活費，符合法令規範，另此作法亦為國內外公私立機關常見作法。\n六、生活費：出差人員之住宿費、膳食費及零用費。其中零用費包括市區火車票費、市區公共汽車票費、市區捷運車票費、個人信用卡手續費、洗衣費、小費及其他與生活有關之各項費用。因出差人員因公出國尚有多筆因人而異之前揭費用，且主計總處訂定日支數額時已參考各類標準，故依日支數額計算生活費尚無核銷差額問題。", "detail_answer": "行政院主計總處訂定「國外出差旅費報支要點」(以下簡稱報支要點)，規定國外出差旅費包括交通費、生活費及辦公費，係屬全國一致性標準，全國各公務機關均依此要點辦理申報。\n依國外出差旅費報支要點第4點規定，出差旅費分為交通費、生活費及辦公費，其內容如下：\n(一)交通費：出差人員搭乘飛機、船舶及長途大眾陸運工具所需費用。(二)生活費：出差人員之住宿費、膳食費及零用費。\n(三)辦公費：出差人員出國之手續費、保險費、行政費、禮品交際及雜費。\n三、有關市長及局處首長等之飛機艙等、禮品交際及雜費以及租車費用等規定，說明如下：\n(一)飛機機艙：本市市長及局處首長，得乘坐商務艙。\n(二)禮品交際費：\n  1.市長:未達15日者，以新台幣10萬元為限；15日以上者，以新台幣15萬元為限。\n  2.局處首長:未達15日者，以新台幣4萬元為限；15日以上者，以新台幣6萬元為限。\n  3.出訪團員總人數超過6人者，禮品交際及雜費除按前規定數額外，第7人以上得由率團人員按每人每日新台幣600元加計，檢據報支。\n(三)租車:本市市長及局處首長出訪，可支付租車費用(如有必要須簽准)。\n四、主計總處訂定報支要點時，考量個人因公出國所需生活費無法完全統一標準，故依出國地區訂定不同之生活費，並簡化報支作業，交通費及辦公費需檢據核銷，生活費部分依原行政院主計處93.6.28處忠字第0930004083號「主計長信箱」示以，不必檢據核銷，本處依規定以日支數額計算核支生活費，符合法令規範，另此作法亦為國內外公私立機關常見作法。\n五、出差人員所支出之費用，除於出國前委由旅行社代辦，或逕自先行辦理之機票、食宿外，出差人員於出差期間尚有多筆因人而異之前述市區火車票費、市區公共汽車票費、市區捷運車票費、個人信用卡手續費、洗衣費、小費及其他與生活有關之各項零用支出費用，核算後亦可能需額外自付金額(超過生活費限額)，且主計總處訂定日支數額時已參考各類標準，故依日支數額計算生活費較為公允，且依法有據，尚無核銷差額問題。\n六、補充說明事項：\n(一)生活費之計算：每日生活費之計算方式，係以中央政府各機關派赴國外各地區出差人員生活費日支數額表所列之國家城市之日支數額，乘以出國前一日台灣銀行賣出即期美元參考匯價核算。前開日支數額表為主計總處參考國際各大城市物價指數所訂定，俾使出差人員報支出差旅費有更合宜之準據。 \n(二)國外出差旅費之核銷：出差人員回國後，依上開規定辦理核銷，並扣除由外國政府、國際組織或其他來源提供之膳宿後，即為該出訪人員實際可撥付之出差旅費。"}, {"id": 42, "category": "秘書處業務", "question": "建議加強城市外交戰略規劃，多與新南向國家進行城市交流，並建議增加城市交流會報。", "short_answer": "本市與新南向國家間持續進行交流，本次工作報告期間(113年8月1日至114年2月28日)交流情形臚列如下：\n本府秘書處於辦理外國訪團拜會及市政參訪相關事宜時，均與各相關業務機關保持良好之橫向聯繫，有關增加城市交流會報事宜，本府秘書處嗣後將列入評估參考。", "detail_answer": "(同簡答)"}, {"id": 43, "category": "秘書處業務", "question": "張市長在城市外交成果與6都及過去市長的成果比較、締結姊妹市數。", "short_answer": "張市長在城市外交成果與6都及過去市長的成果比較、締結姊妹市數如下：\n【備註】鄭前市長任內締盟數量計17個、平均每年簽訂2個。\n自張市長上任後，本府積極安排各國駐台機構，如英國在台辦事處、法國在台協會、美國在台協會及印度台北協會等代表蒞府拜會，期藉由雙邊對談發掘更多面向合作之可能性，也盼代表能協助引薦與本市市政發展相符之城市，讓雙方有更多交流機會，朝向締盟努力。此外，市府也積極透過與其他城市間之交流互動，主動探詢更多締盟機會。自張市長上任後桃園市總計新簽署4個姊妹市，114年亦有1至2個國際城市刻正洽談討論中，與前2屆締盟成果相當。", "detail_answer": "(同簡答)"}, {"id": 44, "category": "秘書處業務", "question": "日本友好城市香川縣與寶可夢合作，盼本市平鎮區亦取得寶可夢公司授權成立「寶可夢主題遊具公園」，本案發展如何？", "short_answer": "本案係黃敬平議員於去(113)年6月提出，請本處協助聯繫寶可夢公司，盼能於桃園市平鎮區山仔頂公園設置「寶可夢主題遊具」。經本處與寶可夢台灣代理商曼迪傳播有限公司聯繫，並透過桃園捷運公司與日本寶可夢公司聯繫，均未予以回覆，故經向黃敬平議員回報後，本案則回歸由工務局依原定設計規劃。\n114年2月10日本處收到曼迪傳播有限公司回信，表示寶可夢想進一步了解前開該合作案，故本處將相關資訊轉請工務局逕與該公司聯繫。經詢工務局，期間去信欲了解權利金等相關事宜，惟該公司回覆訊息甚慢，迄今僅回覆1次，再去信迄今仍未回覆。114年3月6日該公司回覆已收到工務局所提供之相關資訊，將會內部請示，後續若有最新進度會第一時間通知工務局。\n本處業於114年3月19日去信提醒工務局，可向觀光旅遊局了解此次燈會與寶可夢公司合作模式，以為參考。", "detail_answer": "(同簡答)"}, {"id": 45, "category": "秘書處業務", "question": "請說明與美國堪薩斯市的交流聯繫情形？", "short_answer": "113年6月25日凌濤議員拜會本處，並希望促成本市與堪薩斯市之交流，同日本處張專員聯繫堪薩斯市窗口。\n113年7月2日本處簽奉核准交流信函，送至市長室，市長秘書表示市長要親自修改。\n113年10月16日定稿交流信函送市長室請市長親簽。\n113年10月18日已將探詢信件以電子郵件寄出，堪薩斯市於11月5日回信，表示目前已與台南簽署姊妹市，故婉拒與本市見面交流。\n113年11月8日以本處名義撰擬感謝信函予堪薩斯市窗口，同日定稿並送翻。\n113年11月11日以本處處長名義撰擬感謝函，併同2025台灣燈會在桃園邀請函以電子郵件寄出。\n113年11月19日市長助理回信表示市長有興趣參加燈會，但仍需待市長行程確認後再行回復。\n113年11月20日以本處處長名義撰擬道賀信，歡迎堪薩斯市至本市拜訪，信函同日以電子郵件寄出。\n114年1月28日堪薩斯市以電子郵件回覆市長因另有行程，不克出席燈會，並表示未來有機會再交流。\n114年2月21日以本處處長名義撰擬信函，慰問美式足球隊堪薩斯酋長不幸落敗，並期待未來有機會再邀請市長訪桃，信函同日以電子郵件寄出。\n114年3月20日以本處處長名義撰擬信函，邀請市長出席雲南米干節。\n將持續與對方保持聯繫，探詢未來交流之可能性。", "detail_answer": "(同簡答)"}, {"id": 46, "category": "秘書處業務", "question": "本府與新加坡相關的交流", "short_answer": "本府與新加坡間之交流，茲臚列如下：\n註:標註灰底者為先前提供許家睿議員資訊。", "detail_answer": "(同簡答)"}, {"id": 47, "category": "秘書處業務", "question": "市長出訪新加坡，相關參訪及考察觀光對桃園市發展效益為何？(主答客家局，副答捷工局、智發會)", "short_answer": "俟訪團回國後再請主責機關提供。", "detail_answer": ""}, {"id": 48, "category": "秘書處業務", "question": "公文線上簽核及公文電子交換實施成效？行政院頒布的電子公文簽核目標？電子交換年度目標？本府線上簽核作業規定？", "short_answer": "一、本府成效(包含一、二級機關，不含戶所、地所、衛生所)：\n二、本處成效：\n三、112年8月1日起放寬公文系統線上簽核層級至府一層、保存年限至30年以下及刪除頁數限制。\n四、113年2月17日起進一步放寬公文系統線上簽核附件檔案容量限\n制至20MB及小額採購案件可適用。", "detail_answer": "一、本府成效(包含一、二級機關，不含戶所、地所、衛生所)：\n二、本處成效：\n三、補充說明：\n(一)依行政院102年5月22日頒布電子公文節能減紙續階方案，公文線上簽核年度目標值為45%、公文電子交換年度目標值為70%、公文線上簽核機關比率為70%、實施電子化會議比率為30%。\n(二)本府推動本方案以來，各機關均積極配合，均已逾院頒目標。自113年8月1日至114年2月28日止，本府公文線上簽核達成率為85.9% (上一會期85.18%)、公文電子交換率為95.23%(上一會期95.27%)，本府實施公文線上簽核機關達成率為100%，均已逾院頒目標。\n四、為擴大實施本府公文線上簽核，112年8月1日起放寬公文系統線上簽核層級至府一層、保存年限至30年以下及刪除頁數限制，並修正本府公文線上簽核作業規定第5點及第6點規定，以強化行政效能及公文傳遞時效，落實節能減紙。\n五、為進一步擴大實施公文線上簽核，113年2月17日起放寬以下限制，並修正本府公文線上簽核作業規定第5點及第6點規定：\n(一)放寬公文系統線上簽核附件檔案容量限制，由原10MB擴增至20MB。\n(二)放寬原採購案件不適用線上簽核公文類型之現行規定，修正小額\n採購案件可適用線上簽核。\n六、實施後，本府公文線上簽核率截至114年2月28日止，已由111年的70%，提升至85%以上，成效卓越。\n七、本府公文電子交換無法達到100%原因：\n(一)公文電子交換比率計算方式為電子發文件數／發文總件數）×100\n％(發文總件數＝總發文件數扣除立委質詢、監察案件、人民申請、\n人民陳情、訴願等不適用電子交換件數）。\n(二)因目前與民眾、議員及民間單位間無法進行電子交換，均須以紙本\n方式郵寄；另部分案件因業務屬性，如行政裁處書、刑事類等公文\n含指紋卡等證物、附件如計畫書、契約書或涉及個人隱私資料等，\n無法使用電子交換，須以紙本公文傳遞。"}, {"id": 49, "category": "秘書處業務", "question": "市府總收文及總發文量為何？總收文有何加強公文收文傳遞效率的便民措施？", "short_answer": "一、市府總收文及總發文量\n(一)總收文\n(二)總發文\n二、總收文加強公文收文傳遞效率的便民措施\n(一)實施「速件即時送」\n(二)延長收文時間", "detail_answer": "一、市府總收文及總發文量\n(一)總收文\n(二)總發文\n二、總收文加強公文收文傳遞效率的便民措施\n(一)實施「速件即時送」\n本府總收文實施「速件即時送」措施，縮減公文傳遞時間。為加速公文流程，總收文每日早上10時及下午2時30分，定時定點由各局處集中交換外，另於每日上午8時30分、11時20分、下午4時10分由專人逕送至各機關收發，加快公文交換速度。\n(二)延長收文時間\n為提升為民服務品質，除上班時間收件外，特於中午12時至下午1時及下午5至6時延長收文時間，隨時提供民眾收文服務。"}, {"id": 50, "category": "秘書處業務", "question": "本市升格直轄市至今，機關學校印信製（換）發情形如何？", "short_answer": "本府各機關印信數量統計:\n註：行政法人─桃園市社會住宅服務中心。", "detail_answer": "一、本府各機關印信數量統計本府各機關印信數量統計(至2月28日止)：\n註：行政法人─桃園市社會住宅服務中心。\n二、(114年2月)本府各機關印信辦理情形"}, {"id": 51, "category": "秘書處業務", "question": "府發文櫃台提供本府各機關及民眾自領公文服務", "short_answer": "為提升發文效率及加強為民服務，於本府6樓府發文櫃台提供各機關自領公文，另包含經發局工廠納管、工廠核准登記、水務局建築物排水設備切換裝置設置等公文，亦便利民眾可於府發文櫃台自行領件。截至8月31日公文領件數共19,674件。自113年8月31日至114年2月28日公文領件數共18,511件。", "detail_answer": "為提升發文效率及加強為民服務，於本府6樓府發文櫃台提供各機關自領公文，另包含經發局工廠納管、工廠核准登記、水務局建築物排水設備切換裝置設置等公文，亦便利民眾可於府發文櫃台自行領件。截至8月31日公文領件數共19,674件。自113年8月31日至114年2月28日公文領件數共18,511件。"}, {"id": 52, "category": "秘書處業務", "question": "民眾如何查詢檔案目錄、如何向本處申請檔案應用?", "short_answer": "一、可藉由國家發展委員會檔案管理局機關檔案目錄查詢網查詢。\n二、申請應用本處檔案可由本處網站點選檔案應用專區，並填寫「桃園市政府秘書處檔案應用申請書」後送本處辦理。\n三、113年迄今尚無民眾向本處申請檔案應用。", "detail_answer": "(同簡答)"}, {"id": 53, "category": "秘書處業務", "question": "屆保存年限檔案銷毀程序為何？針對檔案不當銷毀有何補救措施？", "short_answer": "一、屆保存年限檔案銷毀程序：\n(一)制定檔案銷毀計畫及檔案銷毀目錄，送會相關業務單位表示意見。\n(二)檔案銷毀計畫及銷毀目錄送史政機關檢選(本府送文化局及國史館台灣文獻館檢選)。\n(三)再送由本府陳轉檔案管理局審核。\n(四)俟核准銷毀，針對延長保存年限之檔案抽存註記，同意銷毀檔案會同相關單位派員全程監控銷毀。\n(五)於檔案管理系統註記核准銷毀文號及銷毀日期。\n二、檔案不當銷毀補救措施\n(一)非法銷毁檔案者，各機關應將其原因及已銷毀檔案之檔號、案名等情事，函送檔案管理局備查。\n(二)檔案因天災或事故毀損，經鑑定結果認無法修復者，將檔案鑑定報告陳權責長官(係指非法銷毀之檔案原分層負責明細表公文決行層級)核准後，函送檔案管理局備查後銷毀。", "detail_answer": "一、屆保存年限檔案銷毀程序：\n(一)檔案管理單位或人員就屆保存年限檔案，制定檔案銷毀計畫及檔案銷毀目錄，送會各相關業務單位表示意見（會計憑證、報告、帳簿及重要備查簿等，應依會計法規定，經該管上級機關與審計機關同意銷毀後，始得依規定辦理銷毀。）\n(二)檔案銷毀計畫及銷毀目錄送史政機關檢選（本府送文化局及國史館台灣文獻館檢選）。\n(三)再送由本府陳轉國家發展委員會檔案管理局審核。\n(四)俟國家發展委員會檔案管理局核准銷毀，針對延長保存年限之檔案抽存註記，同意銷毀檔案集中裝箱放置，並會同相關單位派員全程監控，運送至銷毀場所完成檔案銷毀作業。\n(五)於檔案管理系統註記核准銷毀文號及銷毀日期，轉出符合格式之電子檔案目錄，重新辦理目錄彙送事宜。\n二、檔案不當銷毀之罰則及補救措施\n(一)依據檔案法第24條規定，明知不應銷毀之檔案而銷毀者，處二年以下有期徒刑、拘役或科或併科新台幣五萬元以下罰金。\n(二)各機關如發現上述非法銷毀檔案者，應即將其原因及已銷毀檔案之檔號、案名、案件數量、銷毀時間、地點及方法等情事，函送檔案管理局備查。\n(三)檔案因天災或事故毀損，經鑑定結果認無法修復者，各機關得將檔案損毀原因及已毀損檔案之檔號、案名及案件數量等情形，將檔案鑑定報告陳權責長官(係指非法銷毀之檔案原分層負責明細表公文決行層級)核准後，函送檔案管理局備查後銷毀。"}, {"id": 54, "category": "秘書處業務", "question": "檔案遺失有何處置方式？", "short_answer": "已遺失之檔案，如有收發文簿、歸檔登記簿等書面紀錄，應將處理結果予以註記；若確無相關紀錄留存，則應陳報權責長官(係指遺失之檔案原分層負責明細表公文決行層級)，俾憑日後查考。\n依智慧城鄉發展委員會所訂桃園市政府公文處理時限及逾限懲處標準表注意事項：「毁損、棄置、遺失公文或檔案者，應受申誡以上之處分。」", "detail_answer": "依機關檔案保管作業要點第17點：「檔案有遺失、毀損情形，各機關應即查明原因簽請權責長官(係指遺失之檔案原分層負責明細表公文決行層級)處理，並採取適當補救措施。」及國家發展委員會檔案管理局92年1月30日檔典字第0920001034號函釋，已遺失之檔案，如有書面紀錄可稽（如收發文簿、歸檔登記簿等），應將處理結果予以註記；若確無相關紀錄留存，則應將遺失檔案範圍、預估數量、處理情形等陳報權責長官(係指遺失之檔案原分層負責明細表公文決行層級)，俾憑日後查考。\n依智慧城鄉發展委員會所訂桃園市政府公文處理時限及逾限懲處標準表注意事項第7點：「毁損、棄置、遺失公文或檔案者，應受申誡以上之處分。」"}, {"id": 55, "category": "秘書處業務", "question": "有何加強本府各機關檔案管理作法？", "short_answer": "一、辦理檔案管理人員專業教育訓練。\n二、辦理機關檔案管理考評工作。\n三、辦理機關檔案管理示範觀摩業務。\n四、製作檔案教學影片。", "detail_answer": "一、辦理檔案管理人員專業教育訓練\n每年辦理職能教育訓練，聘請專家學者擔任課程講座，以提升檔管人員專業知能。\n二、辦理機關檔案管理考評工作：\n辦理本市檔案管理分級考評制度，擇優推薦參加國家發展委員會檔案管理局「機關檔案管理金檔獎」複評，並聘請專家學者進行金檔獎複評輔導，已創下「21連霸」佳績；114年推薦勞動局及八德地政事務所代表本府參加第22屆金檔獎複評。\n三、辦理機關檔案管理示範觀摩業務：\n與榮獲「機關檔案管理金檔獎」得獎機關，聯合辦理示範觀摩活動，公開發表金檔獎得獎經驗及作法，樹立檔案管理之最佳標竿，113年與第21屆得獎機關本市桃園地政事務所及中壢地政事務所共同辦理。\n四、製作檔案教學影片：\n本處製播「檔管最前線」及「檔管更前線」的檔案管理主題教學影片，藉由生動活潑、貼近工作的影片，讓檔案管理知識，更親近檔管同仁，使檔管人員易於理解，增進專業素養；本處亦將該教學影片於檔案管理教育訓練時播放，期望檔管人員都能建立正確的觀念。"}, {"id": 56, "category": "秘書處業務", "question": "市府113年辦理第21屆機關檔案管理考評受評機關為何？考評結果為何？114年第22屆機關檔案管理考評受評機關為何？", "short_answer": "一、113年第21屆機關檔案管理考評受評機關為衛生局、青年事務局、體育局、交通局、財政局、經濟發展局、原住民族行政局、消防局、社會局、工務局等，並推薦經濟發展局代表參加第23屆(115年)金檔獎。\n二、114年第22屆機關檔案管理考評受評機關為警察局、地方稅務局、法務局、客家事務局、教育局、農業局、環境保護局、水務局、青年事務局及原住民族行政局等。", "detail_answer": "一、113年第21屆機關檔案管理考評，受評機關有衛生局、青年事務局、體育局、交通局、財政局、經濟發展局、原住民族行政局、消防局、社會局、工務局等，本次考評推薦績優機關經濟發展局代表本府參加國家發展委員會檔案管理局第23屆(115年)機關檔案管理金檔獎複評，需複評機關為青年事務局及原住民族行政局。\n二、114年第22屆機關檔案管理考評，受評機關有警察局、地方稅務局、法務局、客家事務局、教育局、農業局、環境保護局、水務局、青年事務局及原住民族行政局等，預計於今年3至6月辦理考評。\n\n桃園市政府機關檔案管理考評指定受評機關(考評週期為6年)"}, {"id": 57, "category": "秘書處業務", "question": "市府113年推薦哪些機關參加第21屆機關檔案管理金檔獎？獲獎情形為何？市府114年推薦哪些機關參加第22屆機關檔案管理金檔獎複評？", "short_answer": "113年度推薦本市桃園及中壢地政事務所參加第21屆金檔獎複評，雙雙榮獲金檔獎殊榮，並皆獲地方組前3名。\n114年度推薦本府勞動局及本市八德地政事務所代表本府參加第22屆金檔獎複評。", "detail_answer": "本府每年依據檔案法施行細則第27條，辦理本府所屬機關檔案管理考評工作，成績優異機關則推薦參加國家發展委員會檔案管理局「機關檔案管理金檔獎」複評，並聘請專家學者進行金檔獎複評輔導。\n113年度推薦本市桃園及中壢地政事務所參加第21屆金檔獎複評，雙雙榮獲金檔獎佳績，成績亦名列前茅，皆獲得地方組前3名，各獲頒1萬6千元獎金。\n114年度推薦本府勞動局及本市八德地政事務所代表本府參加第22屆金檔獎複評。"}, {"id": 58, "category": "秘書處業務", "question": "本府各局處檔案庫房是否有防火設施設置？", "short_answer": "一、依規定，檔案庫房應設置消防安全警報系統，並裝置消防安全設備。\n二、各局處訂定庫房災害緊急應變計畫並實地演練，確保檔案庫房之安全。", "detail_answer": "一、依據國家發展委員會檔案管理局訂定「檔案庫房設施基準」規定，檔案庫房應設置消防安全警報系統，並裝置消防安全設備。\n二、本府每年排定時程辦理檔案管理考評，將各機關庫房安全列為重點評核項目，除須設置防火門、消防安全警報系統及安全設備外，亦請各局處訂定庫房災害緊急應變計畫並實地演練，確保檔案庫房之安全。"}, {"id": 59, "category": "秘書處業務", "question": "政治檔案清查結果", "short_answer": "一、第一階段：國家發展委員會檔案管理局(以下簡稱檔案局)於108年7月24日公布施行「政治檔案條例」，本府依據該條例清查34年8月15日起至81年11月6日之檔案，經檔案局審核，計有10個機關共174件檔案列為政治檔案，並已移轉給檔案局。\n二、第二階段：檔案局於112年12月27日修正「政治檔案條例」，並自113年2月28日施行，擴大政治檔案審定範圍包括81年11月6日後產生之檔案，經檔案局審查，計有13個機關共84件檔案列為政治檔案，預計於114年3月辦理移轉。", "detail_answer": "一、第一階段\n(一)為落實轉型正義，建立完整之政治檔案管理及開放應用制度，國家發展委員會檔案管理局(以下簡稱檔案局)於民國（以下同）108年7月24日公布施行「政治檔案條例」，並於同年7月31日及109年4月1日函請各機關清查民國34年8月15日起至81年11月6日之政治檔案。\n(二)本府清查結果經檔案局審核，計有民政局（40件）、警察局（2件）、新聞處（97件）、秘書處（1件）、復興區公所（5件）、桃園區戶政事務所（6件）、蘆竹區戶政事務所（6件）、大園區戶政事務所（3件）、龜山區戶政事務所（8件）及觀音區戶政事務所（6件）等10個機關共174件檔案列為政治檔案，並已移轉給檔案局。\n二、第二階段\n(一)檔案局於112年12月27日修正「政治檔案條例」，並自113年2月28日施行，擴大政治檔案審定範圍包括81年11月6日後產生之檔案，並於113年3月21日函請各機關持續辦理34年8月15日至81年11月6日及81年11月6日後產生之相關政治檔案清查及報送。\n(二)本府清查結果經檔案局審核，計有民政局（6件）、警察局（36件）、桃園區戶政事務所（15件）、中壢區戶政事務所（7件）、平鎮區戶政事務所（1件）、八德區戶政事務所（1件）、楊梅區戶政事務所（7件）、蘆竹區戶政事務所（4件）、大溪區戶政事務所（1件）、大園區戶政事務所（2件）、龜山區戶政事務所（1件）、龍潭區戶政事務所（2件）及新屋區區戶政事務所（1件）等13個機關共84件檔案列為政治檔案，預計於114年3月辦理移轉。"}, {"id": 60, "category": "秘書處業務", "question": "目前市府公報發送數量及對象為何？", "short_answer": "本府公報原以每月寄送紙本參考，經參採五都作法，推廣無紙化作業，以節能減碳並提高行政效能；自111年起改以線上提供(截至114年2月28日網頁瀏覽量為186萬5,463次)，紙本發送計50份。", "detail_answer": "一、本府公報每月發行2期(15、30日)，原每期寄送紙本參考，經參採五都作法，推廣無紙化作業，以節能減碳並提高行政效能；自111年起改以線上提供，紙本發送計50份，114年所需經費計新臺幣28萬1,568元，發送對象為：\n(一)本市議會17份。\n(二)本府部分機關：市長1份、法務局5份、本處自留4份。\n(三)本市圖書館20份。\n(四)國家圖書館2份及國立台灣圖書館1份。\n二、本府公報資訊系統：\n(一)建置：107年經費預算為75萬元，為更新伺服器主機，本案委託廠商代為購置合法windows server，故決標金額為93萬5,000元，由九福科技顧問股份有限公司承作。\n(二)自108年起逐年編列系統維護及紙本公報上架經費，每年經費預算為48萬元，詳如下表：\n(三)截至114年2月28日網頁瀏覽量為186萬5,463次。"}, {"id": 61, "category": "秘書處業務", "question": "建議建置議員服務處電子收文系統？公告/公示型紙本公文，建議改為e-mail傳閱或建置線上查調系統。", "short_answer": "一、本府電子公文系統建置係屬智慧城鄉發展委員會業務，該會業已召開說明會規劃協助議員服務處建置，於113年7月初上線運作，有3位議員啟用(吳進昌、許家睿、黃敬平)，惟114年2月中接獲智發會通知，許家睿與黃敬平已停用，目前僅吳進昌議員使用。\n二、議員收受採購招標公告方式，已由工務局調查彙整各議員需求，分為不收紙本公文提供查詢管道、電子郵件及維持紙本3方式提供。", "detail_answer": "一、本府電子公文系統建置係屬智慧城鄉發展委員會業務，該會業已召開說明會規劃協助議員服務處建置，並於113年7月初上線運作，議員如有建置電子收發文需求，該會將持續協助辦理。\n二、智發會於113年6月28日及8月6日通報，吳進昌議員於113年7月4日、許家睿及黃敬平議員於8月9日啟用公文電子交換系統，並建議各機關於啟用電子交換後1個月內，同步寄送紙本公文及電子交換，惟114年2月中接獲智發會通知，許家睿及黃敬平議員已停用，目前僅吳進昌議員仍使用電子交換。\n三、議員收受採購招標公告方式，已由工務局調查彙整各議員需求，分為不收紙本公文提供查詢管道、電子郵件及維持紙本3方式提供，據工務局表示，自執行以來，並未收到議員相關意見。"}, {"id": 62, "category": "秘書處業務", "question": "請桃園市各區公所協助代收議員服務處公文轉送至市政府收發處案", "short_answer": "一、各區公所代收轉送公文之作業方式，無文書相關規定可依循，為避免嗣後發生公文延誤送達或公文遺失等權責不明影響權益之情事，建議以採行電子收發文為宜。\n二、本府電子公文系統建置係屬智慧城鄉發展委員會業務，該會業已召開說明會規劃協助議員服務處建置，並於113年7月初上線運作，議員如有建置電子收發文需求，民政局將轉請該會研議納入辦理。", "detail_answer": "(同簡答)"}, {"id": 63, "category": "秘書處業務", "question": "市長致贈貴賓禮品之規劃原則為何？", "short_answer": "有關市長致贈貴賓禮品，皆以在地農特產品、桃園好禮、歷年十大伴手禮、庇護工場、觀光工廠及本市特色工藝品等作為採購方向，期推動在地產業發展。", "detail_answer": "有關市長致贈貴賓禮品，皆以在地農特產品、桃園好禮、歷年十大伴手禮、庇護工場、觀光工廠及本市特色工藝品等作為採購方向，期推動在地產業發展。\n另視訪賓之拜會性質、時間及參訪地點，致贈合宜之在地禮品，以推廣本市特色產品並增進互動關係；禮品之採購及發送均予以控管。"}, {"id": 64, "category": "秘書處業務", "question": "112年至114年印製福袋之數量及發放方式為何？", "short_answer": "112年福袋印製數量約19萬份、113年福袋印製數量約24萬份、114年福袋印製數量25萬份。\n福袋發放方式如下：\n市長及府層長官於辭歲活動時發放予本府同仁。\n市長及府層長官於新春期間參加本府相關活動時發放。\n市長及府層長官於新春期間至本市宮廟發送予現場民眾。", "detail_answer": "一、112年至114年福袋印製數量，詳如下表，112年福袋印製數量約19萬份、113年福袋印製數量約24萬份、114年福袋印製數量25萬份：\n(一)112年印製數量總計18萬8,000份，說明如下：\n秘書處：8萬6,660份\n秘書處代辦採購10萬1,340份：\n(1)\t桃園大眾捷運(股)公司：2,140份。\n(2)\t環保局環境清潔稽查大隊：3萬9,200份。\n(3)\t警察局：2萬3,000份。\n(4)\t消防局：5,000份。\n(5)\t民政局：3萬2,000份。\n(二)113年印製數量總計24萬2,200萬份，說明如下：\n秘書處：13萬3,500份。\n秘書處代辦採購5萬6,500份：\n         (1)民政局：2萬6,530份。\n         (2)警察局：2萬3,000份。\n         (3)衛生局：6,970份。\n其他機關自行採購共5萬2,200份：\n         (1)桃園大眾捷運(股)公司：2,600份。\n         (2)環境管理處：4萬1,100份。\n         (3)消防局：5,500份。\n         (4)農業局：3,000份。\n(三)114年印製數量總計25萬份，說明如下：\n秘書處：14萬3,700份。\n秘書處代辦採購9萬3,100份：\n(1)民政局：2萬9,000份。\n(2)警察局：2萬3,300份。\n(3)環境管理處：4萬800份。\n其他機關自行採購共1萬3,200份：\n(1)消防局：5,500份。\n(2)衛生局：2,300份。\n(3)農業局：2,500份。\n(4)桃園大眾捷運(股)公司：2,900份。\n二、114年福袋預計發放方式如下：\n市長及府層長官於辭歲活動時發放予本府同仁。\n市長及府層長官於新春期間參加本府相關活動時發放。\n市長及府層長官於新春期間至本市宮廟發送予現場民眾。"}, {"id": 65, "category": "秘書處業務", "question": "春聯相關問題\n114年春聯規劃製作？是否製作聯名版春聯及發送方式？\n近年春聯發送情形？", "short_answer": "114年以「蛇馬攏順」(市長版)、「好運來」(聯名版)為題詞，發布2款新春春聯，聯名版印製數量以前年度8月份設籍戶數為計算基礎(113年度8月份家戶數為92萬1,237戶)，委由各區公所以里鄰系統轉發家戶，市長版於本府市政大樓1樓服務台、本府部分第一線機關(如地方稅務局各分局、各區衛生所、地政事務所、戶政事務所等地點)及桃園火車站、中壢火車站、高鐵桃園站之旅客服務中心提供民眾索取。\n112年及113年僅印製市長版春聯，114年除印製市長版及聯名版春聯外，為促進府會和諧，另印製議員聯名版春聯。\n近三年本市春聯印製數量如下：", "detail_answer": "(同簡答)"}, {"id": 66, "category": "秘書處業務", "question": "113年至114年印製紅包袋之數量及發放方式為何？", "short_answer": "113年紅包袋印製數量1萬9,000只、114年紅包袋印製數量2萬只：\n紅包袋發放方式如下：\n市長及府層長官於新春期間參加本府相關活動時發放。\n透過本府「桃園事」臉書-新年吉祥話留言線上抽獎活動致贈予獲獎民眾。", "detail_answer": "(同簡答)"}, {"id": 67, "category": "秘書處業務", "question": "請問民眾婚喪喜慶需要申請中堂或輓聯的服務管道或方式有哪些？並請說明民眾申請市長致贈中堂或輓聯的情形。", "short_answer": "民眾可透過郵寄、傳真申請中堂或輓聯，民眾亦可透過桃園網路e指通進行線上申辦。自113年8月1日至114年2月28日止共計申請中堂63件、輓聯1134件。(線上申請計中堂34件，輓聯98件)", "detail_answer": "一、民眾原可透過郵寄、傳真申請中堂及輓聯。自109年9月30日起開始提供線上申請服務，民眾可透過桃園網路e指通進行線上申辦。本處收到申請後會於3個工作天內處理完畢。自113年8月1日至114年2月28日止共計申請中堂63件、輓聯1134件。(線上申請計中堂34件，輓聯98件)\n二、線上申請方式如下：進入桃園網路e指通系統(網址：https://e-services.tycg.gov.tw/TycgOnline/tycgOnline.action)，搜尋關鍵字「輓聯、中堂申請」，填寫基本資料並上傳訃聞或喜帖等證明文件即完成申請。網頁畫面參考如下圖1、2：\n\n圖1：搜尋關鍵字「輓聯、中堂申請」\n\n圖2：填寫基本資料及相關證明文件"}, {"id": 68, "category": "秘書處業務", "question": "113年母親節及父親節，市長是否有致贈同仁禮品表達祝福？是否有致贈給二級機關？禮品採購數量及發放原則為何？是否有致贈志工？", "short_answer": "一、市長為感謝本府同仁對市政工作的支持與配合，以及兼顧家庭之辛勞，於母親節及父親節前夕致贈同仁禮品，以表達最誠摯的感謝之意。\n二、113年起納入二級機關並統籌編列預算計384萬元(母親節及父親節各192萬元)。\n三、本案禮品發放對象為本府一、二級機關預算員額內之人員數（含正式員額、約聘僱人員、業務助理等），由各一級機關統計並彙整轄下二級機關之數量後提報本處，計約2萬6,500人。\n四、本府一、二級機關志工人數約計4萬多人，志工相關福利或補助係由各局處自行規劃及編列預算處理，將請各局處惠予納入考量。", "detail_answer": "(同簡答)"}, {"id": 69, "category": "秘書處業務", "question": "桃園馬祖交流小組運作情形？", "short_answer": "一、本小組於113年12月5日召開第2次工作會議，納入原住民族行政局規劃辦理馬祖原民相關交流事項；確認執行機關113年度交流成效及114年度工作事項，並研商後續參訪交流事宜，截至113年12月底計有11個執行機關辦理馬祖交流事項。\n二、114年2月26日，應連江縣政府邀請，由本小組賴召集人淑華代表本府參與114年馬祖擺暝文化祭活動，體驗馬祖傳統文化，增進雙方交流。", "detail_answer": "一、為增進桃園馬祖互動，本府成立桃園馬祖交流小組，由賴副秘書長淑華擔任召集人、秘書處于處長建國擔任副召集人、八德區公所蔡區長豊展擔任執行秘書；執行機關包含新聞處、文化局、農業局、觀光旅遊局、民政局、教育局、青年事務局、智慧城鄉發展委員會、經濟發展局、體育局、社會局、原住民族行政局、八德區公所等。\n二、本小組於113年12月5日召開工作會議，確認執行機關113年度交流成效及本(114)年度工作事項，並研商後續參訪交流事宜。截至113年12月底，各執行機關交流事項之辦理情形，羅列如下：\n三、114年馬祖擺暝文化祭訂於本(114)年2月9日至2月26日假連江縣北竿鄉舉行，為促進桃園馬祖文化交流，連江縣政府來函邀請本府蒞臨參加活動，由本小組召集人賴副秘書長淑華代表參加2月26日的祈夢儀式，體驗馬祖傳統文化，增進雙方交流。"}, {"id": 70, "category": "秘書處業務", "question": "本次報告期間，本市與國內城市交流情形？", "short_answer": "113年8月6日金門縣政府副縣長李文良及金門縣議會議長洪允典率縣府暨縣議會團隊共約30人蒞桃進行城市業務交流活動，本市與金門縣於民國85年，由當時金門縣長陳水在和桃園縣長劉邦友締結為「兄弟縣」(現稱姊妹縣市)，雙方在過去有許多文化、教育、體育、觀光及施政等面向的交流。\n本次以本市航空城產業專區、招商及青創等相關業務為交流重點，參訪桃園航空城公司、中原文創園區及市立圖書館總館等，透過觀摩交流汲取相關經驗，提供該縣施政發展之借鏡。", "detail_answer": "(同簡答)"}, {"id": 71, "category": "秘書處業務", "question": "兩岸事務小組是否繼續運作？小組成員為何？是否有公開於網站？今年何時召開兩岸事務小組會議？", "short_answer": "一、兩岸事務小組委員人數計25人(府內委員15人、府外專家學者10人)，任期為2年112.05~114.04)，因總統賴清德於114年3月13日提出台灣當前所面對的5大國安及統戰威脅以及17項因應策略，考量現今情勢，將視適當時機辦理遴聘兩岸事務小組委員及召開兩岸事務小組會議。\n二、具體作為如下:\n視業務需要召開兩岸事務小組會議\n定期辦理兩岸事務研習、座談會\n辦理台商聯誼會或座談會活動\n辦理中國訪賓接待\n推動赴陸參訪考察\n陸生、陸配(均含港澳)相關優惠福利措施", "detail_answer": "104年4月成立兩岸事務小組，依「本府兩岸事務小組設置要點」規定\n(一)本小組置委員25人，任期為2年(112.05~114.04)，因總統賴清德於114年3月13日表示，中國已是「反滲透法」所定義的「境外敵對勢力」，並提出台灣當前所面對的5大國安及統戰威脅以及17項因應策略，考量現今情勢，將視適當時機辦理遴聘兩岸事務小組委員及召開兩岸事務小組會議。\n府內委員15人。\n府外委員(含專家學者、民間團體、社會賢達人士)10人。\n(二)置執行秘書1人，由秘書處處長兼任，並設置幹事3人。\n委員名單：\n\n是否有公開於網站？未公開的理由？\n是否有公開於網站？\n本府無公告委員名單，惟本處於112年6月20日辦理「兩岸事務小組委員聘書頒贈」活動，當日發布市政新聞稿有公布委員名單。\n查其他五都僅台北市政府將委員名單公告於官網。\n未公開的理由？\n循往例及比照其他四都不予公開。\n網站可搜尋到資料，惟代表機關出任者會隨其本職進退。\n委員任期至114年4月，俟新遴聘委員後，可再考慮是否公開。\n任務：\n兩岸政策之宣導、推動。\n本市兩岸事務之綜合規劃、推動。\n本府所屬機關兩岸工作計畫及相關規定之審議。\n本府所屬機關處理兩岸事務之協調聯繫。\n本市兩岸事務資訊之蒐集、分析與出版。\n其他有關本市兩岸事務之處理。\n具體作為如下:\n視業務需要召開兩岸事務小組會議\n  就本市陸生及陸配現況、陸客訪桃情形及桃園台商赴陸投資及兩岸相關事務等情形進行討論。（107年召開2次、108年召開1次、109-111年召開0次、112年召開1次、113年召開0次。因總統賴清德於114年3月13日公開談話，將視適當時機召開兩岸事務小組會議。）\n定期辦理兩岸事務研習、座談會\n    為增進各機關同仁對兩岸關係的了解，舉辦兩岸事務研習及座談會，邀請國內著名兩岸事務學者專家擔任主講及對談，對兩岸關係及政策進行意見交流。\n辦理台商聯誼會或座談會活動\n以增進與大陸台商之交流互動，適時表達政府對台商之關懷，並積極鼓勵台商返台投資。\n辦理中國訪賓接待\n接待中國訪賓，進行經貿、文化、教育、體育及市政等交流。\n推動赴陸參訪考察\n推動本府及各機關赴陸參訪，就觀光、教育、文化、體育、警政衛生、農業、城市規劃、青年事務、產業招商等進行交流參訪。\n陸生、陸配(均含港澳)相關優惠福利措施\n陸生、陸配(均含港澳)可申請市民卡\n 希望外配融入在地桃園生活，享有搭乘大眾運輸工具、圖書館借書、繳納政府規費、桃園市店家消費折扣等優惠，享有和本市市民對等的待遇，此措施大大提升其在桃園生活的便利性。\n本府婦幼發展局下設「新住民事務科」\n於「新住民文化會館」設置桃園新住民聯合服務中心，要達成友善尊重、權益保障、多元服務、培力發展4大任務，展現桃園的多元友善。\n本市陸生及陸配(均含港澳)人數\n統計113學年度(113.08.01-114.07.31)：陸生人數為230人、港澳生人數為1,124人，共計1,354人。\n(二)統計至114年1月底：本市大陸籍配偶人數為39,456人、港澳籍配偶人數為2,279人，共計41,735人。"}, {"id": 72, "category": "秘書處業務", "question": "兩岸交流相關事項\n一、112年及113年兩岸交流規劃?\n二、是否有計畫與中國城市(如南京、重慶)舉行雙城論壇?\n三、兩岸事務相關經費編列多少？其用途為何？\n四、六都近3年辦理兩岸交流活動情形？", "short_answer": "一、兩岸交流規劃\n (一)113及114年兩岸交流規劃\n本府113及114年交流次數計9次。\n升格後府本部及本處至中國參訪5次。\n有關建議兩岸交流會議或參訪活動需有原住民族代表共同參與：未來辦理兩岸交流會議及兩岸相關活動時，將視性質適時會同本府原住民族行政局共同參與，以增進不同層面的交流，展現多元文化之特色。\n\n有關舉行雙城論壇：\n市長表示：為推動兩岸交流，本府不定期辦理兩岸相關活動，許多台商回到台灣，都表達所在城市與本市締結姊妹市的意願，本府也希望能多推動兩岸城市交流，並俟適當時機規劃安排辦理執行。\n本處表示：本府不定期辦理兩岸相關活動，將依據中央兩岸政策方向，並在相互對等、尊重、不設定政治立場的之前提下，持續推動兩岸城市交流，並適時研議舉辦雙城論壇之可能性。\n兩岸事務相關經費\n六都近年辦理兩岸交流活動情形", "detail_answer": "一、桃園市政府兩岸事務小組將持續努力推動兩岸城市各項交流，精進兩岸城市的各種互動契機。\n(一)113年及114年兩岸交流規劃\n\n(二)113年及114年本府交流次數計9次\n\n(三)升格後府本部及本處至中國參訪5次\n註：查前桃園市長鄭文燦任內無以公款赴大陸地區。\n(四)有關建議兩岸交流會議或參訪活動需有原住民族代表共同參與：未來辦理兩岸交流會議及兩岸相關活動時，將視性質適時會同本府原住民族行政局共同參與，以增進不同層面的交流，展現多元文化之特色。\n\n有關舉行雙城論壇：\n市長表示(112.11.16總質詢)：為推動兩岸交流，本府不定期辦理兩岸相關活動，許多台商回到台灣，都表達所在城市與本市締結姊妹市的意願，本府也希望能多推動兩岸城市交流，並俟適當時機規劃安排辦理執行。\n本處表示(113.10.16第3屆第4次定期會工作報告)：本府不定期辦理兩岸相關活動，將依據中央兩岸政策方向，並在相互對等、尊重、不設定政治立場的之前提下，持續推動兩岸城市交流，並適時研議舉辦雙城論壇之可能性。\n\n兩岸事務相關經費\n歷年兩岸事務相關經費\n經費運用\n本處113年辦理中國大陸事務研習及講座等活動，114年除賡續辦理上述活動外，另增加陸配參訪「2025臺灣燈會在桃園」，並不定期辦理交流、拜會等。\n六都近年辦理兩岸交流活動情形"}, {"id": 73, "category": "秘書處業務", "question": "桃園及其他縣市有無與中國城市締結姐妹市？或簽署合作行為(備忘錄、意向書)?", "short_answer": "若欲與大陸締結姊妹市，須報議會，並經內政部會商大陸委員會報請行政院同意。\n若欲與大陸簽屬合作行為(備忘錄、意向書)，無須報議會。\n查本市及其他縣市尚無與大陸城市締盟(及締結姊妹市)及無以「府名義」簽屬合作行為(備忘錄、意向書)。", "detail_answer": "桃園及其他縣市有無與中國城市締結姐妹市？\n法規\n依據「台灣地區與大陸地區人民關係條例」(下稱兩岸條例)第33條之2第1項規定，台灣地區各級地方政府機關(構)或各級地方立法機關，非經內政部會商大陸委員會報請行政院同意，不得與大陸地區地方機關締結聯盟。\n依據「內政部審查地方政府與大陸地區地方機關之合作行為或締結聯盟申報須知」(下稱締盟須知)第3條規定，地方政府機關（構）與大陸地區地方機關締結聯盟，應先諮商地方立法機關後，送本（內政）部會商大陸委員會，轉報行政院。\n若欲與大陸締結姊妹市，須報議會，並經內政部會商大陸委員會報請行政院同意。\n查本市及其他縣市尚無與大陸城市締盟(及締結姊妹市)。\n\n桃園及其他縣市有無與中國城市簽署合作行為(備忘錄、意向書)?\n法規\n依據「兩岸條例」第33條之1第1項規定，台灣地區人民、法人、團體或其他機構，非經各該主管機關許可，不得為下列行為：\n與大陸地區黨務、軍事、行政、具政治性機關（構）、團體或涉及對台政治工作、影響國家安全或利益之機關（構）、團體為任何形式之合作行為。\n與大陸地區人民、法人、團體或其他機構，為涉及政治性內容之合作行為。\n與大陸地區人民、法人、團體或其他機構聯合設立政治性法人、團體或其他機構。\n依據「締盟須知」第2條規定，地方政府與大陸地區地方機關為合作行為，依下列原則辦理： \n由直轄市、縣（市）長為之，且合作行為之議題屬單一中央目的事業主管機關者，應送該中央目的事業主管機關辦理。\n由直轄市、縣（市）長為之，且合作行為之議題涉及二以上中央目的事業主管機關者，應送本(內政)部會商辦理。 \n由直轄市、縣（市）政府所屬機關（構）為之者，應送該機關（構）業務所屬之中央目的事業主管機關辦理；其議題涉及其他中央目的事業主管機關者，應會商該中央目的事業主管機關辦理。\n若欲與大陸簽屬合作行為(備忘錄、意向書)，無須報議會，不得為涉及政治性內容，依所涉議題：\n議題屬單一，報中央目的事業主管機關辦理。\n議題涉2個以上，報內政部會商各中央目的事業主管機關辦理。\n查本市及其他縣市無以「府名義」與大陸簽屬合作行為(備忘錄、意向書)。\n另以台北市政府與上海市簽訂MOU為例：\n係由「業務機關名義」簽署，函文中央目的事業主管機關，並副知內政部及陸委會。\n每年簽署的業務機關不同，以2024年簽署之2項交流合作備忘錄為例，簽署的業務機關為衛生局、臺北市立動物園。"}, {"id": 74, "category": "秘書處業務", "question": "兩岸政策方向\n一、中央與桃園之兩岸政策方向\n二、陸客來台觀光現狀，本府有何因應方案？若桃園市民前往大陸旅遊，有何注意事項？\n三、因應中央政策方向，本府預計如何交流？", "short_answer": "一、中央與桃園之兩岸政策方向\n(一)中央：\n總統賴清德於114年3月13日召開國安高層會議後提出，中國已是「反滲透法」所定義的「境外敵對勢力」，並提出台灣當前所面對的5大國安及統戰威脅以及17項因應策略。\n(二)桃園：\n市長於113年12月11日表示，兩岸緊張的時候，其實多一些對話的管道，有總比沒有好，雖然中央有自己的立場，但是地方自己有兩岸溝通的管道，又不涉及政策時，就應該多一些對話管道。\n二、陸客來台觀光現狀，本府有何因應方案？若桃園市民前往大陸旅遊，有何注意事項？\n(一)因應方案\n中國大陸國台辦114年1月24日證實，福建、上海旅遊踩線團已向台灣提出來台考察申請。陸委會主委邱垂正114年2月4日表示，我方台旅會已經向對岸海旅會發函，表達希望透過兩岸觀光小兩會（台灣海峽兩岸觀光旅遊協會與海峽兩岸旅遊交流協會）來溝通大陸團客來台的事宜。交通部觀光署長周永暉114年2月7日表示，當前兩岸觀光的現況與過去有所不同，仍希望踩線團來台能透過觀光小兩會討論，目前我方也已與海旅會提出聯繫。\n有關觀光回應方案，本府觀光旅遊局已有相關妥適規劃。\n (二)國人赴大陸地區、港澳地區旅遊交流相關重要注意事項(含過境或轉乘經由大陸地區、港澳地區機場、港口之航空器、船舶或其他運輸工具至其他國家或地區)：\n依據大陸委員會113年6月27日新聞稿指出，即日起調升中國大陸及香港澳門旅遊警示為「橙色」燈號，建議國人避免非必要旅行。\n出發前可上陸委會官網「國人赴陸港澳動態登錄系統」進行登錄。\n最好能全程維持集體行動，團進團出。\n應注意手機、個人電腦等隨身用品，是否存有可能構成陸方相關機關搜査或沒收，甚至入罪的內容。\n可能觸犯中國大陸及港澳國家安全相關法規之資料、物品、檔案、書籍、報章及期刊等，建議勿攜往港澳。\n在陸旅行期間應盡量避免談論敏感議題(如政治思想、宗教信仰等)。\n禁止攜帶武器、彈藥及爆炸物品等進入大陸。\n留意當地法規，特別是「港版國安法」。\n如遇有急難事件，可撥打24小時緊急聯絡電話。\n因應中央政策方向，本府預計如何交流？\n五都因應方案：循往例辦理相關事項，目前暫無提出相關調整作為。\n本府預計如何交流：\n本府不定期辦理兩岸相關活動，如中國大陸事務研習、座談會等，將依據中央兩岸政策方向，留意活動議題選取，並在相互對等、尊重、不設定政治立場的之前提下，持續推動兩岸城市交流。\n經詢本府婦幼發展局表示，目前本市陸配尚無針對中央政策方向有負面回應，該局業務主要為關懷與服務新住民，並以在地生活適應為主，對於中央政策方向，目前尚無因應措施。", "detail_answer": "一、中央與桃園之兩岸政策方向\n(一)中央：\n總統賴清德於114年3月13日召開國安高層會議後提出，中國已是「反滲透法」所定義的「境外敵對勢力」，並提出台灣當前所面對的5大國安及統戰威脅以及17項因應策略：\n\n(二)桃園：\n桃園市長歷次談話內容如下：\n\n陸客來台觀光現狀，本府有何因應方案？若桃園市民前往大陸旅遊，有何注意事項？\n(一)因應方案(有關觀光回應方案，本府觀光旅遊局已有相關妥適規劃。)\n\n(二)依陸委會網站資訊(含2024中國大陸旅行實用手冊)及洽該會主管，國人赴大陸地區、港澳地區旅遊交流相關重要注意事項(含過境或轉乘經由大陸地區、港澳地區機場、港口之航空器、船舶或其他運輸工具至其他國家或地區)：\n依據大陸委員會113年6月27日新聞稿指出，陸港澳近年持續增(修)相關國安法令，目前已有相當多起國人赴中國大陸遭非法扣押、留置、盤查等情形。近期中共又發布「關於依法懲治『台獨』頑固分子分裂國家、煽動分裂國家犯罪的意見」(以下簡稱「意見」)，嚴重威脅國人赴陸港澳之人身安全，政府經整體評估，認有必要自本(113)年6月27日起提升赴陸港澳旅遊警示為「橙色」，建議國人避免非必要赴陸港澳旅行。\n為強化國人赴陸安全，出發前請上陸委會官網「國人赴陸港澳動態登錄系統」進行登錄，以利國人在陸期間如遇有突發及緊急事件時，政府可即時取得聯繫，提供必要協助及服務。\n最好能全程維持集體行動，團進團出。遇到突發情況，同團人員應互相協助，並盡速設法通知陸委會，或海基會緊急專線等，以利獾得協助。\n出發前往大陸之前，應注意手機、個人電腦等隨身用品，是否存有可能構成陸方相關機關搜査或沒收，甚至入罪的內容，並建議在台灣考慮先另存備份後加以刪除。\n可能觸犯中國大陸及港澳國家安全相關法規之資料、物品、檔案、書籍、報章及期刊等，建議勿攜往港澳。攜往港澳之手機、筆電等及其內之社群媒體，亦建議勿存放相關之檔案、資訊、照片、影片等，以避免遭遇風險。\n對兩岸政治情勢需有基本認識與瞭解，在陸旅行期間應盡量避免談論敏感議題(如政治思想、宗教信仰、經濟發展情況等)。\n禁止攜帶進入大陸境內的物品包括武器、彈藥及爆炸物品；偽造的貨幣及有價證券；具爭議性的印刷品、膠卷、照片、唱片、影片、錄音(影)帶、光碟、電腦存儲介質及其他物品等。\n因應「港版國安法」及其43條實施細則之實施，提醒國人審慎評估前往或過境陸、港、澳行程，應特別留意個人人身安全，倘有疑慮，建議避免前往。\n國人抵陸、港、澳，陸委會另發送「緊急服務關懷簡訊」，請國人平安抵達目的地後留意接收手機訊息，並妥善保存。\n國人在陸、港、澳24小時急難服務專線：\n香港辦事處852-61439012\n澳門辦事處853-66872557\n中國大陸請撥海基會+886225339995\n因應中央政策方向，本府預計如何交流？\n五都因應方案：循往例辦理相關事項，目前暫無提出相關調整作為。\n本府預計如何交流：\n本府不定期辦理兩岸相關活動，如中國大陸事務研習、座談會等，將依據中央兩岸政策方向，留意活動議題選取，並在相互對等、尊重、不設定政治立場的之前提下，持續推動兩岸城市交流。\n經詢本府婦幼發展局表示，目前本市陸配尚無針對中央政策方向有負面回應，該局業務主要為關懷與服務新住民，並以在地生活適應為主，對於中央政策方向，目前尚無因應措施。"}, {"id": 75, "category": "秘書處業務", "question": "市長赴大陸地區相關事項\n一、直轄市長赴大陸地區相關規定？\n二、市長有無規劃去大陸？", "short_answer": "直轄市長赴大陸地區相關規定：\n依據「台灣地區與大陸地區人民關係條例(下稱兩岸條例)」等相關法規，直轄市長赴大陸地區依下列辦理：\n赴陸前，應備齊「進入大陸地區申請表」及「赴陸交流計畫」等相關文件至「公務員赴陸許可線上申請系統」申請。\n赴陸期間依「直轄市長及縣(市)長赴大陸地區須知」辦理。\n返台後，送交「返台通報表」，另提送「考察報告」予中央目的事業主管機關及陸委會。\n市長有無規劃去大陸：\n本府每年編列40萬「兩岸事務小組赴大陸地區城市考察訪問費用」(4天7人)，目前暫無規劃。\n本府持續推動兩岸城市各項交流，在堅守兩岸城市相互對等、尊重、不設定特定立場之前提，適時研議赴大陸地區參訪考察之可能性。", "detail_answer": "直轄市長赴大陸地區相關規定：\n相關法規\n赴陸前：\n依據「台灣地區與大陸地區人民關係條例(下稱兩岸條例)」及「台灣地區公務員及特定身分人員進入大陸地區許可辦法」規定，應於預定進入大陸地區當日之7個工作日前至「公務員赴陸許可線上申請系統」申請，應備文件如下：\n直轄市長及縣（市）長進入大陸地區申請表。\n赴陸交流計畫(包含計畫之緣起、活動目的、研討主題、主辦單位、參與活動之國家、組織、團體或成員、邀訪單位或邀請函、我方隨團人員、交流活動預期效益、交流活動經費來源或其年度出國預算資料等)。\n其他有助說明活動性質之文件(如邀請函、同行團員名單等)。\n赴陸期間注意事項摘要：\n依據「直轄市長及縣(市)長赴大陸地區須知」(下稱直轄市長赴陸須知)摘要如下：\n交流秉持對等、尊嚴原則，應避免遭受中共方面矮化，亦不應參加大陸舉辦具有內國化或將我縣市政府納為其全國性一部分之交流活動（如大陸地區舉辦之全國省市運動會等）。\n交流應以直轄市、縣（市）政事務為限：\n不包括從事涉及政治主權之商談或簽署協議（例如商談兩岸定位問題等）。\n不涉及聯繫、交涉或協商中央政府權限事項（例如引進大陸勞工、兩岸共同打擊犯罪、人民幣兌換事宜等）。\n若欲與大陸締結姊妹市說明：\n依據「兩岸條例」及「內政部審查地方政府與大陸地區地方機關之合作行為或締結聯盟申報須知」(下稱締盟須知)，須報議會同意，並經內政部會商大陸委員會報請行政院同意。\n查本市及其他縣市尚無與大陸城市締盟(及締結姊妹市)。\n若欲與大陸簽署合作行為(備忘錄、意向書)說明：\n依據「兩岸條例」及「締盟須知」，無須報議會，不得為涉及政治性內容，依所涉議題：\na.議題屬單一，報中央目的事業主管機關辦理。\nb.議題涉2個以上，報內政部會商各中央目的事業主管機關辦理。\n查本市及其他縣市無以「府名義」與大陸簽屬合作行為(備忘錄、意向書)。\n另以台北市政府與上海市簽訂MOU為例：\n係由「業務機關名義」簽署，函文中央目的事業主管機關，並副知內政部及陸委會。\n每年簽署的業務機關不同，以2024年簽署之2項交流合作備忘錄為例，簽署的業務機關為衛生局、臺北市立動物園。\n返台後：\n依據「台灣地區公務員及特定身分人員進入大陸地區作業規定」，返台7個工作日內送交「返台通報表」。\n依據「直轄市長赴陸須知」規定，須依政府機關（構）人員從事兩岸交流活動注意事項，於1個月內向服務機關、中央目的事業主管機關及大陸委員會（以下簡稱陸委會）提送考察報告，並準用行政院及所屬各機關出國報告綜合處理要點規定，考察報告建置於國家發展委員會網站公務出國報告專區內。重要特殊案件，內政部會同國家安全局、法務部及陸委會組成之審查會可建議直轄市、縣（市）政府應另送各該地方議會參考。\n其他可能需注意事項：\n參訪地點或行程是否合宜。\n交流對象之層級是否對等、有無負面新聞。\n其他縣市政府赴大陸地區，陸方不會以國台辦名義邀約，而是以協會名義邀約，且建議勿全程接受對方落地接待(如機票、住宿自費)。\n出國案歷年議員關心議題：\n是否符合出國及採購相關規定。\n經費支出來源。\n是否達成預計的交流效益與成果。\n活動日期確定後，是否提早通知議會，是否邀約議員同行。\n市長有無規劃去大陸：\n本府每年編列40萬「兩岸事務小組赴大陸地區城市考察訪問費用」（4天7人），目前暫無規劃。\n本府持續推動兩岸城市各項交流，基於中央兩岸政策方向之考量，及堅守兩岸城市相互對等、尊重、不設定特定立場之前提，適時研議赴大陸地區參訪考察之可能性。\n其他縣市政府首長近年赴大陸地區參考資料：\n備註：112年以前僅列直轄市之資料"}, {"id": 76, "category": "秘書處業務", "question": "里長赴中國大陸相關規定", "short_answer": "里長赴陸無須依「台灣地區與大陸地區人民關係條例」(簡稱兩岸條例)提出申請，惟須注意，非經各該主管機關許可，不得為下列行為:\n一、與大陸地區具政治性、涉及對台政治工作、影響國安或利益之機關（構）及團體為任何形式之合作行為。\n二、與大陸地區人民、法人、團體或其他機構，為涉及政治性內容之合作行為。\n三、與大陸地區人民、法人、團體或其他機構聯合設立政治性法人、團體或其他機構。\n四、綜上，里長於參訪交流時，非經各該主管機關許可，不可有簽署交流合作備忘錄等涉及政治性之合作行為。", "detail_answer": "里長赴陸是否需提出申請?\n里長係地方選舉之公職人員，非屬公務員服務法之適用對象，其赴陸係依一般人民出境查驗程序查驗出境，故里長赴陸無須依「台灣地區與大陸地區人民關係條例」(簡稱兩岸條例)第9條規定提出申請。\n里長赴中國大陸參訪交流可否簽署交流合作備忘錄？\n依「兩岸條例」第33條之1規定，台灣地區人民、法人、團體或其他機構，非經各該主管機關許可，不得為下列行為:\n與大陸地區黨務、軍事、行政、具政治性機關（構）、團體或涉及對台政治工作、影響國家安全或利益之機關（構）、團體為任何形式之合作行為。\n與大陸地區人民、法人、團體或其他機構，為涉及政治性內容之合作行為。\n與大陸地區人民、法人、團體或其他機構聯合設立政治性法人、團體或其他機構。\n依同條例第90條之2第1項規定，處新台幣10萬元以上50萬元以下罰鍰，並得按次連續處罰。\n綜上，里長赴中國大陸參訪交流時，非經各該主管機關許可，不可有簽署交流合作備忘錄等涉及政治性之合作行為。"}, {"id": 77, "category": "秘書處業務", "question": "首長專用車及首長駕駛相關問題\n首長及區長可否配置專用車或駕駛?\n首長及區長可否駕駛專用車上下班?\n「桃園市政府及所屬各機關學校公務車輛管理要點」修法重點", "short_answer": "一、首長(不含二級機關首長)及區長可配置專用車及駕駛。\n二、首長(不含二級機關首長)及區長可駕駛專用車上下班。\n三、113年修正「桃園市政府及所屬各機關學校公務車輛管理要點」重點如下：\n(一)公務車輛原以「使用性質(如小客車、大客車等)」分類，修正為依「使用用途(如專用車及公務車)」分類。\n(二)將區長座車明文規定為公務車輛之「專用車」。\n(三)新增「公務小客車及客貨兩用車之配置原則及配置數」。\n(四)明確規範公務車輛可否供上下班搭乘(各機關不得使用公務車輛，提供主管人員或員工上下班搭乘。但配置專用車人員得使用專用車上下班)。", "detail_answer": "一、首長及區長可否配置專用車或駕駛\n依「桃園市政府及所屬各機關學校公務車輛管理要點」(下稱本府車輛管理要點)第2點規定略以，專用車：指專供市長、副市長、秘書長、副秘書長、各一級機關首長及區長所配置之車輛。\n另依「中央各機關學校工友員額管理作業要點」(下稱工友要點)第3點略以，簡任第12職等以上首長座車得配置駕駛，另查本府於107年6月5日府秘事字第1070097325號函知，再查桃園市政府組織自治條例第8條規定：「本市各區設區公所，除復興區外，其組織規程另定之。」及桃園市各區公所組織規程第2條第1項規定：「區公所置區長……綜理區政，並指揮、監督所屬員工」。爰此，區長屬本府車輛管理要點第6點所稱「機關首長」之範疇。\n綜上，首長及區長可配置專用車及駕駛。\n二、首長及區長可否駕駛專用車上下班?\n依本府車輛管理要點第2點規定略以，專用車：指專供市長、副市長、秘書長、副秘書長、各一級機關首長及區長所配置之車輛。另本府車輛管理要點第6點第2項規定，各機關不得使用公務車輛，提供主管人員或員工上下班搭乘。但配置專用車人員得使用專用車上下班。\n故首長及區長可駕駛專用車上下班。\n三、有關修正本府車輛管理要點，修法重點如下：\n(一)113年1月8日：\n1.公務車輛原以「使用性質」分類(如小客車、大客車等)，修正為依「使用用途」分類(如專用車及公務車)。(第2點)\n2.新增「將區長座車明文規定為公務車輛之專用車。」(第6點)\n3.新增「本府所屬各機關及學校之公務小客車及客貨兩用車之配置原則及配置數。」(第11點)\n(二)113年7月12日：\n1.依審計處113年5月30日審桃市一字第11300038982號函及113年6月11日審桃市一字第1130004356號函示「為明確規範各機關學校公務車輛可否供上下班搭乘，俾利各機關學校遵循，建請本府增修公務車輛管理要點或明確規範」，爰本處為明確規範公務車輛可否供上下班搭乘，俾利本府及所屬各機關學校遵循，故新增修正文字「各機關不得使用公務車輛，提供主管人員或員工上下班搭乘。但配置專用車人員得使用專用車上下班」。(第6點)\n2.公務車輛依使用用途分為「專用車」及「公務車」，又使用「專用車」不需事先填寫派車單，將「公務車輛」修正刪減文字為「公務車」。(第7點)"}, {"id": 78, "category": "秘書處業務", "question": "公務車汰換及租賃相關事宜\n公務車汰換或新購是否以購置電動車為優先選擇?\n公務車租賃規定?\n公務車輛汰(新)購及租賃計畫審查原則? \n公務車輛排氣量規定?", "short_answer": "公務車汰換或新購以購置電動車為優先選擇，另公務車輛汰換為電動車規劃\n(一)2030年(119年)公務機車(不含特種機車)100%電動化。另本府環保局希望提早於2026年(115年)完成本府公務機車(不含特種機車)100%電動化，惟仍須視本府預算編列財政狀況，續行推動。\n(二)2040年(129年)公務汽車(不含特種車輛)100%電動化。\n二、公務車租賃規定\n(一)優先租用電動車等低污染性之車種。\n(二)公務小客車之排氣量不得超過1800cc。\n(三)各機關接待外賓及特殊需要之用車，不受排氣量及租金限制。\n(四)本府租賃公務車輛費用標準上限：\n三、公務車輛汰(新)購及租賃計畫審查原則\n(一)汰換標準\n(二)審查原則\n1.各機關配置數依上一年度預算所列各車種總數額(特種車輛除外)作為配置數。\n2.為撙節預算，本府新設機關、租賃改購置或特殊業務需求須增加車輛配置數，建議不核列。\n3.若以「中央或其他單位補助款、BOT獎勵金」購置或租賃車輛，建議核列，惟加註但書規定如下，爾後若無中央或其他單位補助款及BOT獎勵金：\n(1)經本府核准新購公務車輛者，屆時該車達汰換標準將不予汰換，依相關規定逕行報廢處理。\n(2)經本府核准租賃公務車輛，屆時將不予核列。\n四、公務車輛排氣量規定", "detail_answer": "一、公務車汰換或新購是否以購置電動車為優先選擇?\n依據「中央政府各機關學校購置及租賃公務車輛作業要點」規定：「各機關購置各種公務車輛，優先購置電動車及電動機車等低污染性之車種。」及「共同性費用編列基準表」說明：「新購之各式公務車輛，除特種車、大客車、客貨兩用車、大貨車及駐外機構車輛外，應優先購置電動車。但如執行特殊業務需要，車輛常態性出勤一趟(天)來回里程數超過電池供應最大里程，且搭乘高鐵、大眾運輸系統有困難，或另無較有效率之替代方案者，報經主管機關核准，得購置油電混合動力車或燃油車，並應依編列基準辦理。」\n目前本府公務車輛汰(新)購皆依前述規定執行。\n本府公務車輛電動化預計期程\n1.2030年(119年)公務機車(不含特種機車)100%電動化。另本府環保局希望提早於2026年(115年)完成本府公務機車(不含特種機車)100%電動化，惟仍須視本府預算編列財政狀況，續行推動。\n2.2040年(129年)公務汽車(不含特種車輛)100%電動化\n二、公務車租賃規定\n(一)依據「中央政府各機關學校購置及租賃公務車輛作業要點」(下稱中央要點)第9點規定略以，各機關租賃公務車輛，依下列規定辦理：\n   1.優先租用電動車等低污染性之車種。\n   2.應以實用為原則，力避奢華車款；其中公務小客車之排氣量不得超過1,800cc。\n   3.各機關租賃接待外賓禮車及因應臨時或特殊需要之用車，不受排氣量及租金限制。\n(二)本府租賃費用標準\n    依據中央要點規定，各機關租賃接待外賓禮車及因應臨時或特殊需要之用車，不受排氣量及租金限制。爰本府參考「108年桃園市共同性費用編列基準」規定及考量機關業務屬性，並參酌市場行情，擬具租賃公務車輛費用標準上限如下：\n三、公務車輛汰(新)購及租賃計畫審查原則\n(一)汰換標準\n(二)另為控管本府各機關提報之預算總額度符合114年度公務車輛專案小組額度，車輛審查原則如下：\n1.各機關配置數依上一年度預算所列各車種總數額(特種車輛除外)作為配置數。\n2.為撙節預算，本府新設機關、租賃改購置或特殊業務需求須增加車輛配置數，建議不核列。\n3.若以「中央或其他單位補助款、BOT獎勵金」購置或租賃車輛，建議核列，惟加註但書規定如下，爾後若無中央或其他單位補助款及BOT獎勵金：\n(1)經本府核准新購公務車輛者，屆時該車達汰換標準將不予汰換，依相關規定逕行報廢處理。\n(2)經本府核准租賃公務車輛，屆時將不予核列。\n四、公務車輛排氣量規定"}, {"id": 79, "category": "秘書處業務", "question": "本府及本處公務車數量？本府公務車輛電動化比率與其他直轄市之情況？", "short_answer": "本府及本處公務車輛\n本府及其他直轄市公務車輛低污染車輛比率\n汽車：本府低污染(油電車及電動車)比率8.64%(6都中為第3高)\n機車：本府電動化比率67.25%(6都中為第2高)", "detail_answer": "本府公務車輛(截至113.12.31)\n本處公務車輛(截至113.12.31)\n本府及其他直轄市公務車輛低污染車輛比率\n(一)公務車輛淨零目標\n(二)汽車低污染車輛比率\n(三)機車電動化車輛比率\n註：低污染車輛含油電車及電動車。\n本府公務車輛電動化經費\n本府114年度車輛審查預算額度\n經查，公務車輛專案小組的預算額度為3億4,153萬6,000元。若將環境管理處、消防局、警察局及各局處的租賃公務車費用扣除後，尚餘約4,000萬元供各局處汰換公務車輛。"}, {"id": 80, "category": "秘書處業務", "question": "市府公務車除加保強制險外，是否有加保任意險？", "short_answer": "本處107年6月4日召開「本市公務車輛投保任意險訂定標準研商會議」，目前本府各機關及各區公所(除風管處外)公務汽機車除投保強制險外，皆已投保「駕駛人或乘客保險」除外之其他任意險(第三人責任險-傷害、財損、超額險及車體險)。", "detail_answer": "一、依據「桃園市政府及所屬各機關學校公務車輛管理要點」第5點規定略以，各機關公務車輛除應投保強制汽車責任保險外，亦得視財力與需要投保駕駛人或乘客保險除外之其他任意險。\n二、本處107年6月4日召開「本市公務車輛投保任意險訂定標準研商會議」，會議結論如下：\n    考量各機關特殊業務需求及公務車輛狀況不同，致所需投保險種、保額及保費亦會有所不同，請各機關依撙節原則，本於權責辦理，原則建議如下：\n\n三、各機關投保狀況\n(一)各機關及各區公所原則上均已依本府107年6月4日車輛保險研商會議決議險種及保額投保，惟部分機關及區公所因考量經費有限，或保險公司不予承保部分險種（車體險），致無法保足會議決議之險種及保額，但汽機車至少皆會投保任意險第三人責任險(傷害及財損)。\n(二)查本府僅風管處機車未投保任意險第三人責任險(傷害及財損)。"}, {"id": 81, "category": "秘書處業務", "question": "首長駕駛加班時數限制?", "short_answer": "不同員額職稱人員擔任首長駕駛，加班時數限制亦不同", "detail_answer": "不同員額職稱人員擔任首長駕駛，加班時數限制亦不同\n一、駕駛(屬工友、技工、駕駛類別)：\n依據「桃園市政府核備勞動基準法第84條之1」約定書審查基準規定略以，首長駕駛工作者係指事業單位之首長、主管以及獲有配車人員之駕駛，其正常工時及加班時數，每月總工時(上班+加班)不得超過260小時。\n二、約聘僱人員：\n依據「公務人員服務法」第12條第3項規定略以，辦公時數及延長辦公時數，每日不得超過12小時；延長辦公時數，每月不得超過60小時。\n三、約用人員及委外駕駛：\n依據「勞動基準法」第32條第2項規定略以，加班時數一個月不得超過46小時，但雇主經工會同意，如事業單位無工會者，經勞資會議同意後，延長之工作時間，一個月不得超過54小時，每三個月不得超過138小時。"}, {"id": 82, "category": "秘書處業務", "question": "首長宿舍相關事宜\n一、公有首長宿舍\n(一)本府有無公有首長宿舍?\n(二)使用費多少?\n二、租賃首長宿舍\n(一)預算編列標準?\n(二)有哪些局處租賃?", "short_answer": "一、公有首長宿舍\n目前僅有1間公有首長宿舍(忠孝廳舍)，配予市長居住。\n須扣繳房租津貼700元，另不須收取宿舍管理費用。\n租賃首長宿舍\n(一)坪數及預算編列標準\n(二)本府租賃宿舍首長共計11人(本府2人；局處9人)。", "detail_answer": "一、公有首長宿舍\n依「桃園市政府公有宿舍管理要點」第3點規定：「首長宿舍，指本府市長、副市長、秘書長、副秘書長及一級機關首長於任本職期間借用之宿舍。首長宿舍不敷使用時，機關應專案報請本府核准，始得租賃房舍作為首長宿舍，或提供職務宿舍借用，並比照中央機關首長宿舍管理要點之規定辦理。」\n目前僅有1間公有首長宿舍(忠孝廳舍)，配予市長居住。\n無其他公有首長宿舍。\n使用費用多少?\n1.依「全國軍公教員工待遇支給要點」第4點規定，由服務機關按月將所入之房租津貼數額700元扣繳公庫。\n2.依「本府公有宿舍管理要點」規定，首長宿舍不須收取宿舍管理費用。\n二、租賃首長宿舍\n預算編列標準：\n依「本府公有宿舍管理要點」、「中央機關首長宿舍管理要點」及「中央宿舍管理手冊」規定辦理。\n坪數及預算編列標準：\n3.租金：\n每平方公尺月租金以調查當地房租每平方公尺月租金前四分之一高之平均單價為限。\n114年訂定編列標準表係參考內政部不動產交易實價查詢服務網：111.02-114.02本市桃園區房租每平方公尺月租金前四分之一高之平均單價為為252元。\n     (3)另查目前113.02-114.02本市桃園區房租每平方公尺月租金前四分之一高之平均單價為為338元。\n4.以局處首長為例：\n(1)每月租金：平均單價*總面積上限=252元*151㎡=38,052元(約3.8萬)。\n(2)每年租金預算編列：每月租金3.8萬元*14個月(含2個月押金)=53.2萬。\n(二)本府租賃宿舍首長如下:\n1.本府\n(1)王副市長：租金32,500元/月。\n(2)溫秘書長：租金31,000元/月。\n2.社會局：租金36,500元/月。\n3.教育局：租金36,458元/月。\n4.新聞處：租金35,500元/月。\n5.客家局：租金36,000元/月。\n6.婦幼局：租金19,500元/月。 \n7.衛生局：租金37,000元/月。\n8.政風處：租金34,000元/月。\n9.智發會：租金30,600元/月。\n10.原民局：租金37,000元/月。\n11.觀旅局：刻正尋找合適之宿舍。"}, {"id": 83, "category": "秘書處業務", "question": "借用職務宿舍之使用費用多少?", "short_answer": "一、需扣繳房租津貼數額400-700元。\n二、依本府公有宿舍管理要點，職務宿舍應收取宿舍管理費；惟本府未明定職務宿舍管理費費用數額，可參考「中央各機關職務宿舍管理費收費基準」及附表。", "detail_answer": "一、依「全國軍公教員工待遇支給要點」第4點規定，由服務機關按月將所入之房租津貼數額400-700元扣繳公庫。\n二、依「桃園市政府公有宿舍管理要點」規定，職務宿舍應收取宿舍管理費。\n(一)本府未明定職務宿舍管理費費用數額。\n(二)可參考「中央各機關職務宿舍管理費收費基準」：\n單房間職務宿舍：以面積20㎡、屋齡未達30年為例，每月應收取28.47*20≒569元。\n2.多房間職務宿舍：以面積100㎡、屋齡未達30年為例，每月應收取12.77*100=1,277元。\n三、查本府職務宿舍521間(不包含三民員工備勤室)，多為本市各級學校之職務宿舍。\n四、三民員工備勤室之建物為本府養護工程處經管，其土地使用分區為公園用地，爰不可作為宿舍使用。"}, {"id": 84, "category": "秘書處業務", "question": "市府各機關工友遇缺之替代方案？年滿65歲有意願繼續任職之工友協商延後退休年齡作法？", "short_answer": "替代方案為改採現代化事務機具、業務資訊化、簡化流程、運用志工等人力、全面推行職員自我服務及擴大外包等措施辦理。\n本府業於114年1
