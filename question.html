<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>議會質詢輔助系統</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --surface2: #f5f5f7;
    --border: #e5e5e7;
    --text-primary: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-tertiary: #aeaeb2;
    --accent: #0071e3;
    --accent-light: #e8f1fb;
    --success: #34c759;
    --warning: #ff9500;
    --danger: #ff3b30;
    --radius: 16px;
    --radius-sm: 10px;
  }

  html {
    height: 100%;
  }

  body {
    font-family: -apple-system, "SF Pro Display", "PingFang TC", "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    height: 100%;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 5px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    min-height: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .app-icon {
    width: 22px; height: 22px;
    background: var(--accent);
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }

  .app-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: -0.2px;
    color: var(--text-secondary);
  }

  .app-subtitle {
    display: none;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    transition: all 0.3s;
    cursor: default;
    background: var(--surface2);
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }

  .status-pill.listening {
    background: #fff0f0;
    color: var(--danger);
    border-color: #ffd5d3;
  }

  .status-pill.active {
    background: #f0fff4;
    color: var(--success);
    border-color: #c3f0cd;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
  }

  .dot.pulse {
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }

  /* ── Main Layout ── */
  main {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    padding: 16px 20px;
    gap: 14px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* ── Voice Input Card ── */
  .voice-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px 20px;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  .voice-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-tertiary);
    margin-bottom: 10px;
  }

  /* Two-column layout: transcript left, action buttons right */
  .voice-body {
    display: flex;
    gap: 12px;
    align-items: stretch;
  }

  .transcript-text {
    flex: 1;
    font-size: 14px;
    line-height: 1.55;
    color: var(--text-primary);
    min-height: 96px;
    max-height: 130px;
    overflow-y: auto;
    font-weight: 400;
    -webkit-overflow-scrolling: touch;
  }

  .transcript-text.placeholder {
    color: var(--text-tertiary);
    font-style: italic;
  }

  /* ── Voice action buttons (right column) ── */
  .voice-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
    width: 88px;
  }

  .btn-mic {
    width: 100%;
    flex: 1;
    height: 50px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-mic.start {
    background: var(--accent);
    color: white;
  }

  .btn-mic.stop {
    background: var(--danger);
    color: white;
  }

  .btn-mic:active {
    transform: scale(0.97);
    opacity: 0.85;
  }

  .btn-secondary {
    height: 42px;
    padding: 0 12px;
    width: 100%;
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
  }

  .btn-secondary:active {
    background: var(--border);
  }

  /* ── Search box ── */
  .search-row {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .search-input {
    flex: 1;
    height: 44px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0 16px;
    font-size: 15px;
    background: var(--surface);
    color: var(--text-primary);
    outline: none;
    font-family: inherit;
  }

  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  .btn-search {
    height: 44px;
    padding: 0 18px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-search:active { opacity: 0.8; }

  /* ── Results ── */
  .results-area {
    flex-shrink: 0;
  }

  .results-header {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-tertiary);
    margin-bottom: 10px;
    padding: 0 2px;
  }

  .no-result {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 180px;
    color: var(--text-tertiary);
    gap: 10px;
  }

  .no-result-icon { font-size: 40px; }
  .no-result-text { font-size: 15px; }

  /* ── Q&A Card ── */
  .qa-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .qa-card.highlighted {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  .qa-card-header {
    padding: 16px 20px 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .qa-card-header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .push-btn {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 8px;
    border: 1.5px solid var(--accent);
    background: var(--accent-light);
    color: var(--accent);
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
  }
  .push-btn:active { background: var(--accent); color: #fff; }

  .qa-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 5px;
    background: var(--accent-light);
    color: var(--accent);
    letter-spacing: 0.2px;
  }

  .qa-question {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text-primary);
    letter-spacing: -0.2px;
  }

  .page-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    color: #666;
    background: #f0f0f2;
    border: 1px solid #ddd;
    border-radius: 5px;
    padding: 1px 6px;
    margin-left: 7px;
    vertical-align: middle;
    white-space: nowrap;
    letter-spacing: 0;
  }

  .score-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }

  .score-dots {
    display: flex; gap: 3px;
  }

  .score-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--border);
  }

  .score-dot.filled { background: var(--accent); }

  .score-label {
    font-size: 11px;
    color: var(--text-tertiary);
  }

  /* ── 幕僚直送浮動按鈕 ── */
  #customNoteBtn {
    position: fixed;
    bottom: 24px;
    right: 20px;
    z-index: 7777;
    background: #34c759;
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(52,199,89,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  #customNoteBtn:active {
    transform: scale(0.95);
    box-shadow: 0 2px 10px rgba(52,199,89,0.3);
  }

  /* ── Answer Tabs ── */
  .qa-tabs {
    display: flex;
    border-top: 1px solid var(--border);
    padding: 0 20px;
    gap: 0;
  }

  .qa-tab {
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .qa-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 600;
  }

  .qa-answer {
    padding: 14px 20px 18px;
    font-size: 16px;
    line-height: 1.7;
    color: var(--text-primary);
    word-break: break-word;
  }

  /* ── Answer hierarchical formatting ── */
  .ans-body { line-height: 1.8; }
  .ans-l1 { margin-top: 8px; font-weight: 500; color: var(--text-primary); }
  .ans-l1:first-child { margin-top: 0; }
  .ans-l2 { padding-left: 0.75em; margin-top: 3px; }
  .ans-l3 { padding-left: 1.5em; margin-top: 2px; }
  .ans-l4 { padding-left: 2.25em; margin-top: 2px; }
  .ans-normal { margin-top: 3px; }
  .ans-gap { height: 6px; }
  .ans-empty { color: #999; }

  /* ── No Speech API warning ── */
  .warning-banner {
    background: #fff8e6;
    border: 1px solid #ffe0a0;
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-size: 13px;
    color: #8a6000;
    display: none;
    flex-shrink: 0;
  }

  /* Scrollbar */
  .results-area::-webkit-scrollbar { width: 4px; }
  .results-area::-webkit-scrollbar-track { background: transparent; }
  .results-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── AI 答題提示 ── */
  .ai-hint-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    flex-shrink: 0;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .ai-hint-card.has-content {
    border-color: var(--accent);
  }

  .ai-hint-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 18px 10px;
    border-bottom: 1px solid var(--border);
  }

  .ai-hint-card.has-content .ai-hint-header {
    border-bottom-color: var(--accent-light);
  }

  .ai-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--accent);
    color: white;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 3px 9px;
    border-radius: 6px;
  }

  .ai-hint-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
  }

  .ai-hint-topic {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-tertiary);
    max-width: 40%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ai-hint-body {
    padding: 12px 18px 14px;
  }

  .ai-hint-empty {
    color: var(--text-tertiary);
    font-size: 14px;
    font-style: italic;
    padding: 4px 0;
  }

  .ai-point {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 5px 0;
    font-size: 15px;
    line-height: 1.55;
    color: var(--text-primary);
  }

  .ai-point + .ai-point {
    border-top: 1px solid var(--border);
  }

  .ai-point-num {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    background: var(--accent);
    color: white;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
  }

  .ai-point-text {
    flex: 1;
  }

  /* ── Confirmed Question Cards ── */
  .confirmed-queue { display: flex; flex-direction: column; gap: 10px; }
  .cq-card {
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .cq-card.is-latest { border-color: var(--accent); }
  .cq-header {
    background: var(--surface2);
    padding: 10px 14px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .cq-card.is-latest .cq-header {
    background: var(--accent-light);
  }
  .cq-num {
    flex-shrink: 0;
    background: var(--text-tertiary);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    margin-top: 2px;
    white-space: nowrap;
  }
  .cq-card.is-latest .cq-num { background: var(--accent); }
  .cq-question {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.4;
  }
  .cq-body {
    background: var(--surface);
    padding: 10px 14px 12px;
  }

  /* ── 參考資料 section label ── */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-tertiary);
    flex-shrink: 0;
    padding: 0 2px;
  }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>
<body>

<!-- ── Password Gate ── -->
<div id="pwGate" style="
  position:fixed; inset:0; z-index:9999;
  background:#1a1a2e;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:18px;
">
  <div style="font-size:40px">🔐</div>
  <div style="color:#fff; font-size:17px; font-weight:600; letter-spacing:0.3px;">請輸入存取密碼</div>
  <input id="pwInput" type="password"
    placeholder="密碼"
    autocomplete="off"
    style="
      width:220px; padding:12px 16px;
      border-radius:12px; border:1.5px solid #444;
      background:#2a2a3e; color:#fff;
      font-size:18px; letter-spacing:4px; text-align:center;
      outline:none;
    "
    onkeydown="if(event.key==='Enter') checkPw()"
  >
  <button onclick="checkPw()" style="
    background:#0071e3; color:#fff;
    border:none; border-radius:12px;
    padding:12px 36px; font-size:15px; font-weight:600;
    cursor:pointer;
  ">進入</button>
  <div id="pwErr" style="color:#ff6b6b; font-size:13px; display:none;">密碼錯誤，請再試一次</div>
</div>
<script>
  (function(){
    const CORRECT = 'tycg2026';
    const KEY = 'qa_auth';
    if (sessionStorage.getItem(KEY) === CORRECT) {
      document.getElementById('pwGate').style.display = 'none';
    }
    window.checkPw = function() {
      const val = document.getElementById('pwInput').value;
      if (val === CORRECT) {
        sessionStorage.setItem(KEY, CORRECT);
        document.getElementById('pwGate').style.display = 'none';
      } else {
        document.getElementById('pwErr').style.display = 'block';
        document.getElementById('pwInput').value = '';
        document.getElementById('pwInput').focus();
      }
    };
    setTimeout(() => document.getElementById('pwInput').focus(), 100);
  })();
</script>

<header>
  <div class="header-left">
    <div class="app-icon">🎙</div>
    <div>
      <div class="app-title">議會質詢輔助</div>
      <div class="app-subtitle">第3屆第5次定期會 · 秘書處</div>
    </div>
  </div>
  <div class="status-pill" id="statusPill">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">待機中</span>
  </div>
</header>

<main>

  <div class="warning-banner" id="warnBanner">
    ⚠️ 此瀏覽器不支援語音辨識，請使用 Chrome 或 Safari。可用下方手動搜尋代替。
  </div>

  <div class="voice-card">
    <div class="voice-label">語音辨識</div>
    <div class="voice-body">
      <div class="transcript-text placeholder" id="transcript">等待收音…</div>
      <div class="voice-actions">
        <button class="btn-mic start" id="micBtn" onclick="toggleMic()">
          <span id="micIcon">🎙</span>
          <span id="micLabel">開始收音</span>
        </button>
        <button class="btn-secondary" onclick="resetAll()">重置</button>
      </div>
    </div>
  </div>

  <!-- AI 答題提示區塊 -->
  <div class="ai-hint-card" id="aiHintCard">
    <div class="ai-hint-header">
      <div class="ai-badge">✦ AI</div>
      <div class="ai-hint-title">答題提示</div>
      <div class="ai-hint-topic" id="aiHintTopic"></div>
    </div>
    <div class="ai-hint-body" id="aiHintBody">
      <div class="ai-hint-empty">等待收音辨識或輸入關鍵字…</div>
    </div>
  </div>

  <div class="search-row">
    <input class="search-input" id="searchInput" type="search"
      placeholder="手動輸入關鍵字搜尋…"
      oninput="onSearchInput(this.value)"
      onkeydown="if(event.key==='Enter') doSearch()">
    <button class="btn-search" onclick="doSearch()">搜尋</button>
  </div>

  <div class="section-label" id="refLabel" style="display:none">詳細參考資料</div>

  <div class="results-area" id="resultsArea">
    <div class="no-result">
      <div class="no-result-icon">📋</div>
      <div class="no-result-text">開始收音或輸入關鍵字</div>
    </div>
  </div>

</main>

<script>
const QA_DATA = [
  {
    "id": 1,
    "category": "秘書處業務",
    "question": "市府第二行政園區進度與未來規劃",
    "short_answer": "第二行政園區選址將結合中路重劃區，鄰近中路車站，園區規劃進駐市政服務大樓及市議會兩個最大公共設施，更將整合道路系統、捷運規劃等大眾運輸工具，帶動鐵路地下化周邊土地的轉型。\n有關第二行政園區方案本府已持續與各級都委會溝通，待完成都市計劃後將彙整本府各機關需求並啟動規劃設計等作業，打造兼具效率與服務品質的現代化行政園區。",
    "detail_answer": "桃園市政府第二行政園區進度與未來規劃\n本府第二行政園區屬桃園重大城市建設工程，本府秘書處於110年完成可行性評估暨先期規劃，並提供本府都市發展局參考，現由本府都市發展局辦理。當時規劃以7,000人進駐規模，並納入市議會需求進行設計，初步估計所需的機關用地約3.81公頃。為確保未來具備擴充空間，將用地規模寬估為約5公頃。\n第二行政園區選址將結合中路重劃區，鄰近中路車站，園區規劃進駐市政服務大樓及市議會兩個最大公共設施，更將整合道路系統、捷運規劃等大眾運輸工具，帶動鐵路地下化周邊土地的轉型。在空間配置上，園區將進一步納入社會住宅、可負擔住宅、公共設施及商辦區，打造兼具行政與生活機能的複合空間。在中路整體開發面積約125公頃，行政園區用地已規劃擴增至7.68公頃。目前本府都發局正積極與各級都委會溝通，辦理都市計畫的上位規劃。\n都市計畫上位規劃完成並正式發布後，本府將依據確定之位置、面積及開發強度（如建蔽率、容積率與最大樓板面積）啟動後續作業。相關程序涵蓋進駐需求彙整、土地徵收、整體交通規劃及景觀綠化設計，並銜接細部設計與工程施作。希望在鐵路地下化綠園道完成及通車時，同步完成第二行政園區工程。\n有關第二行政園區方案本府已持續與各級都委會溝通，待完成都市計劃後將彙整本府各機關需求並啟動規劃設計等作業，打造兼具效率與服務品質的現代化行政園區。\n六都一級機關位於市政大樓外之情形：\n台北市：\n警察局、消防局、捷運工程局、體育局、翡翠水庫管理局、兵役局、客家事務委員會及公務人員訓練處，共8個機關。\n新北市：\n警察局、消防局、環保局、衛生局、青年局及捷運工程局，共6個機關。\n台中市(臺灣大道市政大樓、陽明市政大樓及文心第二行政大樓)：\n交通局、地方稅務局、地政局、警察局、消防局、衛生局、捷運工程局及原住民族事委員會，共8個機關。\n台南市(目前有永華及民治2個市政中心)：\n警察局、消防局、環境保護局、財政稅務局、衛生局及體育局，共6個機關。\n高雄市(目前有四維及鳳山2個行政中心)：\n警察局、消防局、環境保護局、衛生局、文化局、交通局、勞工局、客家委員會、運動發展局、毒品防制局、高雄市立空中大學，共11個機關。\n桃園市：\n捷運工程局、環境保護局、水務局、警察局、衛生局、消防局、文化局、地方稅務局、客家事務局、青年事務局、體育局、交通局、經濟發展局(市場科及商業發展科)、地政局(地價科及航空城開發科)、教育局(幼兒教育科)、勞動局(跨國勞動事務科)，共16個機關。其中跨府內、外一級機關共4個：經濟發展局、地政局、教育局、勞動局。",

    "detail_answer": "一、文書處理手冊文書保密相關規定重點如下：\n(一)依「文書處理手冊」第61點第1款規定，機密文書於分文（交辦）、陳核（判）、送會、送繕等機關內部傳遞流程，除「絕對機密」及「極機密」應由承辦人員親自持送外，其餘非由承辦人員傳遞時，應密封交遞。傳送一般公務機密文書應交指定專責人員或承辦人員親自簽收。上開所稱密封交遞，係指使用機關特製之機密文書傳遞專用（保密）封套（以下簡稱專用封套）。「文書處理手冊」對於專用封套之封面格式及簽核流程並無硬性規定，由機關本於權責自行決定。\n(二)機密文書傳遞各經手人員之保密責任，依「文書處理手冊」第54點規定，各機關應指定專責人員負責辦理機密文書拆封、分文、繕校、蓋印、封發等事項，各該事項經手人員應依前開規定親自簽收，並保守機密，不得洩露。\n(三)依「文書處理手冊」第65點：機密文書保管應注意事項如下：\n1.機密文書應保存於辦公處所；其有攜離必要者，須經機關首長或其授權之主管人員核准。\n2.機密文書應存放於保險箱或其他具安全防護功能之金屬箱櫃，並裝置密鎖。\n3.保管機密文書人員調離職務時，應將所保管之機密文書，逐項列冊點交機關首長指定之人員或檔案管理單位主管。\n4.各機關對於機密文書之處理，應指定專人會同檔案、資訊、通信、政風等業務承辦人員，實施查核。\n5.承辦人員發現承辦或保管之機密文書已洩漏、遺失或判斷可能洩漏、遺失時，應即報告所屬主管查明處理。\n二、依據機密檔案管理辦法第6條規定：機密檔案應與一般檔案分別存放，並依據機密等級分別保管；其微縮片或其他複製品，亦同。機密檔案應另備保險箱或其他具安全防護功能之箱櫃，裝置密鎖存放之；必要時，應存放於保險室或密室中，並裝置警報及監視系統。前項箱櫃、密鎖、警報及監視系統，至少每月應檢查ㄧ次，確保其安全。",

    "short_answer": "若欲與大陸締結姊妹市，須報議會，並經內政部會商大陸委員會報請行政院同意。\n若欲與大陸簽屬合作行為(備忘錄、意向書)，無須報議會。\n查本市及其他縣市尚無與大陸城市締盟(及締結姊妹市)及無以「府名義」簽屬合作行為(備忘錄、意向書)。",
    "detail_answer": "桃園及其他縣市有無與中國城市締結姐妹市？\n法規\n依據「台灣地區與大陸地區人民關係條例」(下稱兩岸條例)第33條之2第1項規定，台灣地區各級地方政府機關(構)或各級地方立法機關，非經內政部會商大陸委員會報請行政院同意，不得與大陸地區地方機關締結聯盟。\n依據「內政部審查地方政府與大陸地區地方機關之合作行為或締結聯盟申報須知」(下稱締盟須知)第3條規定，地方政府機關（構）與大陸地區地方機關締結聯盟，應先諮商地方立法機關後，送本（內政）部會商大陸委員會，轉報行政院。\n若欲與大陸締結姊妹市，須報議會，並經內政部會商大陸委員會報請行政院同意。\n查本市及其他縣市尚無與大陸城市締盟(及締結姊妹市)。\n桃園及其他縣市有無與中國城市簽署合作行為(備忘錄、意向書)?\n法規\n依據「兩岸條例」第33條之1第1項規定，台灣地區人民、法人、團體或其他機構，非經各該主管機關許可，不得為下列行為：\n與大陸地區黨務、軍事、行政、具政治性機關（構）、團體或涉及對台政治工作、影響國家安全或利益之機關（構）、團體為任何形式之合作行為。\n與大陸地區人民、法人、團體或其他機構，為涉及政治性內容之合作行為。\n與大陸地區人民、法人、團體或其他機構聯合設立政治性法人、團體或其他機構。\n依據「締盟須知」第2條規定，地方政府與大陸地區地方機關為合作行為，依下列原則辦理：\n由直轄市、縣（市）長為之，且合作行為之議題屬單一中央目的事業主管機關者，應送該中央目的事業主管機關辦理。\n由直轄市、縣（市）長為之，且合作行為之議題涉及二以上中央目的事業主管機關者，應送本(內政)部會商辦理。\n由直轄市、縣（市）政府所屬機關（構）為之者，應送該機關（構）業務所屬之中央目的事業主管機關辦理；其議題涉及其他中央目的事業主管機關者，應會商該中央目的事業主管機關辦理。\n若欲與大陸簽屬合作行為(備忘錄、意向書)，無須報議會，不得為涉及政治性內容，依所涉議題：\n議題屬單一，報中央目的事業主管機關辦理。\n議題涉2個以上，報內政部會商各中央目的事業主管機關辦理。\n查本市及其他縣市無以「府名義」與大陸簽屬合作行為(備忘錄、意向書)。\n另以台北市政府與上海市簽訂MOU為例：\n係由「業務機關名義」簽署，函文中央目的事業主管機關，並副知內政部及陸委會。\n每年簽署的業務機關不同，以2025年簽署之2項交流合作備忘錄為例，簽署的業務機關為工務局、勞動局，分別簽署「推動水治理交流合作備忘錄」與「推動職業技能培訓經驗分享合作交流備忘錄」。",

    "question": "兩岸政策方向\n一、中央與桃園之兩岸政策方向\n二、近期兩岸重要時事議題\n(一)陸客來台觀光議題\n(二)具陸籍身分繳附喪失原籍證明議題\n(三)中配里長國籍議題\n三、因應中央政策方向，本府預計如何交流？",
    "short_answer": "一、中央與桃園之兩岸政策方向\n(一)中央：\n依據114年10月13日陸委會資料，政府秉持「四個堅持」、「四個不變」，維持現狀，捍衛國家主權與民主自由，並由相關部會審酌情勢發展，推動穩健有序、互惠互利的雙邊往來，並持續健全國安法制，以實力達成和平目標，確保國家主權不受侵害。\n(二)桃園：\n市長於114年4月1日表示，譴責中共軍演，惡意相向是兩岸關係最糟的互動。中共無預警在台灣周遭展開軍事演習，對於目前兩岸緊張的情勢是雪上加霜，完全沒有必要。兩岸和平發展是台灣人民的期待，無論是哪一方，任何挑起對抗的意圖與動作，都只有壞處沒有好處。和平才能讓雙方正向交流與對話，呼籲陸方克制，勿繼續傷害台灣人民的情感。\n二、近期兩岸重要時事議題\n(一)陸客來台觀光議題\n1.因應方案\n(1)陸委會114年12月15日重申重視，「健康有序、雙向平衡、旅遊安全、歡迎陸客來台、小兩會先溝通」的兩岸觀光政策立場未改變，呼籲陸方為恢復兩岸觀光創造條件，而非設置障礙，儘速由海旅會回覆我方。\n(2)有關觀光回應方案，本府觀光旅遊局已有相關妥適規劃。\n2.行政院114年9月10日核定函頒「行政院及所屬各機關（構）人員赴香港或澳門注意事項」修正案，我政府相關人員赴港澳，不論平日、假日及事由，行前均應至人事差勤系統及「國人赴陸港澳動態登錄系統」進行登錄。如非公務事由，應於出境日三日前填具「行政院及所屬各機關（構）人員非因公務事由赴香港或澳門通報表」通報所屬機關（構）。如會見或聯繫特定身分人員，應於出境日一週前填具「行政院及所屬各機關（構）人員赴香港或澳門會見或聯繫特定身分人員通報表」通報陸委會，未及事前通報者，也應於返台後一週內，主動通報陸委會。\n3.國人赴大陸地區、港澳地區旅遊交流相關重要注意事項(含過境或轉乘經由大陸地區、港澳地區機場、港口之航空器、船舶或其他運輸工具至其他國家或地區)：\n依據大陸委員會113年6月27日新聞稿指出，即日起調升中國大陸及香港澳門旅遊警示為「橙色」燈號，建議國人避免非必要旅行。\n鼓勵出發前可上陸委會官網「國人赴陸港澳動態登錄系統」進行登錄。\n最好能全程維持集體行動，團進團出。\n應注意手機、個人電腦等隨身用品，是否存有可能構成陸方相關機關搜査或沒收，甚至入罪的內容。\n可能觸犯中國大陸及港澳國家安全相關法規之資料、物品、檔案、書籍、報章及期刊等，建議勿攜往港澳。\n在陸旅行期間應盡量避免談論敏感議題(如政治思想、宗教信仰等)。\n禁止攜帶武器、彈藥及爆炸物品等進入大陸。\n留意當地法規，特別是「港版國安法」。\n如遇有急難事件，可撥打24小時緊急聯絡電話。\n(二)具陸籍身分繳附喪失原籍證明相關議題\n內政部移民署114年4月9日發布新聞稿，為避免民眾同時具有兩岸戶籍情事，移民署陸續通知具陸籍身分且未曾繳附喪失原籍證明者，於合理期限內繳附相關證明文件。\n經洽移民署桃園市服務站，本次受影響範圍如下：\n具陸籍身分取得定居證，且未曾繳附喪失原籍證明者，均包含在內(不限陸配)。\n不含港澳配偶。\n經洽本府婦幼發展局：\n在桃陸配受影響人數：\n於今（115）年3月2日洽本府婦幼局，目前已無接獲在臺陸籍配偶請求除籍協助需求之情形。\n(統計至115年1月底：本市大陸籍配偶人數為39,665人、港澳籍配偶人數為2,358人，共計42,023人。)\n因應方式：\n設置專責窗口\n提供法律服務\n積極辦理政策宣傳\n持續追蹤個案情形\n戶政資料調閱服務\n(三)中配里長國籍議題\n內政部依國籍法清查全國村里長，未放棄中華人民共和國國籍者，要求地方政府予以解職，其中包括桃園市新屋區蚵間里長彭小林；桃市府則刻正持續就法規層面與內政部積極溝通，並請求進一步函釋，以釐清法令適用疑義，俾利依法妥處。\n因應中央政策方向，本府預計如何交流？\n五都因應方案：循往例辦理相關事項，目前暫無提出相關調整作為。\n本府預計如何交流：\n本府不定期辦理兩岸相關活動，如中國大陸事務研習、座談會等，將依據中央兩岸政策方向，留意活動議題選取，並在相互對等、尊重、不設定政治立場的之前提下，持續推動兩岸城市交流。\n經詢本府婦幼發展局表示，該局業務主要為關懷與服務新住民，並以在地生活適應為主，對於中央政策方向，因應方式如前述。",
    "detail_answer": "一、中央與桃園之兩岸政策方向\n(一)中央：\n政府秉持「四個堅持」、「四個不變」，不卑不亢，維持現狀，捍衛國家主權及民主自由，追求臺海和平、互利互惠、共存共榮。\n對於重啟雙邊對等觀光旅遊，以及學位生來臺就學，政府相關部會審酌情勢發展，共同研議後續作為，推動穩健有序、互惠互利的雙邊往來。\n面對中央中共對臺的威脅滲透，政府將健全國安法制，積極落實「和平四大支柱行動方案」及「五大國安統戰威脅及十七項因應策略」，靠實力達到和平的目標，確保國家主權不受侵害。\n另賴清德總統115年2月24日談及兩岸議題，政府希望能夠兩岸維持現狀，兩岸共同的敵人是天災地變、傳染病，共同目標是增進兩岸人民的福祉，期盼交流合作，讓兩岸能夠朝向和平共榮的方向發展。\n(二)桃園：\n桃園市長歷次談話內容如下：\n近期兩岸重要時事議題\n(一)陸客來台觀光議題\n1.因應方案(有關觀光回應方案，本府觀光旅遊局已有相關妥適規劃。)\n2.行政院及所屬各機關（構）人員赴港澳，不分平、假日及事由，行前都應至人事差勤系統及「國人赴陸港澳動態登錄系統」進行登錄。如非公務事由，應於出境日三日前填具「行政院及所屬各機關（構）人員非因公務事由赴香港或澳門通報表」通報所屬機關（構）。此外，赴港澳如有會見或聯繫港澳官方人士、港澳民意代表、擔任大陸地區黨務、軍事、行政或政治性機關（構）、團體之職務或為其成員者、或任職於中共駐港澳行政、軍事、黨務等其他公務機構者、海峽兩岸關係協會駐港澳人員，應於出境日一週前填具「行政院及所屬各機關（構）人員赴香港或澳門會見或聯繫特定身分人員通報表」，通報所屬機關（構），由所屬機關（構）通報陸委會；如臨時會見或聯繫前揭特定身分人員，未及事前通報者，也應於返回台灣後一週內，主動填具通報表通報所屬機關（構），並由所屬機關（構）通報陸委會。\n3.依陸委會網站資訊(含2025中國大陸旅行安全手冊)及洽該會主管，國人赴大陸地區、港澳地區旅遊交流相關重要注意事項(含過境或轉乘經由大陸地區、港澳地區機場、港口之航空器、船舶或其他運輸工具至其他國家或地區)：\n大陸委員會113年6月27日新聞稿指出，陸港澳近年持續增(修)相關國安法令，目前已有相當多起國人赴中國大陸遭非法扣押、留置、盤查等情形。近期中共又發布「關於依法懲治『台獨』頑固分子分裂國家、煽動分裂國家犯罪的意見」(以下簡稱「意見」)，嚴重威脅國人赴陸港澳之人身安全，政府經整體評估，認有必要自本(113)年6月27日起提升赴陸港澳旅遊警示為「橙色」，建議國人避免非必要赴陸港澳旅行。\n為強化國人赴陸安全，鼓勵出發前可上陸委會官網「國人赴陸港澳動態登錄系統」進行登錄，以利國人在陸期間如遇有突發及緊急事件時，政府可即時取得聯繫，提供必要協助及服務。\n最好能全程維持集體行動，團進團出。遇到突發情況，同團人員應互相協助，並盡速設法通知陸委會，或海基會緊急專線等，以利獾得協助。\n出發前往大陸之前，應注意手機、個人電腦等隨身用品，是否存有可能構成陸方相關機關搜査或沒收，甚至入罪的內容，並建議在台灣考慮先另存備份後加以刪除。\n可能觸犯中國大陸及港澳國家安全相關法規之資料、物品、檔案、書籍、報章及期刊等，建議勿攜往港澳。攜往港澳之手機、筆電等及其內之社群媒體，亦建議勿存放相關之檔案、資訊、照片、影片等，以避免遭遇風險。\n對兩岸政治情勢需有基本認識與瞭解，在陸旅行期間應盡量避免談論敏感議題(如政治思想、宗教信仰、經濟發展情況等)。\n禁止攜帶進入大陸境內的物品包括武器、彈藥及爆炸物品；偽造的貨幣及有價證券；具爭議性的印刷品、膠卷、照片、唱片、影片、錄音(影)帶、光碟、電腦存儲介質及其他物品等。\n因應「港版國安法」及其43條實施細則之實施，提醒國人審慎評估前往或過境陸、港、澳行程，應特別留意個人人身安全，倘有疑慮，建議避免前往。\n國人抵陸、港、澳，陸委會另發送「緊急服務關懷簡訊」，請國人平安抵達目的地後留意接收手機訊息，並妥善保存。\n國人在陸、港、澳24小時急難服務專線：\n香港辦事處852-61439012\n澳門辦事處853-66872557\n中國大陸請撥海基會+886225339995\n(二) 具陸籍身分繳附喪失原籍證明議題\n問題說明\n經洽移民署桃園市服務站，本次受影響範圍如下：\n具陸籍身分取得定居證，且未曾繳附喪失原籍證明者，均包含在內(不限陸配)。\n不含港澳配偶(因大陸籍與港澳籍取得定居之方式不同)。\n經洽本府婦幼局及桃園市新住民家庭服務中心：\n在桃陸配受影響人數：\n陸委會於114年6月26日新聞稿表示，有關地方政府反應之個案，經與移民署了解均已獲得解決。另於115年3月2日洽本府婦幼局，目前已無接獲在臺陸籍配偶請求除籍協助需求之情形。\n(統計至115年1月底：本市大陸籍配偶人數為39,665人、港澳籍配偶人數為2,358人，共計42,023人。)\n因應方式：\n設置專責窗口：為即時提供協助與諮詢，本府已設專責窗口為新住民聯合服務中心，並設立專線服務。\n提供法律服務：協助陸籍配偶了解相關法律規定與權益保障，本府提供免費法律諮詢服務，提供法令解釋、協助撰寫陳述意見等行政救濟相關文件。\n積極辦理政策宣傳：透過新住民關懷據點聯繫會議及新住民團體群組等管道持續進行政策內容與因應作為之宣導工作，以擴大政策觸及面。\n持續追蹤個案情形\n戶政資料調閱服務：新住民如需申請在臺設籍資料作為除籍佐證時，可持身份證明文件至任一戶政事務所辦理。\n(三)中配里長國籍議題\n內政部依國籍法清查全國村里長，未放棄中華人民共和國國籍者，要求地方政府予以解職，其中包括桃園市新屋區蚵間里長彭小林。\n相關報導說明：\n115年3月2日經洽民政局指出：\n有關本市陸籍里長（新屋區蚵間里彭小林里長）法規適用爭議一案，內政部自113年11月12日起，即函請各相關機關就民選公職人員兼具外國國籍情形，依《國籍法》第20條規定辦理。\n本府及本市新屋區公所業已多次函請內政部及陸委會針對相關法令適用疑義予以解釋，並具體說明本案情形；惟迄今就法規適用範圍及解釋內容，尚未形成一致見解。\n本府刻正持續就法規層面與內政部積極溝通，並請求進一步函釋，以釐清法令適用疑義，俾利依法妥處。\n因應中央政策方向，本府預計如何交流？\n五都因應方案：循往例辦理相關事項，目前暫無提出相關調整作為。\n本府預計如何交流：\n本府不定期辦理兩岸相關活動，如中國大陸事務研習、座談會等，將依據中央兩岸政策方向，留意活動議題選取，並在相互對等、尊重、不設定政治立場的之前提下，持續推動兩岸城市交流。\n經詢本府婦幼發展局表示，該局業務主要為關懷與服務新住民，並以在地生活適應為主，該局設置專責窗口，除積極關懷與服務新住民，並辦理相關政策宣傳，且持續追蹤個案情形，對於中央政策方向，因應方式如前述。\n日期｜談話內容\n112.06.20｜桃園籌組桃園市政府兩岸事務小組，希望一方面更妥善協助在大陸的桃園台商，再者逐步推展與對岸的城市交流。\n112.11.08｜只要能開放，將全力邀集觀光業者共同去大陸行銷。\n112.11.27｜市府期待能夠在城市交流的前提之下，讓桃園、甚至台灣的台商，都能夠有妥善的照顧，進而取得更好的發展，這也是身為地方父母官責無旁貸的責任。\n113.06.29｜兩岸政府都該盡一切力量促進兩岸交流，這才是兩岸民眾希望的事情。\n113.10.14｜大陸在台周邊進行軍演，大家都知道這是對岸非常不友善的舉動，在兩岸希望不要緊張的氛圍下，這種動作只有壞處沒有好處。\n113.12.11｜兩岸緊張的時候，其實多一些對話的管道，有總比沒有好，雖然中央有自己的立場，但是地方自己有兩岸溝通的管道，又不涉及政策時，就應該多一些對話管道。\n114.04.01｜譴責中共軍演，惡意相向是兩岸關係最糟的互動。中共無預警在台灣周遭展開軍事演習，對於目前兩岸緊張的情勢是雪上加霜，完全沒有必要。兩岸和平發展是台灣人民的期待，無論是哪一方，任何挑起對抗的意圖與動作，都只有壞處沒有好處。和平才能讓雙方正向交流與對話，呼籲陸方克制，勿繼續傷害台灣人民的情感。\n114.07.24｜譴責陸方搶奪世大運選手賀電，運動場不應淪為操弄政治或施壓的場域，陸方粗暴無禮的行為，羞辱到的只有自己，臺灣是一個自由、尊嚴的民主社會，我們絕不退讓，全體國人都是選手最堅強的後盾。\n114.11.24｜關於陸配參政權不受國籍法規範，對此想法表示支持，認為基於尊重人權精神，應讓中國大陸配偶盡早獲得參政機會；對於是否支持陸配取得身分證的時程從6年縮短至4年，也表示樂見其成。\n日期｜因應方案\n114.02.04｜陸委會主委邱垂正表示，我方台旅會已經向對岸海旅會發函，表達希望透過兩岸觀光小兩會（台灣海峽兩岸觀光旅遊協會與海峽兩岸旅遊交流協會）來溝通大陸團客來台的事宜。\n114.02.07｜交通部觀光署長周永暉表示，當前兩岸觀光的現況與過去有所不同，仍希望踩線團來台能透過觀光小兩會討論，目前我方也已與海旅會提出聯繫。\n114.09.19｜陸委會表示，建議陸方透過觀光小兩會就旅遊安全、品質、穩定性、公平性等事項進行觀光議題協商，惟未獲陸方回應，故再次呼籲陸方儘速回復我方邀請。\n114.12.15｜陸委會重申兩岸觀光政策\n政府持續展現善意，過去已宣示的政策不會改變，也沒有改變，只要陸方正面回應，即可推進。\n政府逐步恢復兩岸健康有序交流，推動兩岸雙向平衡觀光。\n政府維護國人赴陸旅遊安全。\n政府歡迎陸客來台觀光\n恢復兩岸觀光，須先由「小兩會」溝通。\n政府已重申善意及恢復健康有序兩岸觀光的堅定立場，呼籲陸方為恢復兩岸觀光創造條件，而非設置障礙。\n115.02.04｜中國文旅部單方宣布，將恢復上海居民赴金馬旅遊，但兩岸觀光旅遊「小兩會」始終未能就此協商。兩岸旅遊觀光現僅開放第三地陸客來臺觀光，以及福建團客與自由行赴金門、馬祖旅遊。臺灣方面，政府未限制臺灣人到大陸自由行，不過禁團令仍未解除。\n日期｜內容\n114.04.09｜內政部移民署發布新聞稿，為避免民眾同時具有兩岸戶籍情事，移民署陸續通知具陸籍身分且未曾繳附喪失原籍證明者，於合理期限內繳附相關證明文件。\n114.12.29｜截至114年12月26日止，在通知補繳的12,146人中，僅278位陸配因失聯以致尚未繳交註銷大陸戶籍證明，沒有找到人之前，政府不會註銷其臺灣身分。\n日期｜內容\n114.11.20｜內政部查核出5名村里長具中華人民共和國國籍，並以地方公所怠辦陸配里長解職，且直轄市也未盡指揮責任，114年5月14日將桃市府函送監察院查處。\n本府民政局表示尊重內政部做法，已向監院釋疑，也持續和法務局整理疑義，請陸委會和內政部釋明。\n114.11.24｜彭小林以陸配身分嫁來台灣32年，於111年參選，並當選新屋區蚵間里里長，是桃園市首名新住民里長，114年被內政部查出具有中國籍，目前尚未解職。彭小林另表示，92年已無大陸身分。",

    "question": "市長赴大陸地區相關事項\n一、直轄市長赴大陸地區相關規定？\n二、市長有無規劃去大陸？",
    "short_answer": "直轄市長赴大陸地區相關規定：\n依據「台灣地區與大陸地區人民關係條例(下稱兩岸條例)」等相關法規，直轄市長赴大陸地區依下列辦理：\n赴陸前，應備齊「進入大陸地區申請表」及「赴陸交流計畫」等相關文件至「公務員赴陸許可線上申請系統」申請。\n赴陸期間依「直轄市長及縣(市)長赴大陸地區須知」辦理。\n返台後，送交「返台通報表」，另提送「考察報告」予中央目的事業主管機關及陸委會。\n為建立各級民選公職人員赴中國交流之揭露機制，內政部建置「各級民選公職人員及宗教等團體赴中國交流資訊公開專區」，加強宣導並鼓勵專責人員將民選公職人員赴中國相關行程資訊登錄於旨揭專區。\n市長有無規劃去大陸：\n本府每年編列40萬「兩岸事務小組赴大陸地區城市考察訪問費用」(4天7人)，目前暫無規劃。\n本府持續推動兩岸城市各項交流，在堅守兩岸城市相互對等、尊重、不設定特定立場之前提，適時研議赴大陸地區參訪考察之可能性。",

    "detail_answer": "一、公務車汰換或新購是否以購置電動車為優先選擇?\n依據「中央政府各機關學校購置及租賃公務車輛作業要點」規定：「各機關購置各種公務車輛，優先購置電動車及電動機車等低污染性之車種。」及「共同性費用編列基準表」說明：「新購之各式公務車輛，除特種車、大客車、客貨兩用車、大貨車及駐外機構車輛外，應優先購置電動車。但如執行特殊業務需要，車輛常態性出勤一趟(天)來回里程數超過電池供應最大里程，且搭乘高鐵、大眾運輸系統有困難，或另無較有效率之替代方案者，報經主管機關核准，得購置油電混合動力車或燃油車，並應依編列基準辦理。」\n目前本府公務車輛汰(新)購皆依前述規定執行。\n本府公務車輛電動化預計期程\n1.依交通部「公務車電動化推動計畫」(114.01版)：指小客車\n(1)2030年(119年)正副首長專用車全面電動化。\n(2)2035年(124年)公務小客車全面電動化。\n(114.05.16張善政市長裁示「基於財務能力與我國電力屬於髒電為多，宜漸近式先以油電混合為主推動」)\n2.本府公務車輛低污染化目標：\n(1)依本市推動淨零城市自治條例(114.07.22)規定，既有公務車輛，除警消車輛、其他特殊車種或經本府核准者外，自2030年(119年)全面採用低污染車輛。\n(2)另本府環保局希望提早於2026年(115年)完成本府公務機車(不含特種機車)100%電動化，惟仍須視本府預算編列財政狀況，續行推動。\n二、公務車租賃規定\n(一)依據「中央政府各機關學校購置及租賃公務車輛作業要點」(下稱中央要點)第9點規定，各機關租賃公務車輛，依下列規定辦理：\n1.優先租用電動車等低污染性之車種。\n2.應以實用為原則，力避奢華車款；其中公務小客車之排氣量不得超過1,800cc。\n3.各機關租賃接待外賓禮車及因應臨時或特殊需要之用車，不受排氣量及租金限制。\n(二)本府租賃費用標準\n依據中央要點規定，各機關租賃接待外賓禮車及因應臨時或特殊需要之用車，不受排氣量及租金限制。爰本府參考「108年桃園市共同性費用編列基準」規定及考量機關業務屬性，並參酌市場行情，擬具租賃公務車輛費用標準上限如下：\n三、公務車輛汰(新)購及租賃計畫審查原則\n(一)汰換標準\n(二)另為控管本府各機關提報之預算總額度符合115年度公務車輛專案小組額度，車輛審查原則如下：\n1.各機關配置數依上一年度預算所列(自有及租賃)各車種總數額(特種車輛除外)作為配置數。\n2.為撙節預算，本府新設機關或特殊業務需求須增加車輛配置數，建議不核列。\n3.為符合中央政府各機關學校購置及租賃公務車輛作業要點第9點第2項規定，租賃改購置致增加自有車輛數，建議核列。\n4.若以「純市款及基金以外財源」新購或租賃車輛，建議核列，惟加註但書規定：\n(1)本案以「純市款及基金以外財源」新購車輛部分，爾後若無該財源，屆時該車達汰換標準將不予汰換，依相關規定逕行報廢處理。\n(2)本案以「純市款及基金以外財源」租賃車輛部分，爾後若無該財源，屆時將不予核列。\n四、公務車輛排氣量規定\n車種｜每輛年租金上限｜備註\n燃油車｜20萬元｜各機關租賃接待外賓禮車及因應臨時或特殊需要用車，不受排氣量及租金限制。\n油電混合動力車｜30萬元｜各機關租賃接待外賓禮車及因應臨時或特殊需要用車，不受排氣量及租金限制。\n電動車｜45萬元｜各機關租賃接待外賓禮車及因應臨時或特殊需要用車，不受排氣量及租金限制。\n車種｜汰換標準\n汽車｜1.已屆滿15年。\n汽車｜2.行駛里程數逾25萬公里。\n汽車｜3.滿10年且行駛里程數逾12萬5,000公里。\n汽車｜4.若汰換燃油車為電動車，符合下列之一者，得提前辦理汰換：\n滿8年。\n行駛里程數逾20萬公里。\n機車｜年限滿6年。\n類別｜排氣量｜備註\n市長｜2,500cc以下｜各機關租賃接待外賓禮車及因應臨時或特殊需要用車，不受排氣量及租金限制。\n副市長、秘書長｜2,000cc以下｜各機關租賃接待外賓禮車及因應臨時或特殊需要用車，不受排氣量及租金限制。\n副秘書長、一級機關首長、各區區長專用車及一般公務小客車｜1,800cc以下｜各機關租賃接待外賓禮車及因應臨時或特殊需要用車，不受排氣量及租金限制。",

    "short_answer": "替代方案為改採現代化事務機具、業務資訊化、簡化流程、運用志工等人力、全面推行職員自我服務及擴大外包等措施辦理。\n本府業於114年1月22日訂定「本府各機關學校與工友（含技工、駕駛）協商延後退休年齡審核作業說明」。本府各機關因業務需要，得與年滿65歲有意願繼續任職之工友協商延後退休年齡。\n114年經奉准延後退休年齡工友（含技工、駕駛）情形，本府各機關學校（含區公所）合計16人。",
    "detail_answer": "市府各機關工友遇缺之替代方案\n基於本市一體性及財政負擔考量並參照行政院人事行政總處101年10月12日總處組字第10100184492號函及行政院91年7月1日院授人企字第0910025483號函示「各機關學校之工友，不論超額與否，均予全面凍結不補」之員額精簡政策，有關本市所屬各機關，不另核定工友員額，各機關逕依在職工友數為基礎編列預算員額，出缺一律不補，並配合年度預算編列核實減列。\n查本府養護工程處6名技工及環境管理處7名技工分別於106年7月28日(文號1060165174)及109年12月25日(文號1090288815)簽准技術工友以新僱方式辦理在案(於本府工友總員額不變之原則下，專案簽准自行辦理僱用，且人員專職專用，不得移撥他機關)。\n次查本府教育局自100年始補助學校缺額工友委辦費，115年起調整每缺額每月為2萬8,600元整，委辦費專款專用於替代工友人力執行事務性(如校園環境、清潔維護、植栽修剪及設備維修等)及臨時性交辦事項，非用於新僱工友或請增臨時人員。\n爰此，有關本府各機關工友遇缺之替代方案，係準用「中央各機關學校工友員額管理作業要點」第6點規定略以，各機關學校應本於兼顧多元人力進用及機關預算編列情形，積極檢討將其事務性工作，改採現代化事務機具、業務資訊化、簡化流程、運用志工等人力、全面推行職員自我服務及擴大外包等措施辦理。\n市府各機關年滿65歲有意願繼續任職之工友協商延後退休年齡作法\n(一)為應113年7月31日修正公布之勞動基準法第54條修正意旨及機關業務推動需要，本府於114年1月22日訂定「本府各機關學校與工友(含技工、駕駛)協商延後退休年齡審核作業說明」，各機關學校如因業務推動需要，得與年滿65歲有意願繼續任職之工友(含技工、駕駛)協商延後退休年齡。\n(二)協商延後退休年齡審核作業流程：\n1.協商工友延後退休案件\n2.用人機關組成審核小組\n3.審核小組就下列事項進行審核\n(1)機關業務推動需要\n(2)有無其他替代措施\n(3)個人工作績效表現\n(4)個人體能健康情形\n(5)若有其他事項由用人機關視需要自行增訂之\n4.經審核小組審核\n(1)同意：用人機關與工友協商延後退休年齡\n協商合意：協商延後退休年齡通知書\n未協商合意：依原命令退休規定辦理\n(2)不同意：依原命令退休規定辦理\n5.退休日期前1個半月將協商結果報本府備查\n(三)114年1月至115年2月28日屆齡退休計37人(本府各機關13人，學校24人)，其中經奉准延後退休年齡工友(含技工、駕駛)計16人(本府各機關5人，學校11人)，機關如下：\n1.政風處、秘書處、衛生局、環保局及警察局各1人，共5人。\n2.學校共11人。\n三、前開協商延後退休年齡上限，說明如下：\n(一)現行法規無規定協商延後退休年齡上限，又依行政院人事行政總處114年1月7日總處綜字第11410001112號函表示，各機關得視業務需要自行訂定退休年齡上限。\n(二)目前亞洲國家延後退休規劃：\n1.日本：70歲。\n2.新加坡：目前63歲，將在2026年將法定退休年齡從63歲延至64歲，重新雇傭年齡上限從68歲調至69歲。\n3.韓國：目前62歲，預計2033年法定退休年齡延至65歲。",

// ── State ──
let recognition = null;
let isListening = false;
let userWantsListening = false; // true = user pressed 開始收音, survives auto-stops
let finalTranscript = '';
let interimTranscript = '';
let recentSegments = []; // stores last N finalized speech segments for focused search
let searchTimer = null;
let expandedCards = new Set();
let activeTab = {}; // cardId -> 'short' | 'detail'

// ── Init Speech Recognition ──
function initSpeech() {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRec) {
    document.getElementById('warnBanner').style.display = 'block';
    document.getElementById('micBtn').style.display = 'none';
    return;
  }
  recognition = new SpeechRec();
  recognition.lang = 'zh-TW';
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isListening = true;
    setStatus('listening');
  };

  // Auto-restart: browsers (especially Safari/iOS) stop recognition after silence
  // or ~60s. We restart automatically as long as the user hasn't pressed Stop.
  recognition.onend = () => {
    isListening = false;
    if (userWantsListening) {
      // Brief pause before restart to avoid rapid loops on some browsers
      setTimeout(() => {
        if (userWantsListening) {
          try { recognition.start(); } catch(e) {}
        }
      }, 250);
    } else {
      setStatus('idle');
      updateMicBtn(false);
    }
  };

  recognition.onerror = (e) => {
    // 'no-speech' is normal during silence — just let onend handle restart
    if (e.error === 'no-speech') return;
    // 'aborted' happens when we call stop() ourselves — ignore
    if (e.error === 'aborted') return;
    // Real error: stop trying
    userWantsListening = false;
    isListening = false;
    setStatus('idle');
    updateMicBtn(false);
  };

  recognition.onresult = (e) => {
    let interim = '';
    let final = finalTranscript;
    const newFinals = [];

    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) {
        final += t;
        newFinals.push(t.trim());
      } else {
        interim = t;
      }
    }

    // Accumulate finalized segments for rolling-window search
    if (newFinals.length > 0) {
      recentSegments.push(...newFinals.filter(s => s.length > 0));
      // Keep only last 12 segments (~60-90s of speech at typical pace)
      if (recentSegments.length > 12) recentSegments = recentSegments.slice(-12);
    }

    finalTranscript = final;
    interimTranscript = interim;

    // Display: show full accumulated text so user can see everything captured
    const display = finalTranscript + interimTranscript;
    updateTranscript(display);

    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      // Search strategy: use recent 3 segments + current interim
      // This keeps matching sensitive to the LATEST part of the question,
      // avoiding dilution from long earlier preamble.
      const recentQuery = recentSegments.slice(-3).join('') + interimTranscript;
      const query = recentQuery.trim().length > 3 ? recentQuery.trim() : display.trim();
      if (query.length > 3) autoSearch(query);
    }, 1000);
  };
}

function startListening() {
  if (!recognition) return;
  userWantsListening = true;
  try {
    recognition.start();
    updateMicBtn(true);
  } catch(e) {}
}

function stopListening() {
  if (!recognition) return;
  userWantsListening = false;
  recognition.stop();
  updateMicBtn(false);
}

function toggleMic() {
  if (isListening) {
    stopListening();
  } else {
    startListening();
  }
}

// ── UI Helpers ──
function setStatus(state) {
  const pill = document.getElementById('statusPill');
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  pill.className = 'status-pill';
  dot.className = 'dot';
  if (state === 'listening') {
    pill.classList.add('listening');
    dot.classList.add('pulse');
    text.textContent = '收音中';
  } else if (state === 'active') {
    pill.classList.add('active');
    text.textContent = '已找到答案';
  } else {
    text.textContent = '待機中';
  }
}

function updateMicBtn(listening) {
  const btn = document.getElementById('micBtn');
  const icon = document.getElementById('micIcon');
  const label = document.getElementById('micLabel');
  if (listening) {
    btn.className = 'btn-mic stop';
    icon.textContent = '⏹';
    label.textContent = '停止收音';
  } else {
    btn.className = 'btn-mic start';
    icon.textContent = '🎙';
    label.textContent = '開始收音';
  }
}

function updateTranscript(text) {
  const el = document.getElementById('transcript');
  if (text.trim()) {
    el.textContent = text;
    el.classList.remove('placeholder');
  } else {
    el.textContent = '等待收音…';
    el.classList.add('placeholder');
  }
}

function resetAll() {
  userWantsListening = false;
  if (isListening) stopListening();
  finalTranscript = '';
  interimTranscript = '';
  recentSegments = [];
  confirmedMatches = [];
  updateTranscript('');
  document.getElementById('searchInput').value = '';
  showEmpty();
  setStatus('idle');
  expandedCards.clear();
  activeTab = {};
  fbClearSession();
}

function showEmpty() {
  document.getElementById('resultsArea').innerHTML = `
    <div class="no-result">
      <div class="no-result-icon">📋</div>
      <div class="no-result-text">開始收音或輸入關鍵字</div>
    </div>`;
  document.getElementById('refLabel').style.display = 'none';
  resetAIHint();
}

function resetAIHint() {
  const card = document.getElementById('aiHintCard');
  card.classList.remove('has-content');
  document.getElementById('aiHintTopic').textContent = '';
  document.getElementById('aiHintBody').innerHTML = '<div class="ai-hint-empty">等待收音辨識或輸入關鍵字…</div>';
}

// ── Confirmed Match Queue ──
let confirmedMatches = [];

function tryConfirmMatch(topResult) {
  if (!topResult || topResult.score < 3) return;
  // Already in queue? Skip (no duplicates)
  if (confirmedMatches.find(m => m.qa.id === topResult.qa.id)) return;
  confirmedMatches.push({ qa: topResult.qa, score: topResult.score });
  renderConfirmedQueue();
  fbPushMatches();
}

function renderConfirmedQueue() {
  const card = document.getElementById('aiHintCard');
  const topicEl = document.getElementById('aiHintTopic');
  const bodyEl = document.getElementById('aiHintBody');
  if (confirmedMatches.length === 0) return;
  card.classList.add('has-content');
  topicEl.textContent = confirmedMatches.length > 1 ? `已偵測 ${confirmedMatches.length} 題` : '';
  bodyEl.innerHTML = '<div class="confirmed-queue">' +
    confirmedMatches.map((match, idx) => {
      const isLatest = idx === confirmedMatches.length - 1;
      const points = extractKeyPoints(match.qa.short_answer || match.qa.detail_answer);
      return `
        <div class="cq-card${isLatest ? ' is-latest' : ''}">
          <div class="cq-header">
            <div class="cq-num">第 ${idx + 1} 題</div>
            <div class="cq-question">${escHtml(match.qa.question)}${match.qa.page ? `<span class="page-badge">p.${match.qa.page}</span>` : ''}</div>
          </div>
          <div class="cq-body">
            ${points.map((pt, i) => `
              <div class="ai-point">
                <div class="ai-point-num">${i + 1}</div>
                <div class="ai-point-text">${formatAnswerHtml(pt)}</div>
              </div>
            `).join('')}
          </div>
        </div>`;
    }).join('') + '</div>';
}

// Extract key points from short_answer text (no limit on number of points)
function extractKeyPoints(text) {
  if (!text) return [];
  // Try split by Chinese numbered list: 一、二、三、四、五、
  const numbered = text.split(/(?=[一二三四五六七八九十百]+、)/);
  const filtered = numbered.map(s => s.replace(/^[一二三四五六七八九十百]+、/, '').trim()).filter(s => s.length > 5);
  if (filtered.length >= 2) return filtered;

  // Fallback: split by newline or 。
  const lines = text.split(/\n|(?<=。)/).map(s => s.trim()).filter(s => s.length > 8);
  if (lines.length >= 2) return lines;

  // Last resort: return the first sentence trimmed
  const first = text.trim().slice(0, 80);
  return [first];
}

function updateAIHint(topResult) {
  // If confirmed queue already has items, keep showing queue (don't overwrite with live preview)
  if (confirmedMatches.length > 0) {
    renderConfirmedQueue();
    return;
  }

  // No confirmed matches yet — show live preview of current best match
  const card = document.getElementById('aiHintCard');
  const topicEl = document.getElementById('aiHintTopic');
  const bodyEl = document.getElementById('aiHintBody');

  if (!topResult) {
    resetAIHint();
    return;
  }

  card.classList.add('has-content');
  topicEl.textContent = topResult.qa.question;

  const points = extractKeyPoints(topResult.qa.short_answer || topResult.qa.detail_answer);

  if (points.length === 0) {
    bodyEl.innerHTML = '<div class="ai-hint-empty">（無法取得答題要點）</div>';
    return;
  }

  bodyEl.innerHTML = points.map((pt, i) => `
    <div class="ai-point">
      <div class="ai-point-num">${i + 1}</div>
      <div class="ai-point-text">${formatAnswerHtml(pt)}</div>
    </div>
  `).join('');
}

// ── Search & Scoring ──
function tokenize(text) {
  // Split into 2-char and 3-char bigrams for Chinese
  const t = text.replace(/[?？。，、！!,.\s]+/g, '');
  const tokens = new Set();
  for (let i = 0; i < t.length - 1; i++) tokens.add(t.slice(i, i+2));
  for (let i = 0; i < t.length - 2; i++) tokens.add(t.slice(i, i+3));
  // Also add individual chars for short queries
  for (let c of t) tokens.add(c);
  return tokens;
}

function scoreQA(qa, queryTokens) {
  const qTokens = tokenize(qa.question);
  const aTokens = tokenize(qa.short_answer + ' ' + qa.detail_answer);
  
  let score = 0;
  let qHits = 0;
  for (let t of queryTokens) {
    if (qTokens.has(t)) { score += (t.length >= 3 ? 4 : t.length >= 2 ? 2 : 0.5); qHits++; }
    else if (aTokens.has(t)) { score += (t.length >= 3 ? 1.5 : t.length >= 2 ? 0.8 : 0.2); }
  }
  
  // Boost if question match ratio is high
  if (queryTokens.size > 0) {
    const ratio = qHits / queryTokens.size;
    score *= (1 + ratio * 0.5);
  }
  
  return score;
}

function search(query) {
  if (!query.trim()) return [];
  const qTokens = tokenize(query);
  if (qTokens.size === 0) return [];
  
  const scored = QA_DATA.map(qa => ({ qa, score: scoreQA(qa, qTokens) }))
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 5);
  
  return scored;
}

function autoSearch(query) {
  const results = search(query);
  if (results.length > 0) {
    setStatus('active');
    renderResults(results, true);
  }
}

function doSearch() {
  const q = document.getElementById('searchInput').value;
  if (!q.trim()) return;
  const results = search(q);
  if (results.length > 0) {
    setStatus('active');
    renderResults(results, false);
  } else {
    document.getElementById('resultsArea').innerHTML = `
      <div class="no-result">
        <div class="no-result-icon">🔍</div>
        <div class="no-result-text">找不到相關題目，請換個關鍵字</div>
      </div>`;
  }
}

function onSearchInput(val) {
  clearTimeout(searchTimer);
  if (val.length >= 3) {
    searchTimer = setTimeout(() => doSearch(), 600);
  }
}

// ── Render ──
let lastSearchResults = [];   // 保留最近一次搜尋結果供手動推送使用

function renderResults(results, autoExpand) {
  lastSearchResults = results;  // 存起來
  const container = document.getElementById('resultsArea');
  const count = results.length;

  // Update AI hint with the top match; try to confirm high-confidence matches into queue
  updateAIHint(results[0] || null);
  tryConfirmMatch(results[0] || null);

  // Show section label
  document.getElementById('refLabel').style.display = count > 0 ? 'block' : 'none';

  let html = `<div class="results-header">共 ${count} 筆相關題目 — 點擊查看完整內容</div>`;

  results.forEach((item, idx) => {
    const { qa, score } = item;
    const cardId = qa.id;
    // All cards collapsed by default; only restore previously-expanded state
    const isExpanded = expandedCards.has(cardId);
    const tab = activeTab[cardId] || 'short';
    const maxScore = results[0].score;
    const relScore = score / maxScore;
    const dots = 5;
    const filled = Math.max(1, Math.round(relScore * dots));

    const dotsHtml = Array.from({length: dots}, (_, i) =>
      `<span class="score-dot${i < filled ? ' filled' : ''}"></span>`
    ).join('');

    const hasShort = qa.short_answer && qa.short_answer.trim();
    const hasDetail = qa.detail_answer && qa.detail_answer.trim();
    const answerText = tab === 'short' ? (hasShort ? qa.short_answer : qa.detail_answer) : (hasDetail ? qa.detail_answer : qa.short_answer);

    html += `
    <div class="qa-card${idx === 0 ? ' highlighted' : ''}" id="card-${cardId}">
      <div class="qa-card-header" onclick="toggleCard(${cardId})">
        <div class="qa-card-header-top">
          <div class="qa-tag">${qa.category || '質詢題目'}</div>
          <button class="push-btn" onclick="event.stopPropagation(); manualPush(${cardId})" id="pushbtn-${cardId}" title="推送此題目給長官">📤 推送長官</button>
        </div>
        <div class="qa-question">${escHtml(qa.question)}${qa.page ? `<span class="page-badge">p.${qa.page}</span>` : ''}</div>
        <div class="score-bar">
          <div class="score-dots">${dotsHtml}</div>
          <span class="score-label">相關度 ${idx === 0 ? '· 最佳匹配' : ''}</span>
        </div>
      </div>`;

    if (isExpanded) {
      html += `
      <div class="qa-tabs">
        <div class="qa-tab${tab === 'short' ? ' active' : ''}" onclick="switchTab(event,${cardId},'short')">簡答版</div>
        <div class="qa-tab${tab === 'detail' ? ' active' : ''}" onclick="switchTab(event,${cardId},'detail')">詳答版</div>
      </div>
      <div class="qa-answer" id="ans-${cardId}">${formatAnswerHtml(answerText)}</div>`;
    }

    html += `</div>`;
  });

  container.innerHTML = html;
}

function toggleCard(cardId) {
  const card = document.getElementById(`card-${cardId}`);
  if (expandedCards.has(cardId)) {
    expandedCards.delete(cardId);
    // Re-render without the answer section
    const qa = QA_DATA.find(q => q.id === cardId);
    const tabsEl = card.querySelector('.qa-tabs');
    const ansEl = card.querySelector('.qa-answer');
    if (tabsEl) tabsEl.remove();
    if (ansEl) ansEl.remove();
  } else {
    expandedCards.add(cardId);
    const qa = QA_DATA.find(q => q.id === cardId);
    const tab = activeTab[cardId] || 'short';
    const hasShort = qa.short_answer && qa.short_answer.trim();
    const hasDetail = qa.detail_answer && qa.detail_answer.trim();
    const answerText = tab === 'short' ? (hasShort ? qa.short_answer : qa.detail_answer) : (hasDetail ? qa.detail_answer : qa.short_answer);
    
    const tabsHtml = `<div class="qa-tabs">
      <div class="qa-tab${tab==='short'?' active':''}" onclick="switchTab(event,${cardId},'short')">簡答版</div>
      <div class="qa-tab${tab==='detail'?' active':''}" onclick="switchTab(event,${cardId},'detail')">詳答版</div>
    </div>`;
    const ansHtml = `<div class="qa-answer" id="ans-${cardId}">${formatAnswerHtml(answerText)}</div>`;
    card.insertAdjacentHTML('beforeend', tabsHtml + ansHtml);
  }
}

function switchTab(e, cardId, tab) {
  e.stopPropagation();
  activeTab[cardId] = tab;
  const qa = QA_DATA.find(q => q.id === cardId);
  const hasShort = qa.short_answer && qa.short_answer.trim();
  const hasDetail = qa.detail_answer && qa.detail_answer.trim();
  const answerText = tab === 'short' ? (hasShort ? qa.short_answer : qa.detail_answer) : (hasDetail ? qa.detail_answer : qa.short_answer);
  
  const card = document.getElementById(`card-${cardId}`);
  card.querySelectorAll('.qa-tab').forEach(t => t.classList.remove('active'));
  card.querySelectorAll('.qa-tab')[tab === 'short' ? 0 : 1].classList.add('active');
  
  const ansEl = document.getElementById(`ans-${cardId}`);
  if (ansEl) ansEl.innerHTML = formatAnswerHtml(answerText);
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Answer Formatter：將純文字答案轉成階層化 HTML ──
function formatAnswerHtml(text) {
  if (!text || !text.trim()) return '<span class="ans-empty">（無答案內容）</span>';

  // 預處理：將行內連寫的列點標記拆成獨立行
  // 例：「（一）租金70萬。（二）辦理方式：...」→ 兩行
  let processed = text
    // 在非換行字元後面、（一）類標記前 插入換行
    .replace(/([^\n])([（(][一二三四五六七八九十百]+[）)])/g, '$1\n$2')
    // 在非換行字元後面、（1）（2）阿拉伯數字括號標記前 插入換行
    .replace(/([^\n])([（(]\d+[）)])/g, '$1\n$2')
    // 在句尾標點後面、一、二、三類標記前 插入換行（避免誤判一般詞語中的 一、）
    .replace(/([。！？；，])([一二三四五六七八九十百]+、)/g, '$1\n$2')
    // 在非換行字元後面、數字列點（1. 2.）前 插入換行
    .replace(/([^\n])(\d+[.．](?=\S))/g, '$1\n$2');

  const lines = processed.split('\n');
  let html = '<div class="ans-body">';

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trimEnd();

    if (!line.trim()) {
      html += '<div class="ans-gap"></div>';
      continue;
    }

    // 第一層：一、二、三、...（含兩字如十一、）
    if (/^[一二三四五六七八九十百]+、/.test(line)) {
      html += `<div class="ans-l1">${escHtml(line)}</div>`;
    }
    // 第二層：(一)(二)... 或全形（一）（二）
    else if (/^[（(][一二三四五六七八九十百]+[）)]/.test(line)) {
      html += `<div class="ans-l2">${escHtml(line)}</div>`;
    }
    // 第三層：1. 2. 3. 或 1、2、
    else if (/^\d+[.、．]/.test(line)) {
      html += `<div class="ans-l3">${escHtml(line)}</div>`;
    }
    // 第四層：(1)(2)... 或全形（1）（2）— 阿拉伯數字括號列點，比 1.2.3. 更深
    else if (/^[（(]\d+[）)]/.test(line)) {
      html += `<div class="ans-l4">${escHtml(line)}</div>`;
    }
    // 一般文字（含表格拆解後的逐行資料）
    else {
      html += `<div class="ans-normal">${escHtml(line)}</div>`;
    }
  }

  html += '</div>';
  return html;
}

// ── 手動推送搜尋結果中的任意一題 ──
function manualPush(qaId) {
  const item = lastSearchResults.find(r => r.qa.id === qaId);
  if (!item) return;
  // 避免重複加入
  if (!confirmedMatches.find(m => m.qa.id === qaId)) {
    confirmedMatches.push({ qa: item.qa, score: item.score });
    renderConfirmedQueue();
  }
  fbPushMatches();
  // 按鈕短暫顯示「已送出」
  const btn = document.getElementById(`pushbtn-${qaId}`);
  if (btn) {
    btn.textContent = '✅ 已送出';
    btn.disabled = true;
    btn.style.opacity = '0.6';
  }
}

function fbPushMatches() {
  if (!fbDb) return;
  const payload = confirmedMatches.map(m => ({
    id: m.qa.id,
    question: m.qa.question,
    short_answer: m.qa.short_answer || '',
    detail_answer: m.qa.detail_answer || '',
    score: Math.round(m.score * 10) / 10,
    page: m.qa.page || null
  }));
  fbDb.ref('qa_session/matches').set(payload)
    .catch(e => console.warn('Firebase write err:', e));
}

function fbClearSession() {
  if (!fbDb) return;
  fbDb.ref('qa_session').remove()
    .catch(e => console.warn('Firebase clear err:', e));
}

// ── 幕僚直送 Custom Note ──
function openCustomModal() {
  document.getElementById('customModal').style.display = 'flex';
  document.getElementById('customTitle').value = '';
  document.getElementById('customBody').value = '';
  setTimeout(() => document.getElementById('customTitle').focus(), 80);
}
function closeCustomModal() {
  document.getElementById('customModal').style.display = 'none';
}
function sendCustomNote() {
  const title = document.getElementById('customTitle').value.trim();
  const body  = document.getElementById('customBody').value.trim();
  if (!body) { alert('請填寫答案內容'); return; }
  const entry = {
    id: 'custom_' + Date.now(),
    type: 'custom',
    question: title || '（幕僚補充說明）',
    custom_text: body,
    short_answer: body,
    detail_answer: body,
    score: 0,
    page: null
  };
  confirmedMatches.push({ qa: entry, score: 0 });
  renderConfirmedQueue();
  if (fbDb) {
    const payload = confirmedMatches.map(m => ({
      id: m.qa.id,
      type: m.qa.type || 'qa',
      question: m.qa.question,
      short_answer: m.qa.short_answer || '',
      detail_answer: m.qa.detail_answer || '',
      custom_text: m.qa.custom_text || null,
      score: Math.round(m.score * 10) / 10,
      page: m.qa.page || null
    }));
    fbDb.ref('qa_session/matches').set(payload)
      .catch(e => console.warn('Firebase write err:', e));
  }
  closeCustomModal();
}
