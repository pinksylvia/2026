<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>議會質詢輔助系統</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --surface2: #f5f5f7;
    --border: #e5e5e7;
    --text-primary: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-tertiary: #aeaeb2;
    --accent: #0071e3;
    --accent-light: #e8f1fb;
    --success: #34c759;
    --warning: #ff9500;
    --danger: #ff3b30;
    --radius: 16px;
    --radius-sm: 10px;
  }

  html {
    height: 100%;
  }

  body {
    font-family: -apple-system, "SF Pro Display", "PingFang TC", "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    height: 100%;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 5px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    min-height: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .app-icon {
    width: 22px; height: 22px;
    background: var(--accent);
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }

  .app-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: -0.2px;
    color: var(--text-secondary);
  }

  .app-subtitle {
    display: none;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    transition: all 0.3s;
    cursor: default;
    background: var(--surface2);
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }

  .status-pill.listening {
    background: #fff0f0;
    color: var(--danger);
    border-color: #ffd5d3;
  }

  .status-pill.active {
    background: #f0fff4;
    color: var(--success);
    border-color: #c3f0cd;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
  }

  .dot.pulse {
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }

  /* ── Main Layout ── */
  main {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    padding: 16px 20px;
    gap: 14px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* ── Voice Input Card ── */
  .voice-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px 20px;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  .voice-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-tertiary);
    margin-bottom: 10px;
  }

  /* Two-column layout: transcript left, action buttons right */
  .voice-body {
    display: flex;
    gap: 12px;
    align-items: stretch;
  }

  .transcript-text {
    flex: 1;
    font-size: 14px;
    line-height: 1.55;
    color: var(--text-primary);
    min-height: 96px;
    max-height: 130px;
    overflow-y: auto;
    font-weight: 400;
    -webkit-overflow-scrolling: touch;
  }

  .transcript-text.placeholder {
    color: var(--text-tertiary);
    font-style: italic;
  }

  /* ── Voice action buttons (right column) ── */
  .voice-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
    width: 88px;
  }

  .btn-mic {
    width: 100%;
    flex: 1;
    height: 50px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-mic.start {
    background: var(--accent);
    color: white;
  }

  .btn-mic.stop {
    background: var(--danger);
    color: white;
  }

  .btn-mic:active {
    transform: scale(0.97);
    opacity: 0.85;
  }

  .btn-secondary {
    height: 42px;
    padding: 0 12px;
    width: 100%;
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
  }

  .btn-secondary:active {
    background: var(--border);
  }

  /* ── Search box ── */
  .search-row {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .search-input {
    flex: 1;
    height: 44px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0 16px;
    font-size: 15px;
    background: var(--surface);
    color: var(--text-primary);
    outline: none;
    font-family: inherit;
  }

  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  .btn-search {
    height: 44px;
    padding: 0 18px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-search:active { opacity: 0.8; }

  /* ── Results ── */
  .results-area {
    flex-shrink: 0;
  }

  .results-header {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-tertiary);
    margin-bottom: 10px;
    padding: 0 2px;
  }

  .no-result {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 180px;
    color: var(--text-tertiary);
    gap: 10px;
  }

  .no-result-icon { font-size: 40px; }
  .no-result-text { font-size: 15px; }

  /* ── Q&A Card ── */
  .qa-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .qa-card.highlighted {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  .qa-card-header {
    padding: 16px 20px 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .qa-card-header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .push-btn {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 8px;
    border: 1.5px solid var(--accent);
    background: var(--accent-light);
    color: var(--accent);
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
  }
  .push-btn:active { background: var(--accent); color: #fff; }

  .qa-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 5px;
    background: var(--accent-light);
    color: var(--accent);
    letter-spacing: 0.2px;
  }

  .qa-question {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text-primary);
    letter-spacing: -0.2px;
  }

  .page-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    color: #666;
    background: #f0f0f2;
    border: 1px solid #ddd;
    border-radius: 5px;
    padding: 1px 6px;
    margin-left: 7px;
    vertical-align: middle;
    white-space: nowrap;
    letter-spacing: 0;
  }

  .score-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }

  .score-dots {
    display: flex; gap: 3px;
  }

  .score-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--border);
  }

  .score-dot.filled { background: var(--accent); }

  .score-label {
    font-size: 11px;
    color: var(--text-tertiary);
  }

  /* ── 幕僚直送浮動按鈕 ── */
  #customNoteBtn {
    position: fixed;
    bottom: 24px;
    right: 20px;
    z-index: 7777;
    background: #34c759;
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(52,199,89,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  #customNoteBtn:active {
    transform: scale(0.95);
    box-shadow: 0 2px 10px rgba(52,199,89,0.3);
  }

  /* ── Answer Tabs ── */
  .qa-tabs {
    display: flex;
    border-top: 1px solid var(--border);
    padding: 0 20px;
    gap: 0;
  }

  .qa-tab {
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .qa-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 600;
  }

  .qa-answer {
    padding: 14px 20px 18px;
    font-size: 16px;
    line-height: 1.7;
    color: var(--text-primary);
    word-break: break-word;
  }

  /* ── Answer hierarchical formatting ── */
  .ans-body { line-height: 1.8; }
  .ans-l1 { margin-top: 8px; font-weight: 500; color: var(--text-primary); }
  .ans-l1:first-child { margin-top: 0; }
  .ans-l2 { padding-left: 0.75em; margin-top: 3px; }
  .ans-l3 { padding-left: 1.5em; margin-top: 2px; }
  .ans-l4 { padding-left: 2.25em; margin-top: 2px; }
  .ans-normal { margin-top: 3px; }
  .ans-gap { height: 6px; }
  .ans-empty { color: #999; }

  /* ── No Speech API warning ── */
  .warning-banner {
    background: #fff8e6;
    border: 1px solid #ffe0a0;
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-size: 13px;
    color: #8a6000;
    display: none;
    flex-shrink: 0;
  }

  /* Scrollbar */
  .results-area::-webkit-scrollbar { width: 4px; }
  .results-area::-webkit-scrollbar-track { background: transparent; }
  .results-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── AI 答題提示 ── */
  .ai-hint-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    flex-shrink: 0;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .ai-hint-card.has-content {
    border-color: var(--accent);
  }

  .ai-hint-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 18px 10px;
    border-bottom: 1px solid var(--border);
  }

  .ai-hint-card.has-content .ai-hint-header {
    border-bottom-color: var(--accent-light);
  }

  .ai-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--accent);
    color: white;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 3px 9px;
    border-radius: 6px;
  }

  .ai-hint-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
  }

  .ai-hint-topic {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-tertiary);
    max-width: 40%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ai-hint-body {
    padding: 12px 18px 14px;
  }

  .ai-hint-empty {
    color: var(--text-tertiary);
    font-size: 14px;
    font-style: italic;
    padding: 4px 0;
  }

  .ai-point {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 5px 0;
    font-size: 15px;
    line-height: 1.55;
    color: var(--text-primary);
  }

  .ai-point + .ai-point {
    border-top: 1px solid var(--border);
  }

  .ai-point-num {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    background: var(--accent);
    color: white;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
  }

  .ai-point-text {
    flex: 1;
  }

  /* ── Confirmed Question Cards ── */
  .confirmed-queue { display: flex; flex-direction: column; gap: 10px; }
  .cq-card {
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .cq-card.is-latest { border-color: var(--accent); }
  .cq-header {
    background: var(--surface2);
    padding: 10px 14px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .cq-card.is-latest .cq-header {
    background: var(--accent-light);
  }
  .cq-num {
    flex-shrink: 0;
    background: var(--text-tertiary);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    margin-top: 2px;
    white-space: nowrap;
  }
  .cq-card.is-latest .cq-num { background: var(--accent); }
  .cq-question {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.4;
  }
  .cq-body {
    background: var(--surface);
    padding: 10px 14px 12px;
  }

  /* ── 參考資料 section label ── */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-tertiary);
    flex-shrink: 0;
    padding: 0 2px;
  }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>
<body>

<!-- ── Password Gate ── -->
<div id="pwGate" style="
  position:fixed; inset:0; z-index:9999;
  background:#1a1a2e;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:18px;
">
  <div style="font-size:40px">🔐</div>
  <div style="color:#fff; font-size:17px; font-weight:600; letter-spacing:0.3px;">請輸入存取密碼</div>
  <input id="pwInput" type="password"
    placeholder="密碼"
    autocomplete="off"
    style="
      width:220px; padding:12px 16px;
      border-radius:12px; border:1.5px solid #444;
      background:#2a2a3e; color:#fff;
      font-size:18px; letter-spacing:4px; text-align:center;
      outline:none;
    "
    onkeydown="if(event.key==='Enter') checkPw()"
  >
  <button onclick="checkPw()" style="
    background:#0071e3; color:#fff;
    border:none; border-radius:12px;
    padding:12px 36px; font-size:15px; font-weight:600;
    cursor:pointer;
  ">進入</button>
  <div id="pwErr" style="color:#ff6b6b; font-size:13px; display:none;">密碼錯誤，請再試一次</div>
</div>
<script>
  (function(){
    const CORRECT = 'tycg2026';
    const KEY = 'qa_auth';
    if (sessionStorage.getItem(KEY) === CORRECT) {
      document.getElementById('pwGate').style.display = 'none';
    }
    window.checkPw = function() {
      const val = document.getElementById('pwInput').value;
      if (val === CORRECT) {
        sessionStorage.setItem(KEY, CORRECT);
        document.getElementById('pwGate').style.display = 'none';
      } else {
        document.getElementById('pwErr').style.display = 'block';
        document.getElementById('pwInput').value = '';
        document.getElementById('pwInput').focus();
      }
    };
    setTimeout(() => document.getElementById('pwInput').focus(), 100);
  })();
</script>

<header>
  <div class="header-left">
    <div class="app-icon">🎙</div>
    <div>
      <div class="app-title">議會質詢輔助</div>
      <div class="app-subtitle">第3屆第5次定期會 · 秘書處</div>
    </div>
  </div>
  <div class="status-pill" id="statusPill">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">待機中</span>
  </div>
</header>

<main>

  <div class="warning-banner" id="warnBanner">
    ⚠️ 此瀏覽器不支援語音辨識，請使用 Chrome 或 Safari。可用下方手動搜尋代替。
  </div>

  <div class="voice-card">
    <div class="voice-label">語音辨識</div>
    <div class="voice-body">
      <div class="transcript-text placeholder" id="transcript">等待收音…</div>
      <div class="voice-actions">
        <button class="btn-mic start" id="micBtn" onclick="toggleMic()">
          <span id="micIcon">🎙</span>
          <span id="micLabel">開始收音</span>
        </button>
        <button class="btn-secondary" onclick="resetAll()">重置</button>
      </div>
    </div>
  </div>

  <!-- AI 答題提示區塊 -->
  <div class="ai-hint-card" id="aiHintCard">
    <div class="ai-hint-header">
      <div class="ai-badge">✦ AI</div>
      <div class="ai-hint-title">答題提示</div>
      <div class="ai-hint-topic" id="aiHintTopic"></div>
    </div>
    <div class="ai-hint-body" id="aiHintBody">
      <div class="ai-hint-empty">等待收音辨識或輸入關鍵字…</div>
    </div>
  </div>

  <div class="search-row">
    <input class="search-input" id="searchInput" type="search"
      placeholder="手動輸入關鍵字搜尋…"
      oninput="onSearchInput(this.value)"
      onkeydown="if(event.key==='Enter') doSearch()">
    <button class="btn-search" onclick="doSearch()">搜尋</button>
  </div>

  <div class="section-label" id="refLabel" style="display:none">詳細參考資料</div>

  <div class="results-area" id="resultsArea">
    <div class="no-result">
      <div class="no-result-icon">📋</div>
      <div class="no-result-text">開始收音或輸入關鍵字</div>
    </div>
  </div>

萬1,900元\n114｜25萬份｜25.9987元｜649萬9,675元\n115｜24萬6,585份｜19.55元｜482萬737元","page":95},{"id":65,"category":"類別","question":"議題","short_answer":"簡答版","detail_answer":"詳答版","page":26},{"id":66,"category":"類別","question":"議題","short_answer":"簡答版","detail_answer":"詳答版","page":26},{"id":67,"category":"秘書處業務","question":"※秘書處2026年新春相關的標案有4個，請問新春系列設計製作是用在哪裡?因為設計可能是雷同的，建議可以併案發包以節省公帑。","short_answer":"2026年新春相關採購案係採購春聯、福袋、賀卡、紅包袋以及春節禮盒設計製作，共同設計元素為春聯題詞，係由本處委請在地書法家揮毫，而標案規劃因各品項所需廠商專業能力不同，故分案辦理採購：\n春聯設計製作配送：需大量印刷及配送能力，往年投標廠商以印刷廠為主。\n新春系列設計製作(包含福袋、賀卡與紅包袋)：以往與春聯標案併案辦理，因考量福袋等設計創意巧思較高，且須手加工黏貼硬幣，分開辦理希望吸引不同廠商投標。\n新春賀卡製作：原預計於新春系列設計製作案納入後續擴充，惟得標廠商報價較高，故另案辦理採購。\n春節禮盒設計製作：特別需要結構設計及協調各內容物廠商等能力，故往年投標廠商以設計公司為主。","detail_answer":"2026年新春相關採購案係採購春聯、福袋、賀卡、紅包袋以及春節禮盒設計製作，共同設計元素為春聯題詞，係由本處委請在地書法家揮毫，而標案規劃因各品項所需廠商專業能力不同，故分案辦理採購：\n春聯設計製作配送｜新春系列設計製作(福袋、賀卡、紅包袋)｜新春賀卡製作｜春節禮盒\n預算金額｜240萬元｜193萬元｜40萬9,500元｜215萬元\n決標金額｜230萬6,000元｜191萬9,950元｜37萬3,100元｜215萬元\n後續擴充｜376萬7,600元｜326萬8,076元｜0元｜245萬7,280元(含代辦智發會93萬9,800元)\n得標廠商｜秋雨創新股份有公司｜秋雨創新股份有公司｜中喆實業社｜富博創意股份有限公司\n標案需求｜印刷為主，及春聯配送至各處｜需設計福袋、賀卡及紅包袋，並有手加工能力已完成標案｜原預計於新春系列設計製作案納入後續擴充，惟得標廠商報價較高，故另案辦理採購。｜以具有創意巧思設計為主，並有整合禮盒內品項之能力","page":99},{"id":68,"category":"類別","question":"議題","short_answer":"簡答版","detail_answer":"詳答版","page":26},{"id":69,"category":"類別","question":"議題","short_answer":"簡答版","detail_answer":"詳答版","page":26},{"id":70,"category":"類別","question":"議題","short_answer":"簡答版","detail_answer":"詳答版","page":26},{"id":71,"category":"秘書處業務","question":"桃園馬祖交流小組運作情形？","short_answer":"一、114年10月28日至29日，由賴副秘書長淑華率民政局、秘書處及八德區公所等相關人員參加2025媽祖昇天祭。\n二、114年11月18日，召開本年度第2次工作會議，確認各執行機關114年度的工作成效及本（115）年度的工作事項，並持續依職權辦理各項交流活動。\n三、115年3月1日至2日，由八德區長蔡豐展代表本府，前往連江縣參加2026馬祖擺暝文化祭暨拜會連江縣政府。","detail_answer":"一、為增進桃園馬祖互動，本府成立桃園馬祖交流小組，由賴副秘書長淑華擔任召集人、秘書處于處長建國擔任副召集人、八德區公所蔡區長豊展擔任執行秘書；執行機關包含新聞處、文化局、農業局、觀光旅遊局、民政局、教育局、青年事務局、智慧城鄉發展委員會、經濟發展局、體育局、社會局、原住民族行政局、婦幼發展局及八德區公所等，共計15個執行機關，持續推動桃園馬祖間的實質交流，深化兩地情誼。\n二、114年10月28日至29日，由賴副秘書長淑華率民政局、秘書處及八德區公所等相關人員參加2025媽祖昇天祭。\n三、114年11月18日，召開本年度第2次工作會議，確認各執行機關114年度的工作成效及本（115）年度的工作事項，並持續依職權辦理各項交流活動。\n三、115年3月1日至2日，由八德區區長蔡豊展代表本府，前往連江縣參加2026馬祖擺暝文化祭。\n四、截至114年12月底，各執行機關之114年交流成效，臚列如下：\n項次｜執行機關｜交流事項辦理情形\n秘書處｜2月26日，由本小組召集人賴副秘書長淑華代表本府參與2025馬祖擺暝文化祭。\n4月28日辦理桃園馬祖交流小組會議。\n10月28日至29日，由本小組召集人賴副秘書長淑華率民政局、秘書處及八德區公所等相關人員參加2025媽祖昇天祭。\n11月18日辦理桃園馬祖交流小組會議。\n新聞處｜以馬祖YAHO臉書粉絲頁宣傳桃園、馬祖觀光旅遊及地方文化交流事項，共計29則。\n文化局｜7月-8月辦理「馬祖語文親子共學營」。\n9月5日至8日由文化局長率隊參訪交流第三屆馬祖國際藝術島。\n觀光旅遊局｜1月-2月於2025臺灣燈會中推廣宣傳馬祖燈區。\n9月16日以電子郵件邀約連江縣政府參與「2025桃園萬聖城」\n民政局｜閩臺宮於4月20日辦理天上聖母聖誕千秋。\n龍山寺於5月30-31日辦理五靈公聖誕。\n10月6日辦理陳將軍聖誕千秋。\n教育局｜2月-6月執行「國民中小學閩南語/閩東語沉浸式教學計畫」。\n5月-7月籌備馬祖文化暑期營隊。\n8月18日-22日、8月24日辦理馬祖閩東語言及文化暑假學生體驗營隊。\n青年事務局｜7月4日辦理本市青年永續團隊與馬祖地方創生青年、團體及連江縣政府之交流活動。\n經濟發展局｜1月14日至27日於2025桃園年貨大街，提供連江縣政府攤位，以利推廣文化交流。\n體育局｜3月21日至23日組隊參加馬祖北竿硬地超級馬拉松。\n10月31日至11月2日組隊參加2025第十屆馬祖馬拉松。\n12月7日邀請連江縣政府組團參加「2025桃園半程馬拉松-石門水庫楓半馬」。\n10｜社會局｜本市馬祖關懷協會及本市馬祖同鄉會分別於4月12日及4月26日辦理「老人福利宣導活動」。\n本市馬祖關懷協會於8月4日辦理孝親活動及據點成果展。\n11｜原住民族行政局｜6月7日邀請本市馬祖同鄉會參與社教學習型等主題系列活動。\n12｜婦幼發展局｜7月28日與連江縣政府民政社會處、衛生局召開「桃園馬祖婦幼業務交流視訊會議」。\n9月11日至12日前往連江縣參訪馬祖女路暨婦女業務研習活動。\n9月26日至11月29日與連江縣政府民政社會處於本市北區婦女培力中心共同辦理「食光綻放-傳統美食中的女性故事展」。\n13｜八德區公所｜4月12日辦理桃園馬祖擺暝文化祭。\n10月28日至29日，由本小組召集人賴副秘書長淑華率民政局、秘書處及八德區公所等相關人員參加2025媽祖昇天祭。\n11月9日辦理桃園馬祖昇天祭。","page":103},{"id":72,"category":"類別","question":"議題","short_answer":"簡答版","detail_answer":"詳答版","page":26},{"id":73,"category":"類別","question":"議題","short_answer":"簡答版","detail_answer":"詳答版","page":26},{"id":74,"category":"類別","question":"議題","short_answer":"簡答版","detail_answer":"詳答版","page":26},{"id":75,"category":"類別","question":"議題","short_answer":"簡答版","detail_answer":"詳答版","page":26},{"id":76,"category":"類別","question":"議題","short_answer":"簡答版","detail_answer":"詳答版","page":26},{"id":77,"category":"類別","question":"議題","short_answer":"簡答版","detail_answer":"詳答版","page":26},{"id":78,"category":"類別","question":"議題","short_answer":"簡答版","detail_answer":"詳答版","page":26},{"id":79,"category":"類別","question":"議題","short_answer":"簡答版","detail_answer":"詳答版","page":26},{"id":80,"category":"類別","question":"議題","short_answer":"簡答版","detail_answer":"詳答版","page":26},{"id":81,"category":"類別","question":"議題","short_answer":"簡答版","detail_answer":"詳答版","page":26},{"id":82,"category":"類別","question":"議題","short_answer":"簡答版","detail_answer":"詳答版","page":26},{"id":83,"category":"類別","question":"議題","short_answer":"簡答版","detail_answer":"詳答版","page":26},{"id":84,"category":"類別","question":"議題","short_answer":"簡答版","detail_answer":"詳答版","page":26},{"id":85,"category":"類別","question":"議題","short_answer":"簡答版","detail_answer":"詳答版","page":26},{"id":86,"category":"類別","question":"議題","short_answer":"簡答版","detail_answer":"詳答版","page":26},{"id":87,"category":"類別","question":"議題","short_answer":"簡答版","detail_answer":"詳答版","page":26},{"id":88,"category":"類別","question":"議題","short_answer":"簡答版","detail_answer":"詳答版","page":26},{"id":89,"category":"類別","question":"議題","short_answer":"簡答版","detail_answer":"詳答版","page":26}];

// ── State ──
let recognition = null;
let isListening = false;
let userWantsListening = false; // true = user pressed 開始收音, survives auto-stops
let finalTranscript = '';
let interimTranscript = '';
let recentSegments = []; // stores last N finalized speech segments for focused search
let searchTimer = null;
let expandedCards = new Set();
let activeTab = {}; // cardId -> 'short' | 'detail'

// ── Init Speech Recognition ──
function initSpeech() {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRec) {
    document.getElementById('warnBanner').style.display = 'block';
    document.getElementById('micBtn').style.display = 'none';
    return;
  }
  recognition = new SpeechRec();
  recognition.lang = 'zh-TW';
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isListening = true;
    setStatus('listening');
  };

  // Auto-restart: browsers (especially Safari/iOS) stop recognition after silence
  // or ~60s. We restart automatically as long as the user hasn't pressed Stop.
  recognition.onend = () => {
    isListening = false;
    if (userWantsListening) {
      // Brief pause before restart to avoid rapid loops on some browsers
      setTimeout(() => {
        if (userWantsListening) {
          try { recognition.start(); } catch(e) {}
        }
      }, 250);
    } else {
      setStatus('idle');
      updateMicBtn(false);
    }
  };

  recognition.onerror = (e) => {
    // 'no-speech' is normal during silence — just let onend handle restart
    if (e.error === 'no-speech') return;
    // 'aborted' happens when we call stop() ourselves — ignore
    if (e.error === 'aborted') return;
    // Real error: stop trying
    userWantsListening = false;
    isListening = false;
    setStatus('idle');
    updateMicBtn(false);
  };

  recognition.onresult = (e) => {
    let interim = '';
    let final = finalTranscript;
    const newFinals = [];

    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) {
        final += t;
        newFinals.push(t.trim());
      } else {
        interim = t;
      }
    }

    // Accumulate finalized segments for rolling-window search
    if (newFinals.length > 0) {
      recentSegments.push(...newFinals.filter(s => s.length > 0));
      // Keep only last 12 segments (~60-90s of speech at typical pace)
      if (recentSegments.length > 12) recentSegments = recentSegments.slice(-12);
    }

    finalTranscript = final;
    interimTranscript = interim;

    // Display: show full accumulated text so user can see everything captured
    const display = finalTranscript + interimTranscript;
    updateTranscript(display);

    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      // Search strategy: use recent 3 segments + current interim
      // This keeps matching sensitive to the LATEST part of the question,
      // avoiding dilution from long earlier preamble.
      const recentQuery = recentSegments.slice(-3).join('') + interimTranscript;
      const query = recentQuery.trim().length > 3 ? recentQuery.trim() : display.trim();
      if (query.length > 3) autoSearch(query);
    }, 1000);
  };
}

function startListening() {
  if (!recognition) return;
  userWantsListening = true;
  try {
    recognition.start();
    updateMicBtn(true);

  if (!recognition) return;

// ── Confirmed Match Queue ──
let confirmedMatches = [];

function tryConfirmMatch(topResult) {
  if (!topResult || topResult.score < 3) return;
  // Already in queue? Skip (no duplicates)
  if (confirmedMatches.find(m => m.qa.id === topResult.qa.id)) return;
  confirmedMatches.push({ qa: topResult.qa, score: topResult.score });
  renderConfirmedQueue();
  fbPushMatches();
}

function renderConfirmedQueue() {
  const card = document.getElementById('aiHintCard');
  const topicEl = document.getElementById('aiHintTopic');
  const bodyEl = document.getElementById('aiHintBody');
  if (confirmedMatches.length === 0) return;
  card.classList.add('has-content');
  topicEl.textContent = confirmedMatches.length > 1 ? `已偵測 ${confirmedMatches.length} 題` : '';
  bodyEl.innerHTML = '<div class="confirmed-queue">' +
    confirmedMatches.map((match, idx) => {
      const isLatest = idx === confirmedMatches.length - 1;
      const points = extractKeyPoints(match.qa.short_answer || match.qa.detail_answer);
      return `
        <div class="cq-card${isLatest ? ' is-latest' : ''}">
          <div class="cq-header">
            <div class="cq-num">第 ${idx + 1} 題</div>
            <div class="cq-question">${escHtml(match.qa.question)}${match.qa.page ? `<span class="page-badge">p.${match.qa.page}</span>` : ''}</div>
          </div>
          <div class="cq-body">
            ${points.map((pt, i) => `
              <div class="ai-point">
                <div class="ai-point-num">${i + 1}</div>
                <div class="ai-point-text">${formatAnswerHtml(pt)}</div>
              </div>
            `).join('')}
          </div>
        </div>`;
    }).join('') + '</div>';
}

// Extract key points from short_answer text (no limit on number of points)
function extractKeyPoints(text) {
  if (!text) return [];
  // Try split by Chinese numbered list: 一、二、三、四、五、
  const numbered = text.split(/(?=[一二三四五六七八九十百]+、)/);
  const filtered = numbered.map(s => s.replace(/^[一二三四五六七八九十百]+、/, '').trim()).filter(s => s.length > 5);
  if (filtered.length >= 2) return filtered;

  // Fallback: split by newline or 。
  const lines = text.split(/\n|(?<=。)/).map(s => s.trim()).filter(s => s.length > 8);
  if (lines.length >= 2) return lines;

  // Last resort: return the first sentence trimmed
  const first = text.trim().slice(0, 80);
  return [first];
}

function updateAIHint(topResult) {
  // If confirmed queue already has items, keep showing queue (don't overwrite with live preview)
  if (confirmedMatches.length > 0) {
    renderConfirmedQueue();
    return;
  }

  // No confirmed matches yet — show live preview of current best match
  const card = document.getElementById('aiHintCard');
  const topicEl = document.getElementById('aiHintTopic');
  const bodyEl = document.getElementById('aiHintBody');

  if (!topResult) {
    resetAIHint();
    return;
  }

  card.classList.add('has-content');
  topicEl.textContent = topResult.qa.question;

  const points = extractKeyPoints(topResult.qa.short_answer || topResult.qa.detail_answer);

  if (points.length === 0) {
    bodyEl.innerHTML = '<div class="ai-hint-empty">（無法取得答題要點）</div>';
    return;
  }

  bodyEl.innerHTML = points.map((pt, i) => `
    <div class="ai-point">
      <div class="ai-point-num">${i + 1}</div>
      <div class="ai-point-text">${formatAnswerHtml(pt)}</div>
    </div>
  `).join('');
}

// ── Search & Scoring ──
function tokenize(text) {
  // Split into 2-char and 3-char bigrams for Chinese
  const t = text.replace(/[?？。，、！!,.\s]+/g, '');
  const tokens = new Set();
  for (let i = 0; i < t.length - 1; i++) tokens.add(t.slice(i, i+2));
  for (let i = 0; i < t.length - 2; i++) tokens.add(t.slice(i, i+3));
  // Also add individual chars for short queries
  for (let c of t) tokens.add(c);
  return tokens;
}

function scoreQA(qa, queryTokens) {
  const qTokens = tokenize(qa.question);
  const aTokens = tokenize(qa.short_answer + ' ' + qa.detail_answer);
  
  let score = 0;
  let qHits = 0;
  for (let t of queryTokens) {
    if (qTokens.has(t)) { score += (t.length >= 3 ? 4 : t.length >= 2 ? 2 : 0.5); qHits++; }
    else if (aTokens.has(t)) { score += (t.length >= 3 ? 1.5 : t.length >= 2 ? 0.8 : 0.2); }
  }
  
  // Boost if question match ratio is high
  if (queryTokens.size > 0) {
    const ratio = qHits / queryTokens.size;
    score *= (1 + ratio * 0.5);
  }
  
  return score;
}

function search(query) {
  if (!query.trim()) return [];
  const qTokens = tokenize(query);
  if (qTokens.size === 0) return [];
  
  const scored = QA_DATA.map(qa => ({ qa, score: scoreQA(qa, qTokens) }))
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 5);
  
  return scored;
}

function autoSearch(query) {
  const results = search(query);
  if (results.length > 0) {
    setStatus('active');
    renderResults(results, true);
  }
}

function doSearch() {
  const q = document.getElementById('searchInput').value;
  if (!q.trim()) return;
  const results = search(q);
  if (results.length > 0) {
    setStatus('active');
    renderResults(results, false);
  } else {
    document.getElementById('resultsArea').innerHTML = `
      <div class="no-result">
        <div class="no-result-icon">🔍</div>
        <div class="no-result-text">找不到相關題目，請換個關鍵字</div>
      </div>`;
  }
}

}

// ── Render ──
let lastSearchResults = [];   // 保留最近一次搜尋結果供手動推送使用

function renderResults(results, autoExpand) {
  lastSearchResults = results;  // 存起來
  const container = document.getElementById('resultsArea');
  const count = results.length;

  // Update AI hint with the top match; try to confirm high-confidence matches into queue

  results.forEach((item, idx) => {

    const isExpanded = expandedCards.has(cardId);
    const tab = activeTab[cardId] || 'short';
    const maxScore = results[0].score;
    const relScore = score / maxScore;
    const dots = 5;
    const filled = Math.max(1, Math.round(relScore * dots));

    const dotsHtml = Array.from({length: dots}, (_, i) =>
      `<span class="score-dot${i < filled ? ' filled' : ''}"></span>`
    ).join('');

    const hasShort = qa.short_answer && qa.short_answer.trim();
    const hasDetail = qa.detail_answer && qa.detail_answer.trim();
    const answerText = tab === 'short' ? (hasShort ? qa.short_answer : qa.detail_answer) : (hasDetail ? qa.detail_answer : qa.short_answer);

    html += `
    <div class="qa-card${idx === 0 ? ' highlighted' : ''}" id="card-${cardId}">
      <div class="qa-card-header" onclick="toggleCard(${cardId})">
        <div class="qa-card-header-top">
          <div class="qa-tag">${qa.category || '質詢題目'}</div>
          <button class="push-btn" onclick="event.stopPropagation(); manualPush(${cardId})" id="pushbtn-${cardId}" title="推送此題目給長官">📤 推送長官</button>
        </div>
        <div class="qa-question">${escHtml(qa.question)}${qa.page ? `<span class="page-badge">p.${qa.page}</span>` : ''}</div>
        <div class="score-bar">
          <div class="score-dots">${dotsHtml}</div>
          <span class="score-label">相關度 ${idx === 0 ? '· 最佳匹配' : ''}</span>
        </div>
      </div>`;

    if (isExpanded) {
      html += `
      <div class="qa-tabs">
        <div class="qa-tab${tab === 'short' ? ' active' : ''}" onclick="switchTab(event,${cardId},'short')">簡答版</div>
        <div class="qa-tab${tab === 'detail' ? ' active' : ''}" onclick="switchTab(event,${cardId},'detail')">詳答版</div>
      </div>
      <div class="qa-answer" id="ans-${cardId}">${formatAnswerHtml(answerText)}</div>`;
    }

    html += `</div>`;
  });

  container.innerHTML = html;
}

function toggleCard(cardId) {
  const card = document.getElementById(`card-${cardId}`);
  if (expandedCards.has(cardId)) {
    expandedCards.delete(cardId);
    // Re-render without the answer section
    const qa = QA_DATA.find(q => q.id === cardId);
    const tabsEl = card.querySelector('.qa-tabs');
    const ansEl = card.querySelector('.qa-answer');
    if (tabsEl) tabsEl.remove();
    if (ansEl) ansEl.remove();
  } else {
    expandedCards.add(cardId);
    const qa = QA_DATA.find(q => q.id === cardId);
    const tab = activeTab[cardId] || 'short';
    const hasShort = qa.short_answer && qa.short_answer.trim();
    const hasDetail = qa.detail_answer && qa.detail_answer.trim();
    const answerText = tab === 'short' ? (hasShort ? qa.short_answer : qa.detail_answer) : (hasDetail ? qa.detail_answer : qa.short_answer);
    
    const tabsHtml = `<div class="qa-tabs">
      <div class="qa-tab${tab==='short'?' active':''}" onclick="switchTab(event,${cardId},'short')">簡答版</div>
      <div class="qa-tab${tab==='detail'?' active':''}" onclick="switchTab(event,${cardId},'detail')">詳答版</div>
    </div>`;
    const ansHtml = `<div class="qa-answer" id="ans-${cardId}">${formatAnswerHtml(answerText)}</div>`;
    card.insertAdjacentHTML('beforeend', tabsHtml + ansHtml);
  }
}

function switchTab(e, cardId, tab) {
  e.stopPropagation();
  activeTab[cardId] = tab;
  const qa = QA_DATA.find(q => q.id === cardId);
  const hasShort = qa.short_answer && qa.short_answer.trim();
  const hasDetail = qa.detail_answer && qa.detail_answer.trim();
  const answerText = tab === 'short' ? (hasShort ? qa.short_answer : qa.detail_answer) : (hasDetail ? qa.detail_answer : qa.short_answer);
  
  const card = document.getElementById(`card-${cardId}`);
  card.querySelectorAll('.qa-tab').forEach(t => t.classList.remove('active'));
  card.querySelectorAll('.qa-tab')[tab === 'short' ? 0 : 1].classList.add('active');
  
  const ansEl = document.getElementById(`ans-${cardId}`);
  if (ansEl) ansEl.innerHTML = formatAnswerHtml(answerText);
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Answer Formatter：將純文字答案轉成階層化 HTML ──
function formatAnswerHtml(text) {
  if (!text || !text.trim()) return '<span class="ans-empty">（無答案內容）</span>';

  // 預處理：將行內連寫的列點標記拆成獨立行
  // 例：「（一）租金70萬。（二）辦理方式：...」→ 兩行
  let processed = text
    // 在非換行字元後面、（一）類標記前 插入換行
    .replace(/([^\n])([（(][一二三四五六七八九十百]+[）)])/g, '$1\n$2')
    // 在非換行字元後面、（1）（2）阿拉伯數字括號標記前 插入換行
    .replace(/([^\n])([（(]\d+[）)])/g, '$1\n$2')
    // 在句尾標點後面、一、二、三類標記前 插入換行（避免誤判一般詞語中的 一、）
    .replace(/([。！？；，])([一二三四五六七八九十百]+、)/g, '$1\n$2')
    // 在非換行字元後面、數字列點（1. 2.）前 插入換行
    .replace(/([^\n])(\d+[.．](?=\S))/g, '$1\n$2');

  const lines = processed.split('\n');
  let html = '<div class="ans-body">';

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trimEnd();

    if (!line.trim()) {
      html += '<div class="ans-gap"></div>';
      continue;
    }

    // 第一層：一、二、三、...（含兩字如十一、）
    if (/^[一二三四五六七八九十百]+、/.test(line)) {
      html += `<div class="ans-l1">${escHtml(line)}</div>`;
    }
    // 第二層：(一)(二)... 或全形（一）（二）
    else if (/^[（(][一二三四五六七八九十百]+[）)]/.test(line)) {
      html += `<div class="ans-l2">${escHtml(line)}</div>`;
    }
    // 第三層：1. 2. 3. 或 1、2、
    else if (/^\d+[.、．]/.test(line)) {
      html += `<div class="ans-l3">${escHtml(line)}</div>`;
    }
    // 第四層：(1)(2)... 或全形（1）（2）— 阿拉伯數字括號列點，比 1.2.3. 更深
    else if (/^[（(]\d+[）)]/.test(line)) {
      html += `<div class="ans-l4">${escHtml(line)}</div>`;
    }
    // 一般文字（含表格拆解後的逐行資料）
    else {
      html += `<div class="ans-normal">${escHtml(line)}</div>`;
    }
  }

  html += '</div>';
  return html;
}

// ── 手動推送搜尋結果中的任意一題 ──
function manualPush(qaId) {
  const item = lastSearchResults.find(r => r.qa.id === qaId);
  if (!item) return;
  // 避免重複加入
  if (!confirmedMatches.find(m => m.qa.id === qaId)) {
    confirmedMatches.push({ qa: item.qa, score: item.score });
    renderConfirmedQueue();
  }
  fbPushMatches();
  // 按鈕短暫顯示「已送出」
  const btn = document.getElementById(`pushbtn-${qaId}`);
  if (btn) {
    btn.textContent = '✅ 已送出';
    btn.disabled = true;
    btn.style.opacity = '0.6';
  }
}

function fbPushMatches() {
  if (!fbDb) return;
  const payload = confirmedMatches.map(m => ({
    id: m.qa.id,
    question: m.qa.question,
    short_answer: m.qa.short_answer || '',
    detail_answer: m.qa.detail_answer || '',
    score: Math.round(m.score * 10) / 10,
    page: m.qa.page || null
  }));
  fbDb.ref('qa_session/matches').set(payload)
    .catch(e => console.warn('Firebase write err:', e));
}

function fbClearSession() {
  if (!fbDb) return;
  fbDb.ref('qa_session').remove()
    .catch(e => console.warn('Firebase clear err:', e));
}

      <label style="font-size:12px; font-weight:600; color:#555; display:block; margin-bottom:5px;">題目（可留空）</label>
      <input id="customTitle" type="text" placeholder="輸入質詢題目…" style="width:100%; padding:10px 12px; border:1.5px solid #ddd; border-radius:10px; font-size:14px; outline:none; box-sizing:border-box;">
    </div>
    <div>
      <label style="font-size:12px; font-weight:600; color:#555; display:block; margin-bottom:5px;">答案內容 <span style="color:#e00">*</span></label>
      <textarea id="customBody" placeholder="輸入答案或重點提示…" rows="5" style="width:100%; padding:10px 12px; border:1.5px solid #ddd; border-radius:10px; font-size:14px; outline:none; resize:vertical; box-sizing:border-box; font-family:inherit;"></textarea>
    </div>
    <div style="display:flex; gap:10px; justify-content:flex-end;">
      <button onclick="closeCustomModal()" style="padding:10px 20px; border-radius:10px; border:1.5px solid #ddd; background:#f5f5f7; color:#555; font-size:14px; font-weight:600; cursor:pointer;">取消</button>
      <button onclick="sendCustomNote()" style="padding:10px 24px; border-radius:10px; border:none; background:#0071e3; color:#fff; font-size:14px; font-weight:600; cursor:pointer;">📤 送出給長官</button>
    </div>
  </div>
</div>

</body>
</html>
