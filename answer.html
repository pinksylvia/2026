<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>質詢提示</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --surface2: #f5f5f7;
    --border: #e0e0e2;
    --text-primary: #1a1a1a;
    --text-secondary: #555558;
    --text-muted: #999;
    --accent: #0060c7;
    --accent-light: #ddeeff;
    --success: #1a9e3f;
    --waiting: #888;
    --radius: 14px;
  }

  html, body {
    height: 100%;
    height: 100dvh;
  }

  body {
    font-family: -apple-system, "SF Pro Display", "PingFang TC", "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 6px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.2px;
  }

  .conn-pill {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.3s;
  }

  .conn-pill.connected {
    background: #f0fff4;
    color: var(--success);
    border-color: #b3e6c0;
  }

  .conn-pill.receiving {
    background: #fff8e8;
    color: #b86a00;
    border-color: #f0d090;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
  }

  .dot.pulse {
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  /* ── Main scroll area ── */
  main {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 14px 14px 20px;
    /* 不用 flex，讓卡片正常 block 排列才能捲動 */
  }

  /* ── Waiting state ── */
  .waiting-screen {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 40px;
    text-align: center;
  }

  .waiting-icon {
    font-size: 48px;
    opacity: 0.3;
  }

  .waiting-text {
    font-size: 16px;
    color: var(--text-muted);
    font-weight: 500;
  }

  .waiting-sub {
    font-size: 13px;
    color: var(--text-muted);
    opacity: 0.7;
  }

  /* ── Q&A Cards ── */
  .qa-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    overflow: hidden;
    animation: slideIn 0.3s ease;
    margin-bottom: 12px;
  }

  .qa-card:last-child {
    margin-bottom: 0;
  }

  .qa-card.latest {
    border-color: var(--accent);
    box-shadow: 0 2px 12px rgba(0,96,199,0.10);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Question header */
  .qa-header {
    background: var(--surface2);
    padding: 12px 16px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }

  .qa-card.latest .qa-header {
    background: var(--accent-light);
  }

  .qa-num {
    flex-shrink: 0;
    background: var(--text-muted);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 5px;
    margin-top: 2px;
    white-space: nowrap;
  }

  .qa-card.latest .qa-num {
    background: var(--accent);
  }

  .qa-question {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.4;
  }

  .page-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    color: #666;
    background: #f0f0f2;
    border: 1px solid #ddd;
    border-radius: 5px;
    padding: 1px 6px;
    margin-left: 7px;
    vertical-align: middle;
    white-space: nowrap;
    letter-spacing: 0;
  }

  /* Answer body */
  .qa-body {
    padding: 12px 16px 14px;
  }

  .qa-point {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 6px 0;
    border-bottom: 1px solid #f0f0f0;
  }

  .qa-point:last-child {
    border-bottom: none;
  }

  .qa-point-num {
    flex-shrink: 0;
    width: 22px; height: 22px;
    background: var(--accent-light);
    color: var(--accent);
    border-radius: 50%;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
  }

  .qa-card.latest .qa-point-num {
    background: var(--accent);
    color: white;
  }

  .qa-point-text {
    font-size: 15px;
    line-height: 1.55;
    color: var(--text-primary);
    flex: 1;
  }

  /* ── NEW badge ── */
  .new-badge {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 4px;
    margin-left: 6px;
    vertical-align: middle;
    animation: badgePop 0.4s ease;
  }

  @keyframes badgePop {
    0% { transform: scale(0.6); opacity: 0; }
    60% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ── Clear button ── */
  .footer-bar {
    flex-shrink: 0;
    padding: 8px 14px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
  }

  .btn-clear {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 6px 16px;
    border-radius: 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
</style>
</head>
<body>

<header>
  <span class="header-title">📋 質詢提示</span>
  <div class="conn-pill" id="connPill">
    <div class="dot" id="connDot"></div>
    <span id="connText">連線中…</span>
  </div>
</header>

<main id="mainArea">
  <div class="waiting-screen" id="waitingScreen">
    <div class="waiting-icon">📡</div>
    <div class="waiting-text">等待操作端開始收音</div>
    <div class="waiting-sub">收到質詢題目後將自動顯示</div>
  </div>
</main>

<div class="footer-bar">
  <button class="btn-clear" onclick="clearDisplay()">清除畫面</button>
</div>

<script>
// ── Firebase config ──
const firebaseConfig = {
  apiKey: "AIzaSyARX3_F0VY_-LeN2CQoPGBPSpqOzDSjHVk",
  authDomain: "tycg2026.firebaseapp.com",
  databaseURL: "https://tycg2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "tycg2026",
  storageBucket: "tycg2026.firebasestorage.app",
  messagingSenderId: "268276526207",
  appId: "1:268276526207:web:d66513d123a6b76049234a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ── Connection state ──
function setConnected(state) {
  const pill = document.getElementById('connPill');
  const dot  = document.getElementById('connDot');
  const txt  = document.getElementById('connText');
  pill.className = 'conn-pill';
  dot.className  = 'dot';

  if (state === 'connected') {
    pill.classList.add('connected');
    txt.textContent = '已連線';
  } else if (state === 'receiving') {
    pill.classList.add('receiving');
    dot.classList.add('pulse');
    txt.textContent = '收到題目';
  } else {
    txt.textContent = '連線中…';
  }
}

// ── Extract key points (same logic as operator) ──
function extractKeyPoints(text) {
  if (!text) return [];
  const numbered = text.split(/(?=[一二三四五六七八九十]、)/);
  const filtered = numbered.map(s => s.replace(/^[一二三四五六七八九十]、/, '').trim()).filter(s => s.length > 5);
  if (filtered.length >= 2) return filtered.slice(0, 3);
  const lines = text.split(/\n|(?<=。)/).map(s => s.trim()).filter(s => s.length > 8);
  if (lines.length >= 2) return lines.slice(0, 3);
  return [text.trim().slice(0, 80)];
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Render matches ──
function renderMatches(matches) {
  const main = document.getElementById('mainArea');
  const waiting = document.getElementById('waitingScreen');

  if (!matches || matches.length === 0) {
    main.innerHTML = '';
    main.appendChild(waiting);
    setConnected('connected');
    return;
  }

  setConnected('receiving');

  let html = '';
  matches.forEach((m, idx) => {
    const isLatest = idx === matches.length - 1;
    const points = extractKeyPoints(m.short_answer || m.detail_answer || '');
    const badge = isLatest ? '<span class="new-badge">NEW</span>' : '';

    html += `
      <div class="qa-card${isLatest ? ' latest' : ''}">
        <div class="qa-header">
          <div class="qa-num">第 ${idx + 1} 題</div>
          <div class="qa-question">${escHtml(m.question)}${m.page ? `<span class="page-badge">p.${m.page}</span>` : ''}${badge}</div>
        </div>
        <div class="qa-body">
          ${points.map((pt, i) => `
            <div class="qa-point">
              <div class="qa-point-num">${i + 1}</div>
              <div class="qa-point-text">${escHtml(pt)}</div>
            </div>
          `).join('')}
        </div>
      </div>`;
  });

  main.innerHTML = html;
  // Auto-scroll to bottom to show the latest card
  setTimeout(() => { main.scrollTop = main.scrollHeight; }, 50);
}

// ── Clear local display only ──
function clearDisplay() {
  const main = document.getElementById('mainArea');
  const waiting = document.getElementById('waitingScreen');
  main.innerHTML = '';
  main.appendChild(waiting);
  setConnected('connected');
}

// ── Listen to Firebase ──
db.ref('.info/connected').on('value', snap => {
  if (snap.val()) setConnected('connected');
});

db.ref('qa_session/matches').on('value', snap => {
  const data = snap.val();
  // Convert Firebase object/array to array
  let matches = null;
  if (data) {
    if (Array.isArray(data)) {
      matches = data;
    } else {
      matches = Object.values(data);
    }
  }
  renderMatches(matches);
});
</script>
</body>
</html>
