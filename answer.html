<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>質詢提示</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --surface2: #f5f5f7;
    --border: #e0e0e2;
    --text-primary: #1a1a1a;
    --text-secondary: #555558;
    --text-muted: #999;
    --accent: #0060c7;
    --accent-light: #ddeeff;
    --success: #1a9e3f;
    --waiting: #888;
    --radius: 14px;
  }

  html, body {
    height: 100%;
    height: 100dvh;
  }

  body {
    font-family: -apple-system, "SF Pro Display", "PingFang TC", "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 6px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.2px;
  }

  .conn-pill {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.3s;
  }

  .conn-pill.connected {
    background: #f0fff4;
    color: var(--success);
    border-color: #b3e6c0;
  }

  .conn-pill.receiving {
    background: #fff8e8;
    color: #b86a00;
    border-color: #f0d090;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
  }

  .dot.pulse {
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  /* ── Main scroll area ── */
  main {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 14px 14px 20px;
    /* 不用 flex，讓卡片正常 block 排列才能捲動 */
  }

  /* ── Waiting state ── */
  .waiting-screen {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 40px;
    text-align: center;
  }

  .waiting-icon {
    font-size: 48px;
    opacity: 0.3;
  }

  .waiting-text {
    font-size: 16px;
    color: var(--text-muted);
    font-weight: 500;
  }

  .waiting-sub {
    font-size: 13px;
    color: var(--text-muted);
    opacity: 0.7;
  }

  /* ── Q&A Cards ── */
  .qa-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    overflow: hidden;
    animation: slideIn 0.3s ease;
    margin-bottom: 12px;
  }

  .qa-card:last-child {
    margin-bottom: 0;
  }

  .qa-card.latest {
    border-color: var(--accent);
    box-shadow: 0 2px 12px rgba(0,96,199,0.10);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Question header */
  .qa-header {
    background: var(--surface2);
    padding: 12px 16px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }

  .qa-card.latest .qa-header {
    background: var(--accent-light);
  }

  .qa-num {
    flex-shrink: 0;
    background: var(--text-muted);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 5px;
    margin-top: 2px;
    white-space: nowrap;
  }

  .qa-card.latest .qa-num {
    background: var(--accent);
  }

  .qa-question {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.4;
  }

  .page-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    color: #666;
    background: #f0f0f2;
    border: 1px solid #ddd;
    border-radius: 5px;
    padding: 1px 6px;
    margin-left: 7px;
    vertical-align: middle;
    white-space: nowrap;
    letter-spacing: 0;
  }

  /* 幕僚直送卡片 */
  .custom-card {
    border-color: #34c759 !important;
    background: #f0fff4;
  }
  .custom-card.latest {
    border-color: #28a745 !important;
  }
  .custom-num {
    background: #34c759 !important;
    color: #fff !important;
  }
  .custom-text {
    font-size: 15px;
    line-height: 1.6;
    color: var(--text-primary);
    white-space: pre-wrap;
  }

  /* Answer body */
  .qa-body {
    padding: 0;
  }

  /* ── Answer hierarchical formatting ── */
  .qa-answer {
    padding: 14px 20px 18px;
    font-size: 16px;
    line-height: 1.7;
    color: var(--text-primary);
    word-break: break-word;
  }

  .ans-body { line-height: 1.8; }
  .ans-l1 { margin-top: 8px; font-weight: 500; color: var(--text-primary); }
  .ans-l1:first-child { margin-top: 0; }
  .ans-l2 { padding-left: 0.75em; margin-top: 3px; }
  .ans-l3 { padding-left: 1.5em; margin-top: 2px; }
  .ans-l4 { padding-left: 2.25em; margin-top: 2px; }
  .ans-normal { margin-top: 3px; }
  .ans-gap { height: 6px; }
  .ans-empty { color: #999; }

  /* ── NEW badge ── */
  .new-badge {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 4px;
    margin-left: 6px;
    vertical-align: middle;
    animation: badgePop 0.4s ease;
  }

  @keyframes badgePop {
    0% { transform: scale(0.6); opacity: 0; }
    60% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ── Clear button ── */
  .footer-bar {
    flex-shrink: 0;
    padding: 8px 14px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
  }

  .btn-clear {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 6px 16px;
    border-radius: 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
</style>
</head>
<body>

<header>
  <span class="header-title">📋 質詢提示</span>
  <div class="conn-pill" id="connPill">
    <div class="dot" id="connDot"></div>
    <span id="connText">連線中…</span>
  </div>
</header>

<main id="mainArea">
  <div class="waiting-screen" id="waitingScreen">
    <div class="waiting-icon">📡</div>
    <div class="waiting-text">等待操作端開始收音</div>
    <div class="waiting-sub">收到質詢題目後將自動顯示</div>
  </div>
</main>

<div class="footer-bar">
  <button class="btn-clear" onclick="clearDisplay()">清除畫面</button>
</div>

<script>
// ── Firebase config ──
const firebaseConfig = {
  apiKey: "AIzaSyARX3_F0VY_-LeN2CQoPGBPSpqOzDSjHVk",
  authDomain: "tycg2026.firebaseapp.com",
  databaseURL: "https://tycg2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "tycg2026",
  storageBucket: "tycg2026.firebasestorage.app",
  messagingSenderId: "268276526207",
  appId: "1:268276526207:web:d66513d123a6b76049234a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ── Connection state ──
function setConnected(state) {
  const pill = document.getElementById('connPill');
  const dot  = document.getElementById('connDot');
  const txt  = document.getElementById('connText');
  pill.className = 'conn-pill';
  dot.className  = 'dot';

  if (state === 'connected') {
    pill.classList.add('connected');
    txt.textContent = '已連線';
  } else if (state === 'receiving') {
    pill.classList.add('receiving');
    dot.classList.add('pulse');
    txt.textContent = '收到題目';
  } else {
    txt.textContent = '連線中…';
  }
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Answer Formatter：將純文字答案轉成階層化 HTML ──
function formatAnswerHtml(text) {
  if (!text || !text.trim()) return '<span class="ans-empty">（無答案內容）</span>';

  // 預處理：將行內連寫的列點標記拆成獨立行
  // 例：「（一）租金70萬。（二）辦理方式：...」→ 兩行
  let processed = text
    // 在非換行字元後面、（一）類標記前 插入換行
    .replace(/([^\n])([（(][一二三四五六七八九十百]+[）)])/g, '$1\n$2')
    // 在非換行字元後面、（1）（2）阿拉伯數字括號標記前 插入換行
    .replace(/([^\n])([（(]\d+[）)])/g, '$1\n$2')
    // 在句尾標點後面、一、二、三類標記前 插入換行（避免誤判一般詞語中的 一、）
    .replace(/([。！？；，])([一二三四五六七八九十百]+、)/g, '$1\n$2')
    // 在非換行字元後面、數字列點（1. 2.）前 插入換行
    .replace(/([^\n])(\d+[.．](?=\S))/g, '$1\n$2');

  const lines = processed.split('\n');
  let html = '<div class="ans-body">';

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trimEnd();

    if (!line.trim()) {
      html += '<div class="ans-gap"></div>';
      continue;
    }

    // 第一層：一、二、三、...（含兩字如十一、）
    if (/^[一二三四五六七八九十百]+、/.test(line)) {
      html += `<div class="ans-l1">${escHtml(line)}</div>`;
    }
    // 第二層：(一)(二)... 或全形（一）（二）
    else if (/^[（(][一二三四五六七八九十百]+[）)]/.test(line)) {
      html += `<div class="ans-l2">${escHtml(line)}</div>`;
    }
    // 第三層：1. 2. 3. 或 1、2、
    else if (/^\d+[.、．]/.test(line)) {
      html += `<div class="ans-l3">${escHtml(line)}</div>`;
    }
    // 第四層：(1)(2)... 或全形（1）（2）— 阿拉伯數字括號列點，比 1.2.3. 更深
    else if (/^[（(]\d+[）)]/.test(line)) {
      html += `<div class="ans-l4">${escHtml(line)}</div>`;
    }
    // 一般文字（含表格拆解後的逐行資料）
    else {
      html += `<div class="ans-normal">${escHtml(line)}</div>`;
    }
  }

  html += '</div>';
  return html;
}

// ── Render matches ──
function renderMatches(matches) {
  const main = document.getElementById('mainArea');
  const waiting = document.getElementById('waitingScreen');

  if (!matches || matches.length === 0) {
    main.innerHTML = '';
    main.appendChild(waiting);
    setConnected('connected');
    return;
  }

  setConnected('receiving');

  let html = '';
  matches.forEach((m, idx) => {
    const isLatest = idx === matches.length - 1;
    const badge = isLatest ? '<span class="new-badge">NEW</span>' : '';
    const isCustom = m.type === 'custom';

    if (isCustom) {
      // 幕僚直送：特殊樣式，直接顯示文字
      html += `
        <div class="qa-card custom-card${isLatest ? ' latest' : ''}">
          <div class="qa-header">
            <div class="qa-num custom-num">✏️ 幕僚說明</div>
            <div class="qa-question">${escHtml(m.question)}${badge}</div>
          </div>
          <div class="qa-body">
            <div class="qa-answer"><div class="custom-text">${escHtml(m.custom_text || m.short_answer || '')}</div></div>
          </div>
        </div>`;
    } else {
      html += `
        <div class="qa-card${isLatest ? ' latest' : ''}">
          <div class="qa-header">
            <div class="qa-num">第 ${idx + 1} 題</div>
            <div class="qa-question">${escHtml(m.question)}${m.page ? `<span class="page-badge">p.${m.page}</span>` : ''}${badge}</div>
          </div>
          <div class="qa-body">
            <div class="qa-answer">${formatAnswerHtml(m.short_answer || m.detail_answer || '')}</div>
          </div>
        </div>`;
    }
  });

  main.innerHTML = html;
  // Auto-scroll to bottom to show the latest card
  setTimeout(() => { main.scrollTop = main.scrollHeight; }, 50);
}

// ── Clear local display only ──
function clearDisplay() {
  const main = document.getElementById('mainArea');
  const waiting = document.getElementById('waitingScreen');
  main.innerHTML = '';
  main.appendChild(waiting);
  setConnected('connected');
}

// ── Listen to Firebase ──
db.ref('.info/connected').on('value', snap => {
  if (snap.val()) setConnected('connected');
});

db.ref('qa_session/matches').on('value', snap => {
  const data = snap.val();
  // Convert Firebase object/array to array
  let matches = null;
  if (data) {
    if (Array.isArray(data)) {
      matches = data;
    } else {
      matches = Object.values(data);
    }
  }
  renderMatches(matches);
});
</script>
</body>
</html>
